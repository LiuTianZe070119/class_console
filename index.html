<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级办事通 · 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'PingFang SC', sans-serif; }
    body { min-height: 100vh; background: linear-gradient(145deg, #e9f0fc, #d9e4f5); display: flex; align-items: center; justify-content: center; }
    .login-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); width: 400px; padding: 36px 32px; border-radius: 40px; box-shadow: 0 25px 45px -10px rgba(0,20,50,0.2); }
    .brand { text-align: center; margin-bottom: 30px; }
    .brand-icon { background: #2e5a9c; width: 60px; height: 60px; margin: 0 auto 16px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }
    h1 { color: #1a2e4b; font-weight: 650; }
    .input-group { margin-bottom: 20px; }
    label { color: #1e3a5f; font-weight: 550; margin-left: 6px; }
    input { width: 100%; padding: 14px 18px; border: 1.5px solid #cfdde9; border-radius: 28px; font-size: 16px; outline: none; }
    input:focus { border-color: #2e5a9c; box-shadow: 0 0 0 4px rgba(46,90,156,0.12); }
    .btn { width: 100%; background: #1e3a5f; color: white; border: none; padding: 15px; font-size: 18px; font-weight: 600; border-radius: 36px; cursor: pointer; margin-top: 10px; }
    .error { color: #c7453c; text-align: center; min-height: 24px; margin: 8px 0; }
    .demo-hint { background: #eef3fa; padding: 14px; border-radius: 26px; margin-top: 20px; font-size: 14px; }
    .demo-badge { background: white; padding: 6px 14px; border-radius: 30px; margin: 4px; display: inline-block; cursor: pointer; border: 1px solid #cdddec; }
    .status { font-size: 13px; color: #59748f; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-icon">📋</div>
    <h1>班级办事通</h1>
    <div style="color:#59748f;">意见箱 · 班委协同</div>
  </div>
  <div class="status" id="fileStatus">正在读取账号文件...</div>
  <form id="loginForm">
    <div class="input-group">
      <label>账号</label>
      <input type="text" id="username" placeholder="例如: zhangsan" autocomplete="off" required>
    </div>
    <div class="input-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <div class="error" id="errorMsg"></div>
    <button type="submit" class="btn">进入办事通</button>
  </form>
  <div class="demo-hint">
    <div style="font-weight:600; margin-bottom:8px;">📋 测试账号（点击填充）</div>
    <div id="demoAccounts"></div>
    <div style="margin-top:10px; font-size:12px;">账号密码存储于 username.txt，支持热加载</div>
  </div>
</div>
<script>
  (function() {
    const fileStatus = document.getElementById('fileStatus');
    const demoDiv = document.getElementById('demoAccounts');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');

    const DEFAULT_USERS = [
      { username: 'admin', password: 'admin123', role: 'admin', realName: '管理员' },
      { username: 'zhangsan', password: '123456', role: 'student', realName: '张三' },
      { username: 'lisi', password: '123456', role: 'student', realName: '李四' }
    ];

    let userDB = [];

    function parseUserTxt(text) {
      const lines = text.split(/\r?\n/);
      const users = [];
      lines.forEach(line => {
        line = line.trim();
        if (line === '' || line.startsWith('#')) return;
        const parts = line.split(':');
        if (parts.length >= 4) {
          users.push({
            username: parts[0].trim(),
            password: parts[1].trim(),
            role: parts[2].trim(),
            realName: parts[3].trim()
          });
        }
      });
      return users;
    }

    function renderDemoBadges(users) {
      demoDiv.innerHTML = users.map(u => 
        `<span class="demo-badge" data-user="${u.username}" data-pass="${u.password}">${u.realName} (${u.role==='admin'?'管理员':'同学'})</span>`
      ).join('');
      document.querySelectorAll('.demo-badge').forEach(badge => {
        badge.addEventListener('click', () => {
          usernameInput.value = badge.dataset.user;
          passwordInput.value = badge.dataset.pass;
          errorMsg.textContent = '';
        });
      });
    }

    async function loadUserDatabase() {
      try {
        const response = await fetch('username.txt');
        if (!response.ok) throw new Error('文件不存在');
        const text = await response.text();
        userDB = parseUserTxt(text);
        if (userDB.length === 0) throw new Error('文件无有效数据');
        fileStatus.textContent = `✅ 已从 username.txt 加载 ${userDB.length} 个账号`;
        fileStatus.style.color = '#2e7d32';
      } catch (err) {
        console.warn('读取username.txt失败，使用内置默认账号', err);
        userDB = DEFAULT_USERS;
        fileStatus.textContent = `⚠️ 使用内置默认账号（username.txt 读取失败）`;
        fileStatus.style.color = '#b85c00';
      }
      renderDemoBadges(userDB);
    }

    function doLogin(username, password) {
      const user = userDB.find(u => u.username === username && u.password === password);
      if (!user) {
        errorMsg.textContent = '账号或密码错误';
        return false;
      }
      const sessionUser = {
        id: user.username,
        username: user.username,
        real_name: user.realName,
        role: user.role,
        position: user.role === 'admin' ? '班主任' : null
      };
      sessionStorage.setItem('currentUser', JSON.stringify(sessionUser));
      
      // 初始化系统数据
      if (!localStorage.getItem('classroom_opinions')) localStorage.setItem('classroom_opinions', '[]');
      if (!localStorage.getItem('classroom_replies')) localStorage.setItem('classroom_replies', '[]');
      if (!localStorage.getItem('classroom_likes')) localStorage.setItem('classroom_likes', '{}');
      if (!localStorage.getItem('classroom_ratings')) localStorage.setItem('classroom_ratings', '[]');
      if (!localStorage.getItem('classroom_notifications')) localStorage.setItem('classroom_notifications', '[]');
      
      window.location.href = 'main.html';
      return true;
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        errorMsg.textContent = '请输入账号和密码';
        return;
      }
      doLogin(username, password);
    });

    loadUserDatabase();
  })();
</script>
</body>
</html>
