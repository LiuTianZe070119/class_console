<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

:root {
  --bg-start: #FDF6F0; --bg-mid: #F8EDE3; --bg-end: #F2E0D0;
  --text: #3D2314; --text-muted: #8B7355; --text-light: #A09080;
  --accent: #C67B5C; --accent-hover: #D4946A; --accent-dark: #B5651D;
  --accent-light: rgba(198,123,92,0.10); --accent-light2: rgba(198,123,92,0.06);
  --card-bg: rgba(255,255,255,0.15); --card-border: rgba(255,255,255,0.5);
  --navbar-bg: rgba(255,255,255,0.18); --navbar-border: rgba(255,255,255,0.4);
  --input-bg: rgba(255,255,255,0.5); --input-border: #E0D0C0; --input-border-focus: #C67B5C;
  --danger: #C7564A; --danger-hover: #A8403A;
  --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
  --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
  --btn-shadow: rgba(181,101,29,0.18); --btn-shadow-hover: rgba(181,101,29,0.28);
  --shadow: rgba(61,35,20,0.05); --shadow-lg: rgba(61,35,20,0.12);
  --modal-bg: rgba(255,255,255,0.7); --modal-overlay: rgba(61,35,20,0.25);
  --divider: rgba(139,115,85,0.08);
  --toast-success: rgba(93,155,111,0.92); --toast-error: rgba(199,86,74,0.92); --toast-warn: rgba(232,145,58,0.92);
}
body[data-theme="green"] {
  --bg-start: #F2F7F4; --bg-mid: #E8F0EA; --bg-end: #D8E8DC;
  --text: #1A3D2A; --text-muted: #5B7B6A; --text-light: #8B9B8A;
  --accent: #5B8C6B; --accent-hover: #7BAA8B; --accent-dark: #3D6B4D;
  --accent-light: rgba(91,140,107,0.10); --accent-light2: rgba(91,140,107,0.06);
  --card-bg: rgba(255,255,255,0.15); --card-border: rgba(255,255,255,0.5);
  --navbar-bg: rgba(255,255,255,0.18); --navbar-border: rgba(255,255,255,0.4);
  --input-bg: rgba(255,255,255,0.5); --input-border: #C8D8C8; --input-border-focus: #5B8C6B;
  --danger: #C7564A; --danger-hover: #A8403A;
  --btn-shadow: rgba(61,107,77,0.18); --btn-shadow-hover: rgba(61,107,77,0.28);
  --shadow: rgba(26,61,42,0.05); --shadow-lg: rgba(26,61,42,0.12);
  --modal-bg: rgba(255,255,255,0.7); --modal-overlay: rgba(26,61,42,0.25);
  --divider: rgba(91,123,106,0.08);
}
body[data-theme="white"] {
  --bg-start: #FAFAFA; --bg-mid: #F5F5F5; --bg-end: #F0F0F0;
  --text: #1A1A1A; --text-muted: #666; --text-light: #999;
  --accent: #555; --accent-hover: #777; --accent-dark: #333;
  --accent-light: rgba(85,85,85,0.08); --accent-light2: rgba(85,85,85,0.04);
  --card-bg: rgba(255,255,255,0.6); --card-border: rgba(0,0,0,0.06);
  --navbar-bg: rgba(255,255,255,0.65); --navbar-border: rgba(0,0,0,0.06);
  --input-bg: rgba(255,255,255,0.85); --input-border: #DDD; --input-border-focus: #555;
  --danger: #C7564A; --danger-hover: #A8403A;
  --btn-shadow: rgba(0,0,0,0.1); --btn-shadow-hover: rgba(0,0,0,0.18);
  --shadow: rgba(0,0,0,0.04); --shadow-lg: rgba(0,0,0,0.1);
  --modal-bg: rgba(255,255,255,0.9); --modal-overlay: rgba(0,0,0,0.15);
  --divider: rgba(0,0,0,0.06);
}
body[data-theme="black"] {
  --bg-start: #1A1A1A; --bg-mid: #161616; --bg-end: #111;
  --text: #E0D8D0; --text-muted: #999; --text-light: #777;
  --accent: #C67B5C; --accent-hover: #D4946A; --accent-dark: #B5651D;
  --accent-light: rgba(198,123,92,0.12); --accent-light2: rgba(198,123,92,0.06);
  --card-bg: rgba(40,40,40,0.4); --card-border: rgba(255,255,255,0.06);
  --navbar-bg: rgba(30,30,30,0.6); --navbar-border: rgba(255,255,255,0.06);
  --input-bg: rgba(50,50,50,0.5); --input-border: #444; --input-border-focus: #C67B5C;
  --danger: #D9665A; --danger-hover: #C7564A;
  --btn-shadow: rgba(181,101,29,0.25); --btn-shadow-hover: rgba(181,101,29,0.4);
  --shadow: rgba(0,0,0,0.3); --shadow-lg: rgba(0,0,0,0.5);
  --modal-bg: rgba(40,40,40,0.9); --modal-overlay: rgba(0,0,0,0.5);
  --divider: rgba(255,255,255,0.06);
}

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', 'PingFang SC', serif; }
    h1, h2, h3, .tab, .btn { font-family: 'Noto Serif SC', serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 30%, var(--bg-end) 60%, var(--bg-mid) 100%);
      background-size: 300% 300%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; gap: 24px;
      animation: bgShift 20s ease-in-out infinite;
      overflow-x: hidden; overflow-y: auto;
      transition: background 0.4s, color 0.4s;
    }
    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 0%; }
      100% { background-position: 0% 50%; }
    }

    .bg-decorations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-orb {
      position: absolute; border-radius: 50%;
      animation: orbFloat var(--dur, 25s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      filter: blur(80px);
      background: var(--accent);
      opacity: 0.08;
    }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      20% { transform: translate(var(--dx, 80px), var(--dy, -60px)) scale(1.1); }
      40% { transform: translate(calc(var(--dx, 80px) * -0.6), calc(var(--dy, -60px) * -0.8)) scale(0.85); }
      60% { transform: translate(calc(var(--dx, 80px) * 0.3), calc(var(--dy, -60px) * -0.4)) scale(1.05); }
      80% { transform: translate(calc(var(--dx, 80px) * -0.8), calc(var(--dy, -60px) * 0.5)) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }
    .sparkle {
      position: absolute; width: 4px; height: 4px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      border-radius: 50%;
      animation: sparkleFloat var(--dur, 10s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes sparkleFloat {
      0% { transform: translate(0, 0) scale(1); opacity: 0; }
      20% { opacity: 0.6; }
      50% { transform: translate(var(--dx, 20px), var(--dy, -30px)) scale(1.6); opacity: 0.7; }
      80% { opacity: 0.15; }
      100% { transform: translate(calc(var(--dx, 20px) * 2), calc(var(--dy, -30px) * 2)) scale(0.5); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) { .bg-orb, .sparkle, body { animation: none !important; } }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      width: 420px; max-width: 100%; padding: 40px 34px; border-radius: 32px;
      border: 1px solid var(--card-border);
      box-shadow: 0 8px 40px -8px var(--shadow), 0 2px 8px var(--shadow);
      position: relative; z-index: 1;
    }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand-icon { margin-bottom: 12px; display: flex; justify-content: center; color: var(--accent); }
    .brand-icon svg { width: 52px; height: 52px; }
    h1 { color: var(--text); font-size: 28px; font-weight: 600; }
    .sub { color: var(--text-muted); margin: 6px 0 16px; font-size: 14px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--accent-light); border-radius: 28px; padding: 5px; }
    .tab { flex: 1; text-align: center; padding: 11px; border-radius: 24px; cursor: pointer; font-weight: 500; color: var(--text-muted); transition: all 0.25s; font-size: 15px; user-select: none; }
    .tab.active { background: white; color: var(--accent); box-shadow: 0 2px 12px var(--shadow); }
    .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.5); }

    .form { display: none; }
    .form.active { display: block; }
    .input-group { margin-bottom: 8px; }
    label { color: var(--text); font-weight: 500; margin-left: 6px; display: block; margin-bottom: 2px; font-size: 14px; }

    input {
      width: 100%; padding: 14px 18px;
      border: 1.5px solid var(--input-border);
      border-radius: 20px; font-size: 16px; outline: none; transition: all 0.25s;
      background: var(--input-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: var(--text);
    }
    input::placeholder { color: var(--text-light); }
    input:focus { border-color: var(--input-border-focus); box-shadow: 0 0 0 4px var(--accent-light); background: var(--input-bg); }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: white; border: none; padding: 14px; font-size: 17px; font-weight: 600;
      border-radius: 24px; cursor: pointer; margin-top: 4px; transition: all 0.25s;
      box-shadow: 0 4px 16px var(--btn-shadow);
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn span { display: inline-flex; align-items: center; }
    .btn:hover {
      background: linear-gradient(135deg, var(--accent-hover) 0%, var(--accent) 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--btn-shadow-hover);
    }
    .btn:active { transform: translateY(0); }

    .remember-row { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--text-muted); user-select: none; margin: 6px 0; }
    .remember-row input { display: none; }
    .remember-check { width: 18px; height: 18px; border: 1.5px solid var(--input-border); border-radius: 5px; flex-shrink: 0; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .remember-row input:checked + .remember-check { background: var(--accent); border-color: var(--accent); }
    .remember-row input:checked + .remember-check::after { content: ''; width: 5px; height: 8px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px; }
    .remember-text { font-size: 14px; }
    .input-error { border-color: var(--danger) !important; box-shadow: 0 0 0 3px rgba(199,86,74,0.15) !important; }
    .divider { text-align: center; margin: 18px 0 4px; color: var(--text-muted); font-size: 13px; }

    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 16px; color: white; font-weight: 500; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .toast.success { background: var(--toast-success); }
    .toast.error { background: var(--toast-error); }
    .toast.warn { background: var(--toast-warn); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .site-footer { text-align: center; padding: 24px 20px; margin-top: 20px; color: var(--text-light); font-size: 13px; position: relative; z-index: 1; }
    .site-footer .footer-divider { width: 40px; height: 2px; background: rgba(198,123,92,0.2); margin: 0 auto 14px; border-radius: 1px; }
    .site-footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; display: inline-flex; align-items: center; gap: 4px; }
    .site-footer a:hover { color: var(--accent); }
    .site-footer a svg { width: 14px; height: 14px; }
    .site-footer .footer-links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
  </style>
</head>

<div class="bg-decorations" id="bgDecorations"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon" id="brandIcon"></div>
    <h1>班级办事通</h1>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="login">登录</div>
    <div class="tab" data-tab="register">注册</div>
  </div>

  <div class="form active" id="loginForm">
    <div class="input-group">
      <label>学号</label>
      <input type="text" id="loginStudentId" placeholder="请输入学号" autocomplete="username">
    </div>
    <div class="input-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <label class="remember-row">
      <input type="checkbox" id="rememberPwd">
      <span class="remember-check"></span>
      <span class="remember-text">记住密码</span>
    </label>
    <button class="btn" id="loginBtn">登录</button>
  </div>

  <div class="form" id="registerForm">
    <div class="input-group">
      <label>学号</label>
      <input type="text" id="regStudentId" placeholder="请输入已录入的学号">
    </div>
    <div class="input-group">
      <label>姓名</label>
      <input type="text" id="regName" placeholder="请输入真实姓名">
    </div>
    <div class="input-group">
      <label>设置密码（至少6位）</label>
      <input type="password" id="regPassword" placeholder="••••••" autocomplete="new-password">
    </div>
    <div class="input-group">
      <label>确认密码</label>
      <input type="password" id="regPasswordConfirm" placeholder="••••••" autocomplete="new-password">
    </div>
    <div style="text-align:center;color:var(--text-muted);font-size:12px;margin:4px 0;">注册需学号与姓名在班级名单中</div>
    <button class="btn" id="registerBtn">注册</button>
  </div>
</div>

    return (icons[name] || '').replace('width="24"','width="'+ (arguments[1]||24) +'"').replace('height="24"','height="'+ (arguments[1]||24) +'"');
  }

  // 背景装饰
  (function() {
    var container = document.getElementById('bgDecorations');
    var html = '';
    for (var i = 0; i < 4; i++) {
      var size = 200 + Math.floor(Math.random() * 250);
      var top = -5 + Math.floor(Math.random() * 85);
      var left = -5 + Math.floor(Math.random() * 85);
      var dur = 20 + Math.floor(Math.random() * 18);
      var delay = Math.floor(Math.random() * 12);
      var dx = (Math.random() - 0.5) * 200;
      var dy = (Math.random() - 0.5) * 200;
      html += '<div class="bg-orb" style="width:' + size + 'px;height:' + size + 'px;top:' + top + '%;left:' + left + '%;--dur:' + dur + 's;--delay:' + delay + 's;--dx:' + dx.toFixed(0) + 'px;--dy:' + dy.toFixed(0) + 'px;"></div>';
    }
    for (var k = 0; k < 20; k++) {
      var sx = 2 + Math.floor(Math.random() * 96);
      var sy = 3 + Math.floor(Math.random() * 94);
      var sdur = 7 + Math.floor(Math.random() * 13);
      var sdelay = Math.floor(Math.random() * 12);
      var dx2 = (Math.random() - 0.5) * 80;
      var dy2 = -(20 + Math.random() * 60);
      html += '<div class="sparkle" style="left:' + sx + '%;top:' + sy + '%;--dur:' + sdur + 's;--delay:' + sdelay + 's;--dx:' + dx2.toFixed(0) + 'px;--dy:' + dy2.toFixed(0) + 'px;"></div>';
    }
    container.innerHTML = html;
  })();

  // 初始化品牌图标
  document.getElementById('brandIcon').innerHTML = getIcon('clipboard', 52);

  // 记住密码：自动填充
  (function() {
    var saved = localStorage.getItem('remembered_login');
    if (saved) {
      try {
        var cred = JSON.parse(saved);
        document.getElementById('loginStudentId').value = cred.id || '';
        document.getElementById('loginPassword').value = cred.pw || '';
        document.getElementById('rememberPwd').checked = true;
      } catch(e) {}
    }
  })();

  var SUPABASE_URL = 'https://zmujidvqkihthhdbwuvw.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptdWppZHZxa2lodGhoZGJ3dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjIxMDAsImV4cCI6MjA5MzAzODEwMH0.iWKqqpebMc3l3wjEBsP4X0QH1WwjtIovcJAEsDPr3kE';
  var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function toast(msg, type) {
    type = type || 'error';
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    el.onclick = function() { el.remove(); };
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 4000);
  }

  // Tab 切换
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.form').forEach(function(f) { f.classList.remove('active'); });
      this.classList.add('active');
      document.getElementById(this.dataset.tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
    });
  });

  function clearInputErrors() {
    document.querySelectorAll('.input-error').forEach(function(el) { el.classList.remove('input-error'); });
  }
  // 输入时自动清除错误状态
  document.getElementById('loginStudentId').addEventListener('input', function() { this.classList.remove('input-error'); });
  document.getElementById('loginPassword').addEventListener('input', function() { this.classList.remove('input-error'); });

  // 登录
  document.getElementById('loginBtn').addEventListener('click', async function() {
    var btn = this;
    var studentId = document.getElementById('loginStudentId').value.trim();
    var password = document.getElementById('loginPassword').value;
    clearInputErrors();
    if (!studentId || !password) {
      if (!studentId) document.getElementById('loginStudentId').classList.add('input-error');
      if (!password) document.getElementById('loginPassword').classList.add('input-error');
      toast('请填写学号和密码', 'warn');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 登录中…';
    var email = studentId + '@class.local';
    var res = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
    if (res.error) {
      btn.disabled = false;
      btn.textContent = '登录';
      document.getElementById('loginStudentId').classList.add('input-error');
      document.getElementById('loginPassword').classList.add('input-error');
      toast('账号或密码错误', 'error');
    } else {
      // 记住密码
      if (document.getElementById('rememberPwd').checked) {
        localStorage.setItem('remembered_login', JSON.stringify({ id: studentId, pw: password }));
      } else {
        localStorage.removeItem('remembered_login');
      }
      var profileRes = await supabaseClient.from('profiles').select('student_id,real_name,role,position,theme,default_anonymous,tutorial_done').eq('id', res.data.user.id).single();
      var sessionUser = {
        id: res.data.user.id,
        student_id: profileRes.data.student_id,
        real_name: profileRes.data.real_name,
        role: profileRes.data.role,
        position: profileRes.data.position
      };
      sessionStorage.setItem('currentUser', JSON.stringify(sessionUser));
      if (profileRes.data.theme) localStorage.setItem('classroom_theme', profileRes.data.theme);
      if (profileRes.data.default_anonymous !== null) {
        var settings = localStorage.getItem('classroom_user_settings');
        var s = settings ? JSON.parse(settings) : {};
        s.defaultAnonymous = profileRes.data.default_anonymous;
        localStorage.setItem('classroom_user_settings', JSON.stringify(s));
      }
      if (profileRes.data.tutorial_done) localStorage.setItem('tutorial_done', '1');
      var redir = sessionStorage.getItem('login_redirect');
      sessionStorage.removeItem('login_redirect');
      window.location.href = redir || 'main.html';
    }
  });

  // 注册输入框错误清除
  document.getElementById('regStudentId').addEventListener('input', function() { this.classList.remove('input-error'); });
  document.getElementById('regName').addEventListener('input', function() { this.classList.remove('input-error'); });
  document.getElementById('regPassword').addEventListener('input', function() { this.classList.remove('input-error'); });
  document.getElementById('regPasswordConfirm').addEventListener('input', function() { this.classList.remove('input-error'); });

  // 注册
  document.getElementById('registerBtn').addEventListener('click', async function() {
    var btn = this;
    var studentId = document.getElementById('regStudentId').value.trim();
    var realName = document.getElementById('regName').value.trim();
    var password = document.getElementById('regPassword').value;
    var passwordConfirm = document.getElementById('regPasswordConfirm').value;
    clearInputErrors();
    if (!studentId || !realName || !password || !passwordConfirm) {
      if (!studentId) document.getElementById('regStudentId').classList.add('input-error');
      if (!realName) document.getElementById('regName').classList.add('input-error');
      if (!password) document.getElementById('regPassword').classList.add('input-error');
      if (!passwordConfirm) document.getElementById('regPasswordConfirm').classList.add('input-error');
      toast('请填写所有字段', 'warn');
      return;
    }
    if (password.length < 6) {
      document.getElementById('regPassword').classList.add('input-error');
      toast('密码至少6位', 'warn');
      return;
    }
    if (password !== passwordConfirm) {
      document.getElementById('regPasswordConfirm').classList.add('input-error');
      toast('两次密码不一致', 'warn');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 注册中…';
    var res = await supabaseClient.from('class_roster')
      .select('*')
      .eq('student_id', studentId)
      .eq('real_name', realName)
      .maybeSingle();

    if (res.error || !res.data) {
      btn.disabled = false; btn.textContent = '注册';
      document.getElementById('regStudentId').classList.add('input-error');
      document.getElementById('regName').classList.add('input-error');
      toast('学号或姓名不在班级名单中', 'warn');
      return;
    }
    if (res.data.registered) {
      btn.disabled = false; btn.textContent = '注册';
      document.getElementById('regStudentId').classList.add('input-error');
      toast('该学号已被注册', 'warn');
      return;
    }

    var email = studentId + '@class.local';
    var authRes = await supabaseClient.auth.signUp({
      email: email,
      password: password,
      options: {
        data: { student_id: studentId, real_name: realName }
      }
    });
    if (authRes.error) {
      btn.disabled = false; btn.textContent = '注册';
      document.getElementById('regPassword').classList.add('input-error');
      document.getElementById('regPasswordConfirm').classList.add('input-error');
      toast(authRes.error.message, 'error');
      return;
    }
    if (authRes.data.user && authRes.data.session) {
      // 注册成功自动记住密码
      localStorage.setItem('remembered_login', JSON.stringify({ id: studentId, pw: password }));
      setTimeout(async function() {
        var profileRes = await supabaseClient.from('profiles').select('student_id,real_name,role,position,theme,default_anonymous,tutorial_done').eq('id', authRes.data.user.id).single();
        var sessionUser = {
          id: authRes.data.user.id,
          student_id: profileRes.data.student_id,
          real_name: profileRes.data.real_name,
          role: profileRes.data.role,
          position: profileRes.data.position
        };
        sessionStorage.setItem('currentUser', JSON.stringify(sessionUser));
        if (profileRes.data.theme) localStorage.setItem('classroom_theme', profileRes.data.theme);
        if (profileRes.data.default_anonymous !== null) {
          var settings2 = localStorage.getItem('classroom_user_settings');
          var s2 = settings2 ? JSON.parse(settings2) : {};
          s2.defaultAnonymous = profileRes.data.default_anonymous;
          localStorage.setItem('classroom_user_settings', JSON.stringify(s2));
        }
        if (profileRes.data.tutorial_done) localStorage.setItem('tutorial_done', '1');
        var redir2 = sessionStorage.getItem('login_redirect');
        sessionStorage.removeItem('login_redirect');
        window.location.href = redir2 || 'main.html';
      }, 500);
    } else {
      toast('注册失败，请稍后重试', 'error');
    }
  });
</script>
