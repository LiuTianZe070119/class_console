<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级办事通 · 意见箱</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

    /* ====== 主题变量 ====== */
    :root {
      --bg-start: #FDF6F0;
      --bg-mid: #F8EDE3;
      --bg-end: #F2E0D0;
      --text: #3D2314;
      --text-muted: #8B7355;
      --text-light: #B09080;
      --accent: #C67B5C;
      --accent-hover: #D4946A;
      --accent-dark: #B5651D;
      --accent-light: rgba(198,123,92,0.10);
      --accent-light2: rgba(198,123,92,0.06);
      --card-bg: rgba(255,255,255,0.45);
      --card-border: rgba(255,255,255,0.4);
      --navbar-bg: rgba(255,255,255,0.18);
      --navbar-border: rgba(255,255,255,0.4);
      --input-bg: rgba(255,255,255,0.5);
      --input-border: #E0D0C0;
      --input-border-focus: #C67B5C;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(61,35,20,0.05);
      --shadow-lg: rgba(61,35,20,0.12);
      --modal-bg: rgba(255,255,255,0.7);
      --modal-overlay: rgba(61,35,20,0.25);
      --btn-shadow: rgba(181,101,29,0.18);
      --btn-shadow-hover: rgba(181,101,29,0.28);
      --badge-bg: rgba(198,123,92,0.10);
      --avatar-bg: linear-gradient(135deg, #C67B5C, #B5651D);
      --divider: rgba(139,115,85,0.08);
      --dot-bg: #C7564A;
      --bell-hover: rgba(198,123,92,0.08);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(255,255,255,0.7);
      --notif-hover: rgba(198,123,92,0.05);
      --notif-unread: rgba(198,123,92,0.06);
      --footer-text: #B09080;
      --footer-link: #8B7355;
      --footer-link-hover: #C67B5C;
    }

    /* 绿色主题 */
    body[data-theme="green"] {
      --bg-start: #F2F7F4;
      --bg-mid: #E8F0EA;
      --bg-end: #D8E8DC;
      --text: #1A3D2A;
      --text-muted: #5B7B6A;
      --text-light: #8B9B8A;
      --accent: #5B8C6B;
      --accent-hover: #7BAA8B;
      --accent-dark: #3D6B4D;
      --accent-light: rgba(91,140,107,0.10);
      --accent-light2: rgba(91,140,107,0.06);
      --card-bg: rgba(255,255,255,0.45);
      --card-border: rgba(255,255,255,0.4);
      --navbar-bg: rgba(255,255,255,0.18);
      --navbar-border: rgba(255,255,255,0.4);
      --input-bg: rgba(255,255,255,0.5);
      --input-border: #C8D8C8;
      --input-border-focus: #5B8C6B;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(26,61,42,0.05);
      --shadow-lg: rgba(26,61,42,0.12);
      --modal-bg: rgba(255,255,255,0.7);
      --modal-overlay: rgba(26,61,42,0.25);
      --btn-shadow: rgba(61,107,77,0.18);
      --btn-shadow-hover: rgba(61,107,77,0.28);
      --badge-bg: rgba(91,140,107,0.10);
      --avatar-bg: linear-gradient(135deg, #5B8C6B, #3D6B4D);
      --divider: rgba(91,123,106,0.08);
      --dot-bg: #C7564A;
      --bell-hover: rgba(91,140,107,0.08);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(255,255,255,0.7);
      --notif-hover: rgba(91,140,107,0.05);
      --notif-unread: rgba(91,140,107,0.06);
      --footer-text: #8B9B8A;
      --footer-link: #5B7B6A;
      --footer-link-hover: #5B8C6B;
    }

    /* 白色主题 */
    body[data-theme="white"] {
      --bg-start: #FAFAFA;
      --bg-mid: #F5F5F5;
      --bg-end: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666;
      --text-light: #999;
      --accent: #555;
      --accent-hover: #777;
      --accent-dark: #333;
      --accent-light: rgba(85,85,85,0.08);
      --accent-light2: rgba(85,85,85,0.04);
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(0,0,0,0.06);
      --navbar-bg: rgba(255,255,255,0.65);
      --navbar-border: rgba(0,0,0,0.06);
      --input-bg: rgba(255,255,255,0.85);
      --input-border: #DDD;
      --input-border-focus: #555;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(0,0,0,0.04);
      --shadow-lg: rgba(0,0,0,0.1);
      --modal-bg: rgba(255,255,255,0.9);
      --modal-overlay: rgba(0,0,0,0.15);
      --btn-shadow: rgba(0,0,0,0.1);
      --btn-shadow-hover: rgba(0,0,0,0.18);
      --badge-bg: rgba(85,85,85,0.08);
      --avatar-bg: linear-gradient(135deg, #555, #333);
      --divider: rgba(0,0,0,0.06);
      --dot-bg: #C7564A;
      --bell-hover: rgba(85,85,85,0.06);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(255,255,255,0.9);
      --notif-hover: rgba(85,85,85,0.04);
      --notif-unread: rgba(85,85,85,0.06);
      --footer-text: #999;
      --footer-link: #666;
      --footer-link-hover: #555;
    }

    /* 黑色主题 */
    body[data-theme="black"] {
      --bg-start: #1A1A1A;
      --bg-mid: #161616;
      --bg-end: #111;
      --text: #E0D8D0;
      --text-muted: #999;
      --text-light: #777;
      --accent: #C67B5C;
      --accent-hover: #D4946A;
      --accent-dark: #B5651D;
      --accent-light: rgba(198,123,92,0.12);
      --accent-light2: rgba(198,123,92,0.06);
      --card-bg: rgba(40,40,40,0.6);
      --card-border: rgba(255,255,255,0.06);
      --navbar-bg: rgba(30,30,30,0.6);
      --navbar-border: rgba(255,255,255,0.06);
      --input-bg: rgba(50,50,50,0.5);
      --input-border: #444;
      --input-border-focus: #C67B5C;
      --danger: #D9665A;
      --danger-hover: #E8766A;
      --danger-bg: linear-gradient(135deg, #C7564A, #8B3020);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #A8403A);
      --shadow: rgba(0,0,0,0.3);
      --shadow-lg: rgba(0,0,0,0.5);
      --modal-bg: rgba(40,40,40,0.9);
      --modal-overlay: rgba(0,0,0,0.5);
      --btn-shadow: rgba(181,101,29,0.25);
      --btn-shadow-hover: rgba(181,101,29,0.4);
      --badge-bg: rgba(198,123,92,0.12);
      --avatar-bg: linear-gradient(135deg, #C67B5C, #B5651D);
      --divider: rgba(255,255,255,0.06);
      --dot-bg: #D9665A;
      --bell-hover: rgba(198,123,92,0.1);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(40,40,40,0.85);
      --notif-hover: rgba(198,123,92,0.06);
      --notif-unread: rgba(198,123,92,0.08);
      --footer-text: #777;
      --footer-link: #999;
      --footer-link-hover: #C67B5C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', 'PingFang SC', serif; }
    body { background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%); min-height: 100vh; background-attachment: fixed; color: var(--text); transition: background 0.4s; }

    h1, h2, h3, .btn, .btn-outline, .badge, .sort-btn, .logo { font-family: 'Noto Serif SC', serif; }

    .navbar { background: var(--navbar-bg); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); padding: 14px 28px; box-shadow: 0 4px 24px var(--shadow); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid var(--navbar-border); transition: background 0.4s, border-color 0.4s, box-shadow 0.4s; }
    .logo { font-size: 22px; font-weight: 600; color: var(--text); white-space: nowrap; display: flex; align-items: center; gap: 8px; transition: color 0.4s; }
    .logo svg { color: var(--accent); transition: color 0.4s; }
    .user-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .badge { background: var(--badge-bg); padding: 6px 16px; border-radius: 30px; font-size: 14px; color: var(--text-muted); font-weight: 500; transition: background 0.4s, color 0.4s; }

    .btn { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border: none; padding: 10px 22px; border-radius: 24px; cursor: pointer; font-weight: 550; font-size: 15px; transition: all 0.25s; white-space: nowrap; box-shadow: 0 4px 14px var(--btn-shadow); display: inline-flex; align-items: center; gap: 5px; }
    .btn:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); transform: translateY(-2px); box-shadow: 0 6px 20px var(--btn-shadow-hover); }
    .btn:active { transform: translateY(0); }
    .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); box-shadow: none; transition: all 0.25s, color 0.4s, border-color 0.4s; }
    .btn-outline:hover { background: var(--accent-light2); transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .logo span, .btn span, .sort-btn span { display: inline-flex; align-items: center; }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }

    .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 20px; padding: 22px; box-shadow: 0 4px 24px var(--shadow); text-align: center; transition: transform 0.2s, background 0.4s, border-color 0.4s, box-shadow 0.4s; border: 1px solid var(--card-border); }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-value { font-size: 2em; font-weight: 700; color: var(--accent); transition: color 0.4s; }
    .stat-label { font-size: 14px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; transition: color 0.4s; }

    .post-box { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 24px var(--shadow); border: 1px solid var(--card-border); transition: background 0.4s, border-color 0.4s, box-shadow 0.4s; }
    .input-field, textarea, select { width: 100%; padding: 12px 16px; border: 1.5px solid var(--input-border); border-radius: 16px; margin-bottom: 14px; font-size: 15px; outline: none; transition: all 0.2s; background: var(--input-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: var(--text); }
    textarea { resize: vertical; min-height: 80px; }
    .input-field:focus, textarea:focus, select:focus { border-color: var(--input-border-focus); box-shadow: 0 0 0 3px var(--accent-light); background: var(--card-bg); }
    .input-field::placeholder, textarea::placeholder { color: var(--text-light); }


    .anon-pill { display: inline-flex; align-items: center; gap: 6px; padding: 11px 16px; border-radius: 24px; cursor: pointer; font-size: 14px; border: 1.5px solid var(--input-border); color: var(--text-muted); background: var(--input-bg); transition: all 0.2s; user-select: none; }
    .anon-pill input { display: none; }
    .anon-pill .anon-dot { width: 10px; height: 10px; border-radius: 50%; background: #CCC; transition: all 0.2s; }
    .anon-pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .anon-pill.active .anon-dot { background: var(--accent); }
    /* 自定义下拉 */
    .select-pill { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-radius: 24px; cursor: pointer; font-size: 14px; border: 1.5px solid var(--input-border); color: var(--text); background: var(--input-bg); transition: all 0.2s; user-select: none; position: relative; overflow: visible; }
    .select-pill:hover { border-color: var(--accent); }
    .select-pill .select-arrow { font-size: 10px; color: var(--text-muted); margin-left: auto; }
    .select-drop { position: fixed; background: var(--modal-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 16px; box-shadow: 0 8px 24px var(--shadow-lg); border: 1px solid var(--card-border); overflow: hidden; z-index: 2000; }
    .select-drop div { padding: 10px 16px; cursor: pointer; font-size: 14px; color: var(--text); transition: background 0.15s; white-space: nowrap; }
    .select-drop div:hover { background: var(--accent-light2); }
    .sort-bar { display: flex; gap: 12px; margin-bottom: 20px; justify-content: space-between; flex-wrap: wrap; }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: var(--input-bg); border: 1.5px solid var(--input-border); padding: 8px 20px; border-radius: 24px; cursor: pointer; font-weight: 500; transition: all 0.2s; color: var(--text-muted); font-size: 14px; font-family: inherit; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border-color: var(--accent); }
    .sort-group { display: flex; gap: 8px; }
    .sort-btn { background: var(--input-bg); border: 1.5px solid var(--input-border); padding: 8px 16px; border-radius: 24px; cursor: pointer; font-weight: 500; transition: all 0.2s; color: var(--text-muted); display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-family: inherit; }
    .sort-btn:hover { border-color: var(--accent); color: var(--text); }
    .sort-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border-color: var(--accent); }

    .opinion-card { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 20px; padding: 22px; margin-bottom: 16px; box-shadow: 0 4px 16px var(--shadow); border: 1px solid var(--card-border); transition: box-shadow 0.2s, opacity 0.3s, background 0.4s, border-color 0.4s; position: relative; }
    .opinion-card:hover { box-shadow: 0 8px 24px rgba(61,35,20,0.08); }
    .owner-badge { position: absolute; top: -4px; left: 14px; background: rgba(198,123,92,0.8); backdrop-filter: blur(4px); color: white; font-size: 10px; padding: 2px 9px; border-radius: 10px; font-weight: 600; z-index: 5; }
    .card-delete-btn { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(0,0,0,0.12); color: white; font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; transition: background 0.2s; padding: 0; }
    .card-delete-btn:hover { background: rgba(199,86,74,0.7); }
    .card-delete-btn svg { width: 12px; height: 12px; }
    .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 15px; flex-shrink: 0; }
    .card-meta { flex: 1; min-width: 0; }
    .card-author { font-weight: 600; font-size: 14px; color: var(--text); display: block; }
    .card-time { font-size: 12px; color: var(--text-muted); }
    .target-tag { background: var(--accent-light); padding: 5px 14px; border-radius: 30px; font-size: 13px; color: var(--accent); font-weight: 600; transition: background 0.4s, color 0.4s; white-space: nowrap; }
    .card-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .card-content { color: var(--text); font-size: 14px; line-height: 1.7; margin-bottom: 10px; }
    .actions { display: flex; gap: 12px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
    .card-action { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; padding: 7px 16px; border-radius: 20px; transition: all 0.2s; font-size: 14px; font-weight: 500; height: 36px; box-sizing: border-box; border: 1px solid var(--card-border); background: var(--accent-light2); color: var(--text-muted); }
    .card-action.like-btn:hover { color: #C7564A; background: rgba(199,86,74,0.08); border-color: rgba(199,86,74,0.25); }
    .card-action.like-btn.liked { color: #C7564A; background: rgba(199,86,74,0.1); border-color: rgba(199,86,74,0.25); }
    .card-action.like-btn.liked svg { fill: #C7564A; }
    .card-action.star-badge { color: #E8913A; background: rgba(232,145,58,0.08); border-color: rgba(232,145,58,0.15); cursor: default; }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 1000; transition: background 0.4s; }
    .modal.active { display: flex; }
    .modal-content { background: var(--modal-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); width: 92%; max-width: 620px; max-height: 85vh; border-radius: 24px; padding: 24px; overflow-y: auto; box-shadow: 0 20px 50px var(--shadow-lg); border: 1px solid var(--card-border); transition: background 0.4s, border-color 0.4s, box-shadow 0.4s; }
    .reply-item { background: var(--accent-light2); padding: 12px 16px; border-radius: 18px; margin-bottom: 10px; color: var(--text); transition: background 0.4s, color 0.4s; }
    .close-icon { float: right; cursor: pointer; color: var(--text-muted); line-height: 1; transition: color 0.4s; }
    .close-icon:hover { color: var(--text); }
    .close-icon svg { width: 24px; height: 24px; }

    .star-rating { display: flex; gap: 6px; align-items: center; margin: 8px 0; }
    .star-svg { width: 30px; height: 30px; cursor: pointer; color: #DDD4C8; transition: color 0.15s, transform 0.15s; }
    .star-svg:hover { transform: scale(1.15); }
    .star-svg.active { color: #E8913A; fill: #E8913A; }

    .notification-bell { position: relative; cursor: pointer; margin-right: 8px; padding: 4px; border-radius: 12px; transition: background 0.2s; }
    .notification-bell svg { width: 26px; height: 26px; color: var(--text-muted); transition: color 0.4s; }
    .notification-bell:hover { background: var(--bell-hover); }
    .notification-dot { position: absolute; top: 0px; right: -2px; width: 10px; height: 10px; background: var(--dot-bg); border-radius: 50%; animation: blink 1s infinite; transition: background 0.4s; }
    .notification-dropdown { position: absolute; top: 55px; right: 20px; background: var(--notif-dropdown-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); width: 340px; max-height: 420px; overflow-y: auto; box-shadow: 0 16px 40px var(--shadow-lg); border-radius: 20px; padding: 12px; display: none; z-index: 100; border: 1px solid var(--card-border); transition: background 0.4s, border-color 0.4s, box-shadow 0.4s; }
    .notification-item { padding: 10px 14px; border-bottom: 1px solid var(--divider); font-size: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 4px; transition: background 0.15s, color 0.4s; color: var(--text); }
    .notification-item:hover { background: var(--notif-hover); }
    .notification-item.unread { background: var(--notif-unread); font-weight: 500; }
    .notification-item.read { color: var(--text-muted); }
    .notif-footer { text-align: center; padding: 10px 0 2px; border-top: 1px solid var(--divider); margin-top: 8px; transition: border-color 0.4s; }
    .notif-footer button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 16px; transition: background 0.2s, color 0.4s; }
    .notif-footer button:hover { background: var(--accent-light2); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 16px; color: white; font-weight: 500; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .toast.success { background: var(--toast-success); }
    .toast.error { background: var(--toast-error); }
    .toast.warn { background: var(--toast-warn); }

      if (uploadRes.error) {
        for (var j = 0; j < results.length; j++) {
          await supabaseClient.storage.from('opinion-photos').remove([results[j]._path]);
        }
        throw new Error('图片上传失败：' + uploadRes.error.message);
      }
      var urlRes = supabaseClient.storage.from('opinion-photos').getPublicUrl(filePath);
      results.push({ url: urlRes.data.publicUrl, name: file.name, _path: filePath });
    }
    uploadedPhotoPaths = results.map(function(r) { return r._path; });
    return results.map(function(r) { return { url: r.url, name: r.name }; });

  async function updateDashboard() {
    var res = await supabaseClient.from('opinions').select('*');
    if (res.error) return;
    var ops = res.data;
    var total = ops.length;
    var closed = ops.filter(function(o) { return o.status === 'closed'; }).length;
    var resolveRate = total ? Math.round((closed / total) * 100) + '%' : '0%';

    var res2 = await supabaseClient.from('ratings').select('score');
    var scores = res2.data ? res2.data.map(function(r) { return r.score; }) : [];
    var avgSat = scores.length ? (scores.reduce(function(a,b){return a+b;},0) / scores.length).toFixed(1) : '0.0';

    var closedOps = ops.filter(function(o) { return o.closed_at && o.status === 'closed'; });
    var avgTime = '--';
    if (closedOps.length > 0) {
      var totalMs = 0;
      closedOps.forEach(function(o) { var start = o.reopened_at ? new Date(o.reopened_at) : new Date(o.created_at); totalMs += new Date(o.closed_at) - start; });
      var avgHrs = (totalMs / closedOps.length) / (1000 * 60 * 60);
      avgTime = avgHrs < 1 ? Math.round(avgHrs * 60) + '分钟' : avgHrs.toFixed(1) + '小时';
    }

    var vals = document.querySelectorAll('#dashboard .stat-value');
    if (vals.length >= 4) {
      vals[0].textContent = total;
      vals[1].textContent = resolveRate;
      vals[2].textContent = avgSat;
      vals[3].textContent = avgTime;
    }
  }

    query = query.order('created_at', { ascending: false });
    var res = await query;
    if (res.error) { hideLoading(); toast('加载失败：' + res.error.message, 'error'); return; }

    var ratingsRes = await supabaseClient.from('ratings').select('opinion_id, score');
    var ratingsMap = {};
    (ratingsRes.data || []).forEach(function(r) {
      if (!ratingsMap[r.opinion_id]) ratingsMap[r.opinion_id] = [];
      ratingsMap[r.opinion_id].push(r.score);
    });

    // 获取当前用户点赞了哪些意见
    userLikedSet = {};
    if (currentUser && currentUser.id) {
      var likesRes = await supabaseClient.from('likes').select('opinion_id').eq('user_id', currentUser.id);
      (likesRes.data || []).forEach(function(l) { userLikedSet[l.opinion_id] = true; });
    }

    hideLoading();
    opinionsData = (res.data || []).map(function(op) {
      var scores = ratingsMap[op.id] || [];
      return {
        ...op,
        likeCount: op.likes?.[0]?.count || 0,
        replyCount: op.replies?.[0]?.count || 0,
        avgRating: scores.length ? (scores.reduce(function(s, r) { return s + r; }, 0) / scores.length).toFixed(1) : null,
        liked: !!userLikedSet[op.id]
      };
    });
    if (currentSort === 'heat') {
      opinionsData.sort(function(a,b) { return b.likeCount - a.likeCount || new Date(b.created_at) - new Date(a.created_at); });
    }
    renderOpinions();
  }

  function getProgress(op) {
    if (op.status === 'open') return 0;
    if (op.status === 'in_progress') return 1;
    if (op.status === 'closed') return op.avgRating ? 4 : 2;
    return 0;
  }

  var AVATAR_COLORS = ['#C67B5C','#5B8C6B','#4A90B8','#B87C4A','#7B6BA8','#B8556A','#5A9E8F','#C49B3F'];
  function getAvatarColor(name) {
    var h = 0; for (var i = 0; i < name.length; i++) { h = ((h << 5) - h) + name.charCodeAt(i); h |= 0; }
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
  }

  function getStatusStyle(status) {
    if (status === 'open') return 'background:rgba(232,145,58,0.12);color:#C67B3A;';
    if (status === 'in_progress') return 'background:rgba(91,140,107,0.12);color:#3D6B4D;';
    if (status === 'closed') return 'background:rgba(85,85,85,0.1);color:#555;';
    return '';
  }

  function renderOpinions() {
    var container = document.getElementById('opinionsList');
    if (opinionsData.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--text-muted);"><div style="margin-bottom:12px;">' + getIcon('clipboard', 48) + '</div><p>暂无意见，快来发布第一条吧！</p></div>';
      return;
    }
    container.innerHTML = opinionsData.map(function(op) {
      var progress = getProgress(op);
      var steps = ['问题提出', '解决中', '已完结', '已评分'];
      var statusLabels = {
        open: getIcon('hourglass', 14) + ' 待处理',
        in_progress: getIcon('clock', 14) + ' 解决中',
        closed: getIcon('check-circle', 14) + ' 已完结'
      };
      var isOwner = currentUser.id === op.author_id;
      var canDelete = isOwner || currentUser.role === 'admin';
      var authorName = op.is_anonymous ? '匿名' : (op.author_name || '匿名');
      var avatarColor = getAvatarColor(authorName);
      var initial = authorName.charAt(0);
      return '<div class="opinion-card" style="position:relative;">' +
        (isOwner ? '<span class="owner-badge">我的意见</span>' : '') +
        (canDelete ? '<button class="card-delete-btn" data-id="' + op.id + '" data-author="' + op.author_id + '" title="删除" onclick="event.stopPropagation()">' + getIcon('x', 14) + '</button>' : '') +
        '<div class="card-top">' +
          '<div class="card-avatar" style="background:' + avatarColor + '">' + initial + '</div>' +
          '<div class="card-meta">' +
            '<span class="card-author">' + escapeHtml(authorName) + '</span>' +
            '<span class="card-time">' + new Date(op.created_at).toLocaleString() + '</span>' +
          '</div>' +
          '<span class="target-tag">@' + (op.assigned_to || op.target_role) + '</span>' +
        '</div>' +
        '<div class="card-title">' + escapeHtml(op.title) + '</div>' +
        '<div class="card-content">' + escapeHtml(op.content) + '</div>' +
        renderPhotoStrip(op.photos, 'small') +
        '<div class="stepper">' + steps.map(function(s, i) {
          var cls = i < progress ? 'done' : i === progress ? 'current' : '';
          var icon = i < progress || (i === progress && i === 3) ? getIcon('check-circle', 14).replace(/width="24"/,'width="14"').replace(/height="24"/,'height="14"') : (i + 1);
          var html = '<div class="step-node"><div class="step-dot ' + cls + '">' + icon + '</div><span class="step-caption ' + cls + '">' + s + '</span></div>';
          if (i < steps.length - 1) html += '<div class="step-line ' + (i < progress ? 'done' : '') + '"></div>';
          return html;
        }).join('') + '</div>' +
        '<div class="actions">' +
          '<span class="card-action like-btn' + (op.liked ? ' liked' : '') + '" data-id="' + op.id + '" onclick="event.stopPropagation()">' + getIcon('heart', 16) + ' <span>' + op.likeCount + '</span></span>' +
          '<span class="card-action star-badge">' + getIcon('star-filled', 16) + ' ' + (op.avgRating || '暂无') + '</span>' +
          '<span style="flex:1;"></span>' +
          '<button class="card-action" style="cursor:pointer;" onclick="event.stopPropagation();openDetail(\'' + op.id + '\')">查看详情</button>' +
        '</div>' +
      '</div>';
    }).join('');

    // 卡片删除按钮
    container.querySelectorAll('.card-delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var opId = btn.dataset.id;
        var authorId = btn.dataset.author;
        var isAdminDelete = currentUser.role === 'admin' && currentUser.id !== authorId;
        var doDelete = async function(reason) {
          var res = await supabaseClient.from('opinions').delete().eq('id', opId);
          if (res.error) { toast('删除失败：' + res.error.message, 'error'); return; }
          if (isAdminDelete) {
            var op = opinionsData.find(function(o) { return o.id === opId; });
            if (op) addNotification(authorId, 'opinion_delete', opId, op.title, reason);
          }
          toast('已删除');
          loadOpinions(); updateDashboard();
        };
        showConfirm('删除意见', '确定删除这条意见吗？\n此操作不可撤销。', function() {
          if (isAdminDelete) {
            showPrompt('删除原因', '请输入删除理由（将通知发布者）：', '输入删除理由…', function(reason) {
              if (!reason || !reason.trim()) { toast('必须填写删除理由', 'warn'); return; }
              doDelete(reason.trim());
            });
          } else {
            doDelete('');
          }
        }, true);
      });
    });

    container.querySelectorAll('.like-btn').forEach(function(btn) {
      btn.addEventListener('click', async function() {
        if (currentUser.role === 'guest') { toast('请先登录', 'warn'); return; }
        var opId = btn.dataset.id;
        var liked = btn.classList.contains('liked');
        if (liked) {
          await supabaseClient.from('likes').delete().eq('opinion_id', opId).eq('user_id', currentUser.id);
        } else {
          var insRes = await supabaseClient.from('likes').insert({ opinion_id: opId, user_id: currentUser.id });
          if (insRes.error) { toast('操作失败', 'error'); return; }
        }
        loadOpinions();
      });
    });
  }

  document.getElementById('submitOpinionBtn').addEventListener('click', async function() {
    if (currentUser.role === 'guest') { sessionStorage.setItem('login_redirect',location.href);window.location.href='index.html'; return; }

  // 照片选择

    document.getElementById('modalTitle').innerText = op.title;

    document.getElementById('modalMeta').innerHTML = '发布者：' + (op.is_anonymous ? '匿名' : op.author_name) + ' | 状态：' + (statusText[op.status] || op.status);
    document.getElementById('modalContent').innerText = op.content;

    var mp = document.getElementById('modalPhotos');
    mp.innerHTML = ph;
    mp.style.display = ph ? 'flex' : 'none';

    document.getElementById('repliesContainer').innerHTML = (res.data || []).map(function(r) {
      return '<div class="reply-item"><strong>' + r.user_name + '</strong>：' + escapeHtml(r.content) +
        ' <span style="font-size:12px;color:var(--text-muted);">' + new Date(r.created_at).toLocaleString() + '</span></div>';
    }).join('') || '<div style="text-align:center;color:var(--text-light);padding:20px;">暂无回复</div>';
    document.getElementById('replyInput').value = '';

    if (currentUser.role === 'guest') {
      document.getElementById('replyInputArea').style.display = 'none';
    } else {
      document.getElementById('replyInputArea').style.display = 'flex';
    }

    var isAdmin = currentUser.role === 'admin';
    document.getElementById('adminActions').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('actionStart').style.display = 'none';
    document.getElementById('actionInProgress').style.display = 'none';
    document.getElementById('actionClosed').style.display = 'none';
    if (isAdmin) {
      if (op.status === 'open') document.getElementById('actionStart').style.display = 'block';
      else if (op.status === 'in_progress') document.getElementById('actionInProgress').style.display = 'block';
      else if (op.status === 'closed') document.getElementById('actionClosed').style.display = 'block';

    var isAuthor = currentUser.id === op.author_id;

    if (canRate) {
      // 查询是否已评分
      var myRatingRes = await supabaseClient.from('ratings').select('score').eq('opinion_id', currentOpinionId).eq('user_id', currentUser.id).maybeSingle();

        s.classList.toggle('active', parseInt(s.dataset.val) <= myScore);

      document.getElementById('ratingText').textContent = myScore ? myScore + '.0' : '未评分';
    }
    document.getElementById('detailModal').classList.add('active');
  };

    document.getElementById('notificationDot').style.display = notifs.length ? 'block' : 'none';
  }
  function renderNotifDropdown(showAll) {
    var dropdown = document.getElementById('notificationDropdown');
    var allNotifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id; }).sort(function(a,b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });
    var unreadNotifs = allNotifs.filter(function(n) { return !n.read; });
    var readNotifs = allNotifs.filter(function(n) { return n.read; });
    var displayNotifs = showAll ? allNotifs : unreadNotifs;

    var html = '';
    if (displayNotifs.length === 0) {
      html = '<div style="padding:16px;text-align:center;color:var(--text-muted);">' + (showAll ? '暂无任何通知' : '暂无新通知') + '</div>';
    } else {
      html = displayNotifs.map(function(n) {
        var icon = getIcon('bell', 16), label = '', detail = '', opinionId = n.opinion_id || '', postId = n.post_id || '';
        if (n.type === 'reply') { icon = getIcon('message-circle', 16); label = '有新回复'; detail = n.opinion_title; }
        else if (n.type === 'closed') { icon = getIcon('check-circle', 16); label = '已完结'; detail = n.opinion_title; }
        else if (n.type === 'reassign') { icon = getIcon('refresh-cw', 16); label = '已重分配'; detail = n.opinion_title; }
        else if (n.type === 'in_progress') { icon = getIcon('clock', 16); label = '问题开始处理'; detail = n.opinion_title; }
        else if (n.type === 'opinion_delete') { icon = getIcon('trash', 16); label = '已被管理员删除'; detail = n.opinion_title; }
        else if (n.type === 'treehole_delete') { icon = getIcon('trash', 16); label = '便利贴被删除'; detail = (n.content || '').substring(0, 40); }
        else if (n.type === 'treehole_reply') { icon = getIcon('message-circle', 16); label = '便利贴有新回复'; detail = (n.content || '').substring(0, 40); }
        var timeHtml = '<br><span style="font-size:11px;color:var(--text-light);">' + new Date(n.created_at).toLocaleString() + '</span>';
        return '<div class="notification-item ' + (n.read ? 'read' : 'unread') + '" data-id="' + n.id + '" data-type="' + n.type + '" data-opinion="' + opinionId + '" data-post-id="' + postId + '">' +
          icon + ' ' + (detail ? escapeHtml(detail) + ' - ' : '') + label + timeHtml +
        '</div>';
      }).join('');
    }

    if (displayNotifs.length > 0) {
      html += '<div style="text-align:center;font-size:11px;color:var(--text-light);padding:6px 0 2px;">' + ' 点击消息即可标为已读</div>';
    }
    if (!showAll) {
      if (unreadNotifs.length === 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 14) + ' 查看历史通知 →</button></div>';
      } else if (readNotifs.length > 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 14) + ' 查看全部消息 →</button></div>';
      }
    } else {
      html += '<div class="notif-footer"><button id="showUnreadBtn">← 仅看未读</button></div>';
    }

    dropdown.innerHTML = html;

    dropdown.querySelectorAll('.notification-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var notifs = getNotifs();
        var idx = notifs.findIndex(function(n) { return n.id === item.dataset.id; });
        if (idx !== -1) { notifs[idx].read = true; saveNotifs(notifs); }
        updateNotifDot();
        if (item.dataset.type === 'treehole_delete' || item.dataset.type === 'treehole_reply') {
          window.location.href = 'treehole.html';
        } else if (item.dataset.opinion) {
          openDetail(item.dataset.opinion);
        }
        dropdown.style.display = 'none';
      });
    });

    var showAllBtn = document.getElementById('showAllNotifsBtn');
    if (showAllBtn) {
      showAllBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(true);
      });
    }
    var showUnreadBtn = document.getElementById('showUnreadBtn');
    if (showUnreadBtn) {
      showUnreadBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(false);
      });
    }
  }

  document.getElementById('notificationBell').addEventListener('click', function(e) {
    e.stopPropagation();
    var dropdown = document.getElementById('notificationDropdown');
    if (dropdown.style.display === 'block') {
      dropdown.style.display = 'none';
    } else {
      renderNotifDropdown(false);
      dropdown.style.display = 'block';
    }
  });
  document.addEventListener('click', function() {
    document.getElementById('notificationDropdown').style.display = 'none';
  });

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ===== 新手教程 =====
  var tutorialSteps = [
    { sel: '#mainPostBox', fallback: '#postFormArea', text: '📝 这里是<b>意见箱</b>。填写标题和内容，选择反馈给哪位班委，就可以提交你的意见。可以添加图片辅助说明，也可以选择匿名。', pos: 'bottom' },
    { sel: '.sort-bar', text: '🔍 下方的卡片展示每条意见的处理进度。你可以点赞、查看详情，追踪问题的解决状态。', pos: 'bottom' }
  ];
  var tutorialStepO = 0;
  function showTutorialStep(n) {
    var step = tutorialSteps[n]; var el = document.querySelector(step.sel);
    if (!el) { nextTutorialStepO(); return; }
    var hidden = false; var p = el; while (p) { if (window.getComputedStyle(p).display === 'none') { hidden = true; break; } p = p.parentElement; }
    var rect = el.getBoundingClientRect();
    if ((hidden || (rect.width === 0 && rect.height === 0)) && step.fallback) {
      var fb = document.querySelector(step.fallback);
      if (fb) { el = fb; hidden = false; rect = el.getBoundingClientRect(); }
    }
    if (hidden || (rect.width === 0 && rect.height === 0)) {
      document.getElementById('tutorialHighlight').style.display = 'none';
    } else {
      document.getElementById('tutorialHighlight').style.display = 'block';
      document.getElementById('tutorialHighlight').style.top = (rect.top-6)+'px';
      document.getElementById('tutorialHighlight').style.left = (rect.left-6)+'px';
      document.getElementById('tutorialHighlight').style.width = (rect.width+12)+'px';
      document.getElementById('tutorialHighlight').style.height = (rect.height+12)+'px';
    }
    document.getElementById('tutorialBubble').style.display = 'block';
    document.getElementById('tutorialText').innerHTML = step.text;
    document.getElementById('tutorialNext').textContent = '下一步 →';
    var bw=380, bh=160, bx, by;
    if (hidden || (rect.width === 0 && rect.height === 0)) {
      bx = window.innerWidth/2 - bw/2; by = window.innerHeight/2 - bh/2;
    } else {
      bx=rect.left+rect.width/2-bw/2; by=rect.bottom+12;
    }
    bx=Math.max(10,Math.min(bx,window.innerWidth-bw-10));by=Math.max(10,Math.min(by,window.innerHeight-bh-10));
    document.getElementById('tutorialBubble').style.top=by+'px';document.getElementById('tutorialBubble').style.left=bx+'px';
    document.getElementById('tutorialOverlay').style.display = 'block';
    tutorialStepO=n;sessionStorage.setItem('tutorial_step',n+4);sessionStorage.setItem('tutorial_page','opinions');
  }
  function nextTutorialStepO(){tutorialStepO++;if(tutorialStepO<tutorialSteps.length)showTutorialStep(tutorialStepO);else{sessionStorage.setItem('tutorial_step',8);sessionStorage.setItem('tutorial_page','treehole');window.location.href='treehole.html';}}
  function endTutorial(){document.getElementById('tutorialOverlay').style.display='none';document.getElementById('tutorialHighlight').style.display='none';document.getElementById('tutorialBubble').style.display='none';localStorage.setItem('tutorial_done','1');sessionStorage.removeItem('tutorial_step');if(currentUser && currentUser.id){supabaseClient.from('profiles').update({tutorial_done:true}).eq('id',currentUser.id)}}
  document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('tutorialNext').addEventListener('click',nextTutorialStepO);
    document.getElementById('tutorialSkip').addEventListener('click',endTutorial);
    window.addEventListener('scroll',function(){if(document.getElementById('tutorialOverlay').style.display==='block')showTutorialStep(tutorialStepO);});
    if(!localStorage.getItem('tutorial_done')&&sessionStorage.getItem('tutorial_page')==='opinions'){tutorialStepO=parseInt(sessionStorage.getItem('tutorial_step')||'0')-6;setTimeout(function(){showTutorialStep(Math.max(0,tutorialStepO));},600);}
  });

  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
  // 输入弹窗按钮
  document.getElementById('promptOkBtn').addEventListener('click', function() {
    var val = document.getElementById('promptInput').value.trim();
    if (!val) { toast('请输入内容', 'warn'); return; }
    document.getElementById('promptModal').classList.remove('active');
    if (_promptCallback) _promptCallback(val);
  });
  document.getElementById('promptCancelBtn').addEventListener('click', function() {
    document.getElementById('promptModal').classList.remove('active');
  });
  document.getElementById('promptModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) document.getElementById('promptModal').classList.remove('active');
  });

  initIcons();
  init();
</script>
<div class="tutorial-overlay" id="tutorialOverlay" style="display:none;"></div>
<div class="tutorial-highlight" id="tutorialHighlight" style="display:none;"></div>
<div class="tutorial-bubble" id="tutorialBubble" style="display:none;">
  <div class="tutorial-text" id="tutorialText"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <button class="tutorial-skip" id="tutorialSkip">跳过教程</button>
    <button class="tutorial-btn" id="tutorialNext">下一步 →</button>
  </div>
</div>
