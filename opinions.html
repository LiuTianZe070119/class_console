<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级办事通 · 意见箱</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', 'PingFang SC', serif; }
    body { background: linear-gradient(160deg, #FDF6F0 0%, #F8EDE3 40%, #F2E0D0 100%); min-height: 100vh; }

    h1, h2, h3, .btn, .btn-outline, .badge, .sort-btn, .logo { font-family: 'Noto Serif SC', serif; }

    .navbar { background: rgba(255,255,255,0.18); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); padding: 14px 28px; box-shadow: 0 4px 24px rgba(61,35,20,0.05); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.4); }
    .logo { font-size: 22px; font-weight: 600; color: #3D2314; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .logo svg { color: #C67B5C; }
    .user-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .badge { background: rgba(198,123,92,0.10); padding: 6px 16px; border-radius: 30px; font-size: 14px; color: #8B7355; font-weight: 500; }

    .btn { background: linear-gradient(135deg, #C67B5C, #B5651D); color: white; border: none; padding: 10px 22px; border-radius: 24px; cursor: pointer; font-weight: 550; font-size: 15px; transition: all 0.25s; white-space: nowrap; box-shadow: 0 4px 14px rgba(181,101,29,0.18); display: inline-flex; align-items: center; gap: 5px; }
    .btn:hover { background: linear-gradient(135deg, #D4946A, #C67B5C); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(181,101,29,0.28); }
    .btn:active { transform: translateY(0); }
    .btn-outline { background: transparent; border: 1.5px solid #C67B5C; color: #C67B5C; box-shadow: none; }
    .btn-outline:hover { background: rgba(198,123,92,0.06); transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .logo span, .btn span, .sort-btn span { display: inline-flex; align-items: center; }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }

    .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: rgba(255,255,255,0.45); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 20px; padding: 22px; box-shadow: 0 4px 24px rgba(61,35,20,0.05); text-align: center; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.4); }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-value { font-size: 2em; font-weight: 700; color: #C67B5C; }
    .stat-label { font-size: 14px; color: #8B7355; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; }

    .post-box { background: rgba(255,255,255,0.45); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 24px rgba(61,35,20,0.05); border: 1px solid rgba(255,255,255,0.4); }
    .input-field, textarea, select { width: 100%; padding: 12px 16px; border: 1.5px solid #E0D0C0; border-radius: 16px; margin-bottom: 14px; font-size: 15px; outline: none; transition: all 0.2s; background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: #3D2314; }
    textarea { resize: vertical; min-height: 80px; }
    .input-field:focus, textarea:focus, select:focus { border-color: #C67B5C; box-shadow: 0 0 0 3px rgba(198,123,92,0.1); background: rgba(255,255,255,0.75); }
    .input-field::placeholder, textarea::placeholder { color: #B8A090; }

    .sort-bar { display: flex; gap: 12px; margin-bottom: 20px; }
    .sort-btn { background: rgba(255,255,255,0.5); border: 1.5px solid #E0D0C0; padding: 8px 24px; border-radius: 24px; cursor: pointer; font-weight: 500; transition: all 0.2s; color: #8B7355; display: inline-flex; align-items: center; gap: 5px; }
    .sort-btn:hover { border-color: #C67B5C; color: #3D2314; }
    .sort-btn.active { background: linear-gradient(135deg, #C67B5C, #B5651D); color: white; border-color: #C67B5C; }

    .opinion-card { background: rgba(255,255,255,0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 20px; padding: 22px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(61,35,20,0.04); border: 1px solid rgba(255,255,255,0.4); transition: box-shadow 0.2s; }
    .opinion-card:hover { box-shadow: 0 8px 24px rgba(61,35,20,0.08); }
    .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .target-tag { background: rgba(198,123,92,0.08); padding: 4px 14px; border-radius: 30px; font-size: 13px; color: #C67B5C; font-weight: 500; }
    .actions { display: flex; gap: 16px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
    .like-btn { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; color: #8B7355; padding: 4px 12px; border-radius: 20px; transition: all 0.2s; user-select: none; }
    .like-btn:hover { color: #C7564A; background: rgba(199,86,74,0.06); }
    .like-btn.liked { color: #C7564A; }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(61,35,20,0.25); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: rgba(255,255,255,0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); width: 92%; max-width: 620px; max-height: 85vh; border-radius: 24px; padding: 24px; overflow-y: auto; box-shadow: 0 20px 50px rgba(61,35,20,0.15); border: 1px solid rgba(255,255,255,0.5); }
    .reply-item { background: rgba(198,123,92,0.04); padding: 12px 16px; border-radius: 18px; margin-bottom: 10px; color: #3D2314; }
    .close-icon { float: right; cursor: pointer; color: #8B7355; line-height: 1; transition: color 0.2s; }
    .close-icon:hover { color: #3D2314; }
    .close-icon svg { width: 24px; height: 24px; }

    .star-rating { display: flex; gap: 6px; align-items: center; margin: 8px 0; }
    .star-svg { width: 30px; height: 30px; cursor: pointer; color: #DDD4C8; transition: color 0.15s, transform 0.15s; }
    .star-svg:hover { transform: scale(1.15); }
    .star-svg.active { color: #E8913A; fill: #E8913A; }

    .notification-bell { position: relative; cursor: pointer; margin-right: 8px; padding: 4px; border-radius: 12px; transition: background 0.2s; }
    .notification-bell svg { width: 26px; height: 26px; color: #8B7355; }
    .notification-bell:hover { background: rgba(198,123,92,0.08); }
    .notification-dot { position: absolute; top: 0px; right: -2px; width: 10px; height: 10px; background: #C7564A; border-radius: 50%; animation: blink 1s infinite; }
    .notification-dropdown { position: absolute; top: 55px; right: 20px; background: rgba(255,255,255,0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); width: 340px; max-height: 420px; overflow-y: auto; box-shadow: 0 16px 40px rgba(61,35,20,0.12); border-radius: 20px; padding: 12px; display: none; z-index: 100; border: 1px solid rgba(255,255,255,0.5); }
    .notification-item { padding: 10px 14px; border-bottom: 1px solid rgba(139,115,85,0.08); font-size: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 4px; transition: background 0.15s; color: #3D2314; }
    .notification-item:hover { background: rgba(198,123,92,0.05); }
    .notification-item.unread { background: rgba(198,123,92,0.06); font-weight: 500; }
    .notification-item.read { color: #8B7355; }
    .notif-footer { text-align: center; padding: 10px 0 2px; border-top: 1px solid rgba(139,115,85,0.08); margin-top: 8px; }
    .notif-footer button { background: none; border: none; color: #C67B5C; cursor: pointer; font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 16px; transition: background 0.2s; }
    .notif-footer button:hover { background: rgba(198,123,92,0.06); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 16px; color: white; font-weight: 500; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .toast.success { background: rgba(93,155,111,0.92); }
    .toast.error { background: rgba(199,86,74,0.92); }
    .toast.warn { background: rgba(232,145,58,0.92); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #E8D8C8; border-top-color: #C67B5C; border-radius: 50%; animation: spin 0.6s linear infinite; }

    /* 照片上传 */
    .photo-add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: 2px dashed #D0C0B0; border-radius: 18px; cursor: pointer; color: #8B7355; font-size: 14px; font-weight: 500; transition: all 0.2s; background: rgba(255,255,255,0.35); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); user-select: none; }
    .photo-add-btn:hover { border-color: #C67B5C; color: #C67B5C; background: rgba(255,255,255,0.55); }
    .photo-add-btn.disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
    .photo-add-btn svg { flex-shrink: 0; }
    .photo-preview-strip { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .photo-preview-item { position: relative; width: 90px; height: 90px; border-radius: 14px; overflow: visible; border: 2px solid rgba(198,123,92,0.18); background: rgba(255,255,255,0.5); box-shadow: 0 2px 10px rgba(61,35,20,0.06); transition: border-color 0.2s; }
    .photo-preview-item:hover { border-color: rgba(198,123,92,0.5); }
    .photo-preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .photo-preview-remove { position: absolute; top: -4px; right: -4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(199,86,74,0.9); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; line-height: 1; padding: 0; transition: all 0.15s; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .photo-preview-remove:hover { background: #C7564A; transform: scale(1.12); }
    .photo-strip { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .photo-strip .photo-thumb { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; cursor: pointer; border: 1.5px solid rgba(198,123,92,0.12); transition: transform 0.2s, box-shadow 0.2s; background: rgba(255,255,255,0.4); }
    .photo-strip .photo-thumb:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(61,35,20,0.12); border-color: rgba(198,123,92,0.35); }
    .modal-photos { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; padding: 14px; background: rgba(255,255,255,0.3); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); border-radius: 18px; border: 1px solid rgba(255,255,255,0.3); }
    .modal-photos img { max-width: 100%; max-height: 320px; border-radius: 14px; object-fit: contain; cursor: pointer; border: 1.5px solid rgba(198,123,92,0.12); transition: transform 0.2s; background: rgba(255,255,255,0.5); }
    .modal-photos img:hover { transform: scale(1.03); }
    .modal-photos.single img { max-width: 100%; max-height: 380px; }
    /* 图片灯箱 */
    .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 4000; align-items: center; justify-content: center; cursor: pointer; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 92%; max-height: 88vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); object-fit: contain; }
    .lightbox-close { position: absolute; top: 20px; right: 28px; color: white; font-size: 36px; cursor: pointer; z-index: 4001; line-height: 1; transition: opacity 0.2s; }
    .lightbox-close:hover { opacity: 0.7; }
    @media (max-width: 640px) { .photo-preview-item { width: 70px; height: 70px; border-radius: 10px; } .photo-strip .photo-thumb { width: 64px; height: 64px; border-radius: 10px; } .modal-photos img { max-height: 220px; } .photo-preview-remove { width: 18px; height: 18px; top: -3px; right: -3px; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(253,246,240,0.6); z-index: 999; align-items: center; justify-content: center; }
    .loading-overlay.active { display: flex; }

    .rating-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(61,35,20,0.3); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .rating-popup.active { display: flex; }
    .rating-popup-content { background: rgba(255,255,255,0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); width: 92%; max-width: 500px; border-radius: 28px; padding: 32px 28px; text-align: center; box-shadow: 0 24px 60px rgba(61,35,20,0.2); animation: popIn 0.3s ease; border: 1px solid rgba(255,255,255,0.5); }
    @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .rating-popup-content .final-reply-box { background: rgba(198,123,92,0.06); border-left: 4px solid #C67B5C; padding: 16px 20px; border-radius: 14px; margin: 16px 0; text-align: left; color: #3D2314; font-size: 15px; line-height: 1.6; max-height: 180px; overflow-y: auto; }
    .rating-popup-content .star-rating-popup { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
    .rating-popup-content .star-popup { width: 44px; height: 44px; cursor: pointer; color: #DDD4C8; transition: color 0.15s, transform 0.15s; }
    .rating-popup-content .star-popup:hover { transform: scale(1.2); }
    .rating-popup-content .star-popup.active { color: #E8913A; fill: #E8913A; }
    .rating-popup-content .btn-submit { background: linear-gradient(135deg, #C67B5C, #B5651D); color: white; border: none; padding: 14px 48px; border-radius: 24px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 4px 16px rgba(181,101,29,0.2); }
    .rating-popup-content .btn-submit:hover { background: linear-gradient(135deg, #D4946A, #C67B5C); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(181,101,29,0.3); }
    .rating-popup-content .btn-skip { background: none; border: none; color: #8B7355; cursor: pointer; margin-top: 12px; font-size: 14px; text-decoration: underline; }

    .stepper { display: flex; align-items: center; justify-content: center; margin: 18px 0 6px; padding: 0 8px; }
    .step-node { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; background: #EDE0D4; color: #8B7355; transition: all 0.35s; position: relative; }
    .step-dot.done { background: #5D9B6F; color: white; }
    .step-dot.current { background: #C67B5C; color: white; box-shadow: 0 0 0 6px rgba(198,123,92,0.12); }
    .step-line { flex: 1; height: 3px; background: #EDE0D4; margin: 0 2px 20px; border-radius: 2px; transition: background 0.35s; min-width: 16px; }
    .step-line.done { background: #5D9B6F; }
    .step-caption { font-size: 11px; color: #8B7355; margin-top: 5px; white-space: nowrap; transition: color 0.3s; font-weight: 500; }
    .step-caption.done { color: #5D9B6F; }
    .step-caption.current { color: #C67B5C; font-weight: 650; }

    .site-footer { text-align: center; padding: 24px 20px; margin-top: 48px; color: #B09080; font-size: 13px; position: relative; z-index: 1; }
    .site-footer .footer-divider { width: 40px; height: 2px; background: rgba(198,123,92,0.2); margin: 0 auto 14px; border-radius: 1px; }
    .site-footer a { color: #8B7355; text-decoration: none; transition: color 0.2s; display: inline-flex; align-items: center; gap: 4px; }
    .site-footer a:hover { color: #C67B5C; }
    .site-footer a svg { width: 14px; height: 14px; }
    .site-footer .footer-links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 4px; }

    @media (max-width: 640px) {
      .navbar { padding: 10px 16px; }
      .logo { font-size: 18px; }
      .container { padding: 0 12px; }
      .dashboard { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 16px; }
      .stat-value { font-size: 1.5em; }
      .opinion-card { padding: 16px; }
      .actions { gap: 10px; }
      .modal-content { width: 96%; padding: 16px; border-radius: 20px; }
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner" style="width:44px;height:44px;border-width:4px;"></div></div>
<div class="toast-container" id="toastContainer"></div>

<div class="navbar">
  <div class="logo"><span id="logoIcon"></span> 意见箱</div>
  <div class="user-info">
    <div class="notification-bell" id="notificationBell"><span id="bellIcon"></span><span class="notification-dot" id="notificationDot" style="display:none;"></span></div>
    <button class="btn-outline btn" onclick="window.location.href='main.html'"><span id="backIcon"></span>返回办事通</button>
  </div>
  <div class="notification-dropdown" id="notificationDropdown"></div>
</div>

<div class="container">
  <div class="dashboard" id="dashboard"></div>

  <div class="post-box">
    <h3 style="margin-bottom:16px; color:#3D2314; display:flex; align-items:center; gap:8px;"><span id="editIconH3"></span> 提出意见或问题</h3>
    <input type="text" id="titleInput" class="input-field" placeholder="意见标题（必填）">
    <textarea id="contentInput" rows="3" placeholder="详细描述你的意见或问题..."></textarea>
    <div class="photo-upload-area">
      <label class="photo-add-btn" for="photoInput" id="photoAddLabel"><span id="cameraIcon"></span> 添加图片（可选，最多3张）</label>
      <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none;">
      <div class="photo-preview-strip" id="photoPreviewStrip"></div>
    </div>
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <select id="targetSelect" style="flex:2; min-width:140px;">
        <option value="班长">反馈给：班长</option>
        <option value="团支书">团支书</option>
        <option value="学习委员">学习委员</option>
        <option value="生活委员">生活委员</option>
        <option value="班主任">班主任</option>
      </select>
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer; white-space:nowrap; color:#3D2314;">
        <input type="checkbox" id="anonymousCheck"> 匿名发布
      </label>
      <button class="btn" id="submitOpinionBtn">发布</button>
    </div>
  </div>

  <div class="sort-bar">
    <button class="sort-btn active" data-sort="heat"><span id="flameIcon1"></span> 按热度</button>
    <button class="sort-btn" data-sort="time"><span id="clockIcon1"></span> 按时间</button>
  </div>

  <div id="opinionsList"></div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal">
  <div class="modal-content">
    <span class="close-icon" onclick="closeModal()"><span id="closeModalIcon"></span></span>
    <h3 id="modalTitle" style="color:#3D2314; padding-right:30px;"></h3>
    <div id="modalMeta" style="margin:12px 0; color:#8B7355; font-size:14px;"></div>
    <div id="modalContent" style="margin:12px 0; color:#3D2314; font-size:15px; line-height:1.7; white-space:pre-wrap;"></div>
    <div class="modal-photos" id="modalPhotos" style="display:none;"></div>
    <div id="repliesContainer" style="max-height:300px; overflow-y:auto; margin-bottom:16px;"></div>
    <div id="replyInputArea" style="display:flex; gap:8px; margin-bottom:12px;">
      <input type="text" id="replyInput" placeholder="输入回复/追问..." style="flex:1; padding:12px 16px; border-radius:24px; border:1.5px solid #E0D0C0; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); outline:none; color:#3D2314;">
      <button class="btn" id="sendReplyBtn">发送</button>
    </div>
    <div id="adminActions" style="margin-top:16px; display:none;">
      <hr style="border-color:rgba(139,115,85,0.1); margin-bottom:16px;">
      <div id="actionStart" style="display:none;">
        <button class="btn" id="startProcessBtn"><span id="rocketIcon"></span> 开始处理</button>
      </div>
      <div id="actionInProgress" style="display:none;">
        <div style="display:flex; gap:8px; margin-bottom:12px;">
          <input type="text" id="finalReplyInput" placeholder="最终解决方案（必填）" style="flex:1; padding:12px 16px; border-radius:24px; border:1.5px solid #E0D0C0; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); outline:none; color:#3D2314;">
          <button class="btn" id="closeWithReplyBtn"><span id="checkIcon2"></span> 完结并回复</button>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">

  async function uploadPhotos(opinionId) {
    var results = [];
    for (var i = 0; i < selectedFiles.length; i++) {
      var file = selectedFiles[i];
      var ext = file.name.split('.').pop();
      var filePath = opinionId + '/' + crypto.randomUUID() + '.' + ext;
      var uploadRes = await supabaseClient.storage.from('opinion-photos').upload(filePath, file, { cacheControl: '3600', contentType: file.type });
      if (uploadRes.error) {
        for (var j = 0; j < results.length; j++) {
          await supabaseClient.storage.from('opinion-photos').remove([results[j]._path]);
        }
        throw new Error('图片上传失败：' + uploadRes.error.message);
      }
      var urlRes = supabaseClient.storage.from('opinion-photos').getPublicUrl(filePath);
      results.push({ url: urlRes.data.publicUrl, name: file.name, _path: filePath });
    }
    uploadedPhotoPaths = results.map(function(r) { return r._path; });
    return results.map(function(r) { return { url: r.url, name: r.name }; });

  async function updateDashboard() {
    var res = await supabaseClient.from('opinions').select('*');
    if (res.error) return;
    var ops = res.data;
    var total = ops.length;
    var closed = ops.filter(function(o) { return o.status === 'closed'; }).length;
    var resolveRate = total ? Math.round((closed / total) * 100) + '%' : '0%';

    var res2 = await supabaseClient.from('ratings').select('score');
    var scores = res2.data ? res2.data.map(function(r) { return r.score; }) : [];
    var avgSat = scores.length ? (scores.reduce(function(a,b){return a+b;},0) / scores.length).toFixed(1) : '0.0';

    var closedOps = ops.filter(function(o) { return o.closed_at && o.status === 'closed'; });
    var avgTime = '--';
    if (closedOps.length > 0) {
      var totalMs = 0;
      closedOps.forEach(function(o) { var start = o.reopened_at ? new Date(o.reopened_at) : new Date(o.created_at); totalMs += new Date(o.closed_at) - start; });
      var avgHrs = (totalMs / closedOps.length) / (1000 * 60 * 60);
      avgTime = avgHrs < 1 ? Math.round(avgHrs * 60) + '分钟' : avgHrs.toFixed(1) + '小时';
    }

    document.getElementById('dashboard').innerHTML =
      '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">' + getIcon('message-circle', 16) + ' 提问数</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + resolveRate + '</div><div class="stat-label">' + getIcon('check-circle', 16) + ' 解决率</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + avgSat + '</div><div class="stat-label">' + getIcon('star', 16) + ' 满意率</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + avgTime + '</div><div class="stat-label">' + getIcon('clock', 16) + ' 平均用时</div></div>';
  }

  async function loadOpinions() {
    showLoading();
    var query = supabaseClient.from('opinions').select('*, likes(count), replies(count)');
    query = query.order('created_at', { ascending: false });
    var res = await query;
    if (res.error) { hideLoading(); toast('加载失败：' + res.error.message, 'error'); return; }

    var ratingsRes = await supabaseClient.from('ratings').select('opinion_id, score');
    var ratingsMap = {};
    (ratingsRes.data || []).forEach(function(r) {
      if (!ratingsMap[r.opinion_id]) ratingsMap[r.opinion_id] = [];
      ratingsMap[r.opinion_id].push(r.score);
    });

    hideLoading();
    opinionsData = (res.data || []).map(function(op) {
      var scores = ratingsMap[op.id] || [];
      return {
        ...op,
        likeCount: op.likes?.[0]?.count || 0,
        replyCount: op.replies?.[0]?.count || 0,
        avgRating: scores.length ? (scores.reduce(function(s, r) { return s + r; }, 0) / scores.length).toFixed(1) : null
      };
    });
    if (currentSort === 'heat') {
      opinionsData.sort(function(a,b) { return b.likeCount - a.likeCount || new Date(b.created_at) - new Date(a.created_at); });
    }
    renderOpinions();
  }

    if (op.status === 'in_progress') return 1;
    if (op.status === 'closed') return op.avgRating ? 3 : 2;

  }

          '<span>' + getIcon('star', 14) + ' ' + (op.avgRating || '暂无') + '</span>' +
          '<span>' + getIcon('message-circle', 14) + ' ' + op.replyCount + '</span>' +
        '</div>' +
        '<div class="stepper">' + steps.map(function(s, i) {
          var cls = i < progress ? 'done' : i === progress ? 'current' : '';
          var icon = i < progress || (i === progress && i === 3) ? getIcon('check-circle', 14).replace(/width="24"/,'width="14"').replace(/height="24"/,'height="14"') : (i + 1);
          var html = '<div class="step-node"><div class="step-dot ' + cls + '">' + icon + '</div><span class="step-caption ' + cls + '">' + s + '</span></div>';
          if (i < steps.length - 1) html += '<div class="step-line ' + (i < progress ? 'done' : '') + '"></div>';
          return html;
        }).join('') + '</div>' +
        '<div class="actions">' +
          '<span class="like-btn" data-id="' + op.id + '">' + getIcon('heart', 16) + ' ' + op.likeCount + '</span>' +
          '<button class="btn-outline btn" onclick="openDetail(\'' + op.id + '\')">查看详情</button>' +
          '<span style="font-size:14px;color:#8B7355;">' + (statusLabels[op.status] || op.status) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    container.querySelectorAll('.like-btn').forEach(function(btn) {
      btn.addEventListener('click', async function() {
        var opId = btn.dataset.id;
        var res = await supabaseClient.from('likes').upsert(
          { opinion_id: opId, user_id: currentUser.id },
          { onConflict: 'opinion_id, user_id' }
        );
        if (res.error) {
          if (res.error.code === '23505') {
            await supabaseClient.from('likes').delete().eq('opinion_id', opId).eq('user_id', currentUser.id);
          } else {
            toast('操作失败', 'error');
            return;
          }
        }
        loadOpinions();
      });
    });
  }

  document.getElementById('submitOpinionBtn').addEventListener('click', async function() {
    var title = document.getElementById('titleInput').value.trim();
    var content = document.getElementById('contentInput').value.trim();
    var target = document.getElementById('targetSelect').value;
    var anonymous = document.getElementById('anonymousCheck').checked;
    if (!title || !content) { toast('请填写标题和内容', 'warn'); return; }
    showLoading();
    var id = crypto.randomUUID();
    var photoUrls = null;
    if (selectedFiles.length > 0) {
      try { photoUrls = await uploadPhotos(id); } catch (e) { hideLoading(); toast(e.message, 'error'); return; }
    }
    var res = await supabaseClient.from('opinions').insert({
      id: id, title: title, content: content, target_role: target, assigned_to: target,
      is_anonymous: anonymous, author_id: currentUser.id, author_name: currentUser.real_name,
      status: 'open', photos: photoUrls
    });
    hideLoading();
    if (res.error) {
      if (uploadedPhotoPaths.length) { await supabaseClient.storage.from('opinion-photos').remove(uploadedPhotoPaths); uploadedPhotoPaths = []; }
      toast(res.error.message, 'error');
    } else {
      document.getElementById('titleInput').value = '';
      document.getElementById('contentInput').value = '';
      selectedFiles = [];
      uploadedPhotoPaths = [];
      document.getElementById('photoPreviewStrip').innerHTML = '';
      updatePhotoInputState();
      toast('发布成功！');
      loadOpinions();
      updateDashboard();
    }
  });

  document.querySelectorAll('.sort-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      loadOpinions();
    });
  });

  // 照片选择
  document.getElementById('photoInput').addEventListener('change', function(e) {
    var files = Array.prototype.slice.call(e.target.files || []);
    for (var i = 0; i < files.length; i++) {
      var err = validatePhotoFile(files[i]);
      if (err) { toast(err, 'warn'); continue; }
      if (selectedFiles.length >= maxPhotoCount) { toast('最多只能添加 ' + maxPhotoCount + ' 张图片', 'warn'); break; }
      selectedFiles.push(files[i]);
    }
    renderPhotoPreviews();
    e.target.value = '';
  });

  window.openDetail = async function(opinionId) {
    currentOpinionId = opinionId;
    var op = opinionsData.find(function(o) { return o.id === opinionId; });
    if (!op) return;
    if (currentUser.id === op.author_id && op.status === 'closed' && !op.avgRating) {
      showRatingPopup(op);
      return;
    }
    document.getElementById('modalTitle').innerText = op.title;
    document.getElementById('modalMeta').innerHTML = '发布者：' + (op.is_anonymous ? '匿名' : op.author_name) + ' | 状态：' + op.status;
    document.getElementById('modalContent').innerText = op.content;
    var ph = renderPhotoStrip(op.photos, 'large');
    var mp = document.getElementById('modalPhotos');
    mp.innerHTML = ph;
    mp.style.display = ph ? 'flex' : 'none';
    showLoading();
    var res = await supabaseClient.from('replies').select('*').eq('opinion_id', opinionId).order('created_at', { ascending: true });
    hideLoading();
    document.getElementById('repliesContainer').innerHTML = (res.data || []).map(function(r) {
      return '<div class="reply-item"><strong>' + r.user_name + '</strong>：' + escapeHtml(r.content) +
        ' <span style="font-size:12px;color:#8B7355;">' + new Date(r.created_at).toLocaleString() + '</span></div>';
    }).join('') || '<div style="text-align:center;color:#A09080;padding:20px;">暂无回复</div>';
    document.getElementById('replyInput').value = '';

    var isAdmin = currentUser.role === 'admin';
    document.getElementById('adminActions').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('actionStart').style.display = 'none';
    document.getElementById('actionInProgress').style.display = 'none';
    document.getElementById('actionClosed').style.display = 'none';
    if (isAdmin) {
      if (op.status === 'open') document.getElementById('actionStart').style.display = 'block';
      else if (op.status === 'in_progress') document.getElementById('actionInProgress').style.display = 'block';
      else if (op.status === 'closed') document.getElementById('actionClosed').style.display = 'block';
    }
    var isAuthor = currentUser.id === op.author_id;
    var canRate = isAuthor && op.status === 'closed';
    document.getElementById('ratingArea').style.display = canRate ? 'block' : 'none';
    if (canRate) {
      selectedStars = 0;
      document.querySelectorAll('#starRating .star-svg').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById('ratingText').textContent = '未评分';
    }
    document.getElementById('detailModal').classList.add('active');
  };

  window.closeModal = function() { document.getElementById('detailModal').classList.remove('active'); };
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeModal();
  });

  document.getElementById('sendReplyBtn').addEventListener('click', async function() {
    var content = document.getElementById('replyInput').value.trim();
    if (!content) { toast('请输入回复内容', 'warn'); return; }
    var id = crypto.randomUUID();
    await supabaseClient.from('replies').insert({ id: id, opinion_id: currentOpinionId, user_id: currentUser.id, user_name: currentUser.real_name, content: content });
    var op = opinionsData.find(function(o) { return o.id === currentOpinionId; });
    if (op && op.author_id !== currentUser.id) addNotification(op.author_id, 'reply', currentOpinionId, op.title);
    openDetail(currentOpinionId);
    loadOpinions();
  });

  document.getElementById('startProcessBtn').addEventListener('click', async function() {
    await supabaseClient.from('opinions').update({ status: 'in_progress' }).eq('id', currentOpinionId);
    var op = opinionsData.find(function(o) { return o.id === currentOpinionId; });
    if (op) addNotification(op.author_id, 'in_progress', currentOpinionId, op.title);
    loadOpinions(); closeModal(); updateDashboard();
    toast('已标记为处理中');
  });

  document.getElementById('closeWithReplyBtn').addEventListener('click', async function() {
    var finalReply = document.getElementById('finalReplyInput').value.trim();
    if (!finalReply) { toast('请输入最终解决方案', 'warn'); return; }
    var id = crypto.randomUUID();
    await supabaseClient.from('replies').insert({ id: id, opinion_id: currentOpinionId, user_id: currentUser.id, user_name: currentUser.real_name, content: '【最终方案】' + finalReply });
    await supabaseClient.from('opinions').update({ status: 'closed', closed_at: new Date().toISOString() }).eq('id', currentOpinionId);
    var op = opinionsData.find(function(o) { return o.id === currentOpinionId; });
    if (op) addNotification(op.author_id, 'closed', currentOpinionId, op.title);
    loadOpinions(); closeModal(); updateDashboard();
    toast('问题已完结');
  });

  document.getElementById('assignBtn').addEventListener('click', async function() {
    var assignTo = document.getElementById('assignSelect').value;
    await supabaseClient.from('opinions').update({ assigned_to: assignTo, assigned_at: new Date().toISOString() }).eq('id', currentOpinionId);
    var op = opinionsData.find(function(o) { return o.id === currentOpinionId; });
    if (op) addNotification(op.author_id, 'reassign', currentOpinionId, op.title);
    loadOpinions(); closeModal(); updateDashboard();
    toast('已重新分配给 ' + assignTo);
  });

  document.getElementById('reopenBtn').addEventListener('click', async function() {
    await supabaseClient.from('opinions').update({ status: 'in_progress' }).eq('id', currentOpinionId);
    loadOpinions(); closeModal(); updateDashboard();
    toast('问题已重新打开');
  });

  // 评分星星事件 (动态绑定在渲染后通过 event delegation)
  document.getElementById('starRating').addEventListener('click', function(e) {
    var star = e.target.closest('.star-svg');
    if (!star) return;
    selectedStars = parseInt(star.dataset.val);
    document.querySelectorAll('#starRating .star-svg').forEach(function(s) {
      s.classList.toggle('active', parseInt(s.dataset.val) <= selectedStars);
    });
    document.getElementById('ratingText').textContent = selectedStars + '.0';
  });

  document.getElementById('submitRatingBtn').addEventListener('click', async function() {
    if (!selectedStars) { toast('请点击星星评分', 'warn'); return; }
    var res = await supabaseClient.from('ratings').upsert(
      { opinion_id: currentOpinionId, user_id: currentUser.id, score: selectedStars },
      { onConflict: 'opinion_id, user_id' }
    );
    if (res.error) { toast('评分失败：' + res.error.message, 'error'); return; }
    toast('评分成功！');
    var op = opinionsData.find(function(o) { return o.id === currentOpinionId; });
    if (op) { op.avgRating = selectedStars + '.0'; }
    renderOpinions();
    closeModal(); loadOpinions(); updateDashboard();
  });

  // 评分大弹窗
  var popupStars = 0;
  var popupOpinionId = null;

  async function showRatingPopup(op) {
    popupOpinionId = op.id;
    popupStars = 0;
    document.getElementById('ratingPopupTitle').innerText = op.title;
    document.getElementById('ratingPopupText').textContent = '';
    document.querySelectorAll('#starRatingPopup .star-popup').forEach(function(s) { s.classList.remove('active'); });

    showLoading();
    var res = await supabaseClient.from('replies').select('*').eq('opinion_id', op.id).order('created_at', { ascending: true });
    hideLoading();
    var finalReply = (res.data || []).filter(function(r) { return r.content && r.content.indexOf('【最终方案】') === 0; }).pop();
    document.getElementById('ratingPopupReply').innerText = finalReply ? finalReply.content.replace('【最终方案】', '') : '（暂无最终回复详情）';

    document.getElementById('ratingPopup').classList.add('active');
  }

  document.getElementById('starRatingPopup').addEventListener('click', function(e) {
    var star = e.target.closest('.star-popup');
    if (!star) return;
    popupStars = parseInt(star.dataset.val);
    document.querySelectorAll('#starRatingPopup .star-popup').forEach(function(s) {
      s.classList.toggle('active', parseInt(s.dataset.val) <= popupStars);
    });
    var labels = ['', '非常不满意', '不太满意', '一般', '比较满意', '非常满意'];
    document.getElementById('ratingPopupText').textContent = labels[popupStars];
  });

  document.getElementById('submitRatingPopupBtn').addEventListener('click', async function() {
    if (!popupStars) { toast('请点击星星评分', 'warn'); return; }
    var res = await supabaseClient.from('ratings').upsert(
      { opinion_id: popupOpinionId, user_id: currentUser.id, score: popupStars },
      { onConflict: 'opinion_id, user_id' }
    );
    if (res.error) { toast('评分失败：' + res.error.message, 'error'); return; }
    document.getElementById('ratingPopup').classList.remove('active');
    toast('感谢评分！');
    var op = opinionsData.find(function(o) { return o.id === popupOpinionId; });
    if (op) { op.avgRating = popupStars + '.0'; }
    renderOpinions();
    loadOpinions(); updateDashboard();
  });

  document.getElementById('skipRatingBtn').addEventListener('click', function() {
    document.getElementById('ratingPopup').classList.remove('active');
    var op = opinionsData.find(function(o) { return o.id === popupOpinionId; });
    if (op) {
      currentOpinionId = popupOpinionId;
      document.getElementById('modalTitle').innerText = op.title;
      document.getElementById('modalMeta').innerHTML = '发布者：' + (op.is_anonymous ? '匿名' : op.author_name) + ' | 状态：' + op.status;
      document.getElementById('modalContent').innerText = op.content;
      var ph2 = renderPhotoStrip(op.photos, 'large');
      document.getElementById('modalPhotos').innerHTML = ph2;
      document.getElementById('modalPhotos').style.display = ph2 ? 'flex' : 'none';
      openDetailFallback(popupOpinionId);
    }
  });

  document.getElementById('ratingPopup').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) document.getElementById('ratingPopup').classList.remove('active');
  });

  async function openDetailFallback(opinionId) {
    showLoading();
    var res = await supabaseClient.from('replies').select('*').eq('opinion_id', opinionId).order('created_at', { ascending: true });
    hideLoading();
    document.getElementById('repliesContainer').innerHTML = (res.data || []).map(function(r) {
      return '<div class="reply-item"><strong>' + r.user_name + '</strong>：' + escapeHtml(r.content) +
        ' <span style="font-size:12px;color:#8B7355;">' + new Date(r.created_at).toLocaleString() + '</span></div>';
    }).join('') || '<div style="text-align:center;color:#A09080;padding:20px;">暂无回复</div>';
    document.getElementById('replyInput').value = '';
    var op2 = opinionsData.find(function(o) { return o.id === opinionId; });
    var isAdmin = currentUser.role === 'admin';
    document.getElementById('adminActions').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('actionStart').style.display = 'none';
    document.getElementById('actionInProgress').style.display = 'none';
    document.getElementById('actionClosed').style.display = 'none';
    if (isAdmin) {
      if (op2.status === 'open') document.getElementById('actionStart').style.display = 'block';
      else if (op2.status === 'in_progress') document.getElementById('actionInProgress').style.display = 'block';
      else if (op2.status === 'closed') document.getElementById('actionClosed').style.display = 'block';
    }
    var canRate = currentUser.id === op2.author_id && op2.status === 'closed' && !op2.avgRating;
    document.getElementById('ratingArea').style.display = canRate ? 'block' : 'none';
    document.getElementById('detailModal').classList.add('active');
  }

  // 通知
  function updateNotifDot() {
    var notifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id && !n.read; });
    document.getElementById('notificationDot').style.display = notifs.length ? 'block' : 'none';
  }
  function renderNotifDropdown(showAll) {
    var dropdown = document.getElementById('notificationDropdown');
    var allNotifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id; }).sort(function(a,b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });
    var unreadNotifs = allNotifs.filter(function(n) { return !n.read; });
    var readNotifs = allNotifs.filter(function(n) { return n.read; });
    var displayNotifs = showAll ? allNotifs : unreadNotifs;

    var html = '';
    if (displayNotifs.length === 0) {
      html = '<div style="padding:16px;text-align:center;color:#8B7355;">' + (showAll ? '暂无任何通知' : '暂无新通知') + '</div>';
    } else {
      html = displayNotifs.map(function(n) {
        var icon = getIcon('bell', 16), label = '', detail = '', opinionId = n.opinion_id || '', postId = n.post_id || '';
        if (n.type === 'reply') { icon = getIcon('message-circle', 16); label = '有新回复'; detail = n.opinion_title; }
        else if (n.type === 'closed') { icon = getIcon('check-circle', 16); label = '已完结'; detail = n.opinion_title; }
        else if (n.type === 'reassign') { icon = getIcon('refresh-cw', 16); label = '已重分配'; detail = n.opinion_title; }
        else if (n.type === 'in_progress') { icon = getIcon('clock', 16); label = '问题开始处理'; detail = n.opinion_title; }
        else if (n.type === 'treehole_delete') { icon = getIcon('trash', 16); label = '便利贴被删除'; detail = (n.content || '').substring(0, 40); }
        else if (n.type === 'treehole_reply') { icon = getIcon('message-circle', 16); label = '便利贴有新回复'; detail = (n.content || '').substring(0, 40); }
        var reasonHtml = n.reason ? '<br><span style="font-size:12px;color:#C7564A;">原因：' + escapeHtml(n.reason) + '</span>' : '';
        var timeHtml = '<br><span style="font-size:11px;color:#A09080;">' + new Date(n.created_at).toLocaleString() + '</span>';
        return '<div class="notification-item ' + (n.read ? 'read' : 'unread') + '" data-id="' + n.id + '" data-type="' + n.type + '" data-opinion="' + opinionId + '" data-post-id="' + postId + '">' +
          icon + ' ' + escapeHtml(detail) + ' - ' + label + reasonHtml + timeHtml +
        '</div>';
      }).join('');
    }

    if (displayNotifs.length > 0) {
      html += '<div style="text-align:center;font-size:11px;color:#A09080;padding:6px 0 2px;">' + getIcon('lightbulb', 12) + ' 点击消息即可标为已读</div>';
    }
    if (!showAll && readNotifs.length > 0) {
      html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 14) + ' 查看全部消息 →</button></div>';
    } else if (showAll) {
      html += '<div class="notif-footer"><button id="showUnreadBtn">← 仅看未读</button></div>';
    }

    dropdown.innerHTML = html;

    dropdown.querySelectorAll('.notification-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var notifs = getNotifs();
        var idx = notifs.findIndex(function(n) { return n.id === item.dataset.id; });
        if (idx !== -1) { notifs[idx].read = true; saveNotifs(notifs); }
        updateNotifDot();
        if (item.dataset.type === 'treehole_delete' || item.dataset.type === 'treehole_reply') {
          window.location.href = 'treehole.html';
        } else if (item.dataset.opinion) {
          openDetail(item.dataset.opinion);
        }
        dropdown.style.display = 'none';
      });
    });

    var showAllBtn = document.getElementById('showAllNotifsBtn');
    if (showAllBtn) {
      showAllBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(true);
      });
    }
    var showUnreadBtn = document.getElementById('showUnreadBtn');
    if (showUnreadBtn) {
      showUnreadBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(false);
      });
    }
  }

  document.getElementById('notificationBell').addEventListener('click', function(e) {
    e.stopPropagation();
    var dropdown = document.getElementById('notificationDropdown');
    if (dropdown.style.display === 'block') {
      dropdown.style.display = 'none';
    } else {
      renderNotifDropdown(false);
      dropdown.style.display = 'block';
    }
  });
  document.addEventListener('click', function() {
    document.getElementById('notificationDropdown').style.display = 'none';
  });

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
  initIcons();
  init();
</script>
