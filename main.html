<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级办事通 · 控制台</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

:root {
  --bg-start: #FDF6F0; --bg-mid: #F8EDE3; --bg-end: #F2E0D0;
  --text: #3D2314; --text-muted: #8B7355; --text-light: #A09080;
  --accent: #C67B5C; --accent-hover: #D4946A; --accent-dark: #B5651D;
  --accent-light: rgba(198,123,92,0.10); --accent-light2: rgba(198,123,92,0.06);
  --card-bg: rgba(255,255,255,0.15); --card-border: rgba(255,255,255,0.5);
  --navbar-bg: rgba(255,255,255,0.18); --navbar-border: rgba(255,255,255,0.4);
  --input-bg: rgba(255,255,255,0.5); --input-border: #E0D0C0; --input-border-focus: #C67B5C;
  --danger: #C7564A; --danger-hover: #A8403A;
  --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
  --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
  --btn-shadow: rgba(181,101,29,0.18); --btn-shadow-hover: rgba(181,101,29,0.28);
  --shadow: rgba(61,35,20,0.05); --shadow-lg: rgba(61,35,20,0.12);
  --modal-bg: rgba(255,255,255,0.7); --modal-overlay: rgba(61,35,20,0.25);
  --divider: rgba(139,115,85,0.08);
  --toast-success: rgba(93,155,111,0.92); --toast-error: rgba(199,86,74,0.92); --toast-warn: rgba(232,145,58,0.92);
}
body[data-theme="green"] {
  --bg-start: #F2F7F4; --bg-mid: #E8F0EA; --bg-end: #D8E8DC;
  --text: #1A3D2A; --text-muted: #5B7B6A; --text-light: #8B9B8A;
  --accent: #5B8C6B; --accent-hover: #7BAA8B; --accent-dark: #3D6B4D;
  --accent-light: rgba(91,140,107,0.10); --accent-light2: rgba(91,140,107,0.06);
  --card-bg: rgba(255,255,255,0.15); --card-border: rgba(255,255,255,0.5);
  --navbar-bg: rgba(255,255,255,0.18); --navbar-border: rgba(255,255,255,0.4);
  --input-bg: rgba(255,255,255,0.5); --input-border: #C8D8C8; --input-border-focus: #5B8C6B;
  --danger: #C7564A; --danger-hover: #A8403A;
  --btn-shadow: rgba(61,107,77,0.18); --btn-shadow-hover: rgba(61,107,77,0.28);
  --shadow: rgba(26,61,42,0.05); --shadow-lg: rgba(26,61,42,0.12);
  --modal-bg: rgba(255,255,255,0.7); --modal-overlay: rgba(26,61,42,0.25);
  --divider: rgba(91,123,106,0.08);
}
body[data-theme="white"] {
  --bg-start: #FAFAFA; --bg-mid: #F5F5F5; --bg-end: #F0F0F0;
  --text: #1A1A1A; --text-muted: #666; --text-light: #999;
  --accent: #555; --accent-hover: #777; --accent-dark: #333;
  --accent-light: rgba(85,85,85,0.08); --accent-light2: rgba(85,85,85,0.04);
  --card-bg: rgba(255,255,255,0.6); --card-border: rgba(0,0,0,0.06);
  --navbar-bg: rgba(255,255,255,0.65); --navbar-border: rgba(0,0,0,0.06);
  --input-bg: rgba(255,255,255,0.85); --input-border: #DDD; --input-border-focus: #555;
  --danger: #C7564A; --danger-hover: #A8403A;
  --btn-shadow: rgba(0,0,0,0.1); --btn-shadow-hover: rgba(0,0,0,0.18);
  --shadow: rgba(0,0,0,0.04); --shadow-lg: rgba(0,0,0,0.1);
  --modal-bg: rgba(255,255,255,0.9); --modal-overlay: rgba(0,0,0,0.15);
  --divider: rgba(0,0,0,0.06);
}
body[data-theme="black"] {
  --bg-start: #1A1A1A; --bg-mid: #161616; --bg-end: #111;
  --text: #E0D8D0; --text-muted: #999; --text-light: #777;
  --accent: #C67B5C; --accent-hover: #D4946A; --accent-dark: #B5651D;
  --accent-light: rgba(198,123,92,0.12); --accent-light2: rgba(198,123,92,0.06);
  --card-bg: rgba(40,40,40,0.4); --card-border: rgba(255,255,255,0.06);
  --navbar-bg: rgba(30,30,30,0.6); --navbar-border: rgba(255,255,255,0.06);
  --input-bg: rgba(50,50,50,0.5); --input-border: #444; --input-border-focus: #C67B5C;
  --danger: #D9665A; --danger-hover: #C7564A;
  --btn-shadow: rgba(181,101,29,0.25); --btn-shadow-hover: rgba(181,101,29,0.4);
  --shadow: rgba(0,0,0,0.3); --shadow-lg: rgba(0,0,0,0.5);
  --modal-bg: rgba(40,40,40,0.9); --modal-overlay: rgba(0,0,0,0.5);
  --divider: rgba(255,255,255,0.06);
}

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', 'PingFang SC', serif; }
    body { background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 30%, var(--bg-end) 60%, var(--bg-mid) 100%); background-size: 300% 300%; min-height: 100vh; overflow-x: hidden; animation: bgShift 18s ease-in-out infinite; transition: background 0.4s, color 0.4s; }
    @keyframes bgShift { 0% { background-position: 0% 50%; } 25% { background-position: 50% 100%; } 50% { background-position: 100% 50%; } 75% { background-position: 50% 0%; } 100% { background-position: 0% 50%; } }

    h1, h2, h3, .btn, .btn-outline, .badge, .tab, .logo { font-family: 'Noto Serif SC', serif; }

    /* 背景装饰 */
    .bg-decorations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-icon {
      position: absolute;
      opacity: 0.05;
    }
    .bg-icon.type-a { animation: floatDrift var(--dur, 25s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
    .bg-icon.type-b { animation: floatSlow var(--dur, 30s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
    .bg-icon.type-c { animation: breatheScale var(--dur, 8s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
    @keyframes floatDrift {
      0%   { transform: translateY(0) rotate(0deg); }
      25%  { transform: translateY(-35px) rotate(4deg); }
      50%  { transform: translateY(-15px) rotate(8deg); }
      75%  { transform: translateY(-40px) rotate(2deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
    @keyframes floatSlow {
      0%   { transform: translate(0, 0) rotate(0deg); }
      33%  { transform: translate(18px, -28px) rotate(3deg); }
      66%  { transform: translate(-12px, -42px) rotate(-2deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    @keyframes breatheScale {
      0%, 100% { transform: scale(1); opacity: 0.04; }
      50% { transform: scale(1.2); opacity: 0.08; }
    }
    /* 光点粒子 */
    .sparkle {
      position: absolute;
      width: 4px; height: 4px;
      background: #C67B5C;
      border-radius: 50%;
      animation: sparkleFloat var(--dur, 10s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes sparkleFloat {
      0%   { transform: translate(0, 0) scale(1); opacity: 0; }
      20%  { opacity: 0.6; }
      50%  { transform: translate(var(--dx, 20px), var(--dy, -30px)) scale(1.5); opacity: 0.7; }
      80%  { opacity: 0.2; }
      100% { transform: translate(calc(var(--dx, 20px) * 2), calc(var(--dy, -30px) * 2)) scale(0.5); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .bg-icon, .sparkle, body { animation: none !important; }
    }

    .navbar { background: var(--navbar-bg); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); padding: 14px 28px; box-shadow: 0 4px 24px var(--shadow); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid var(--navbar-border); }
    .logo { font-size: 22px; font-weight: 600; color: var(--text); white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .logo svg { color: var(--accent); }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .badge { background: var(--accent-light); padding: 6px 16px; border-radius: 30px; font-size: 14px; color: var(--text-muted); font-weight: 500; }
    .btn { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border: none; padding: 10px 22px; border-radius: 24px; cursor: pointer; font-weight: 550; font-size: 15px; transition: all 0.25s; white-space: nowrap; box-shadow: 0 4px 14px var(--btn-shadow); display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); transform: translateY(-2px); box-shadow: 0 6px 20px var(--btn-shadow-hover); }
    .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); box-shadow: none; }
    .btn-outline:hover { background: var(--accent-light2); }
    .logo span, .btn span { display: inline-flex; align-items: center; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; position: relative; z-index: 1; }

    .welcome { text-align: center; margin-bottom: 36px; }
    .welcome h1 { font-size: 28px; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; animation: welcomeBreathe 3.5s ease-in-out infinite; }
    @keyframes welcomeBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    .welcome h1 svg { color: var(--accent); animation: heartBeat 1.8s ease-in-out infinite; }
    @keyframes heartBeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.15); } 30% { transform: scale(1); } 45% { transform: scale(1.1); } 60% { transform: scale(1); } }
    .welcome p { color: var(--text-muted); font-size: 15px; }

    .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .hub-card {
      background: var(--card-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px var(--shadow);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, opacity 0.5s ease, background 0.3s ease;
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--card-border);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
    }
    .hub-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
      pointer-events: none;
      border-radius: 24px 24px 0 0;
    }
    .hub-card.visible {
      opacity: 1;
      transform: translateY(0);
      animation: cardBreathe 4.5s ease-in-out 0.5s infinite;
    }
    @keyframes cardBreathe {
      0%, 100% { box-shadow: 0 4px 24px rgba(61,35,20,0.05); }
      50% { box-shadow: 0 8px 34px rgba(198,123,92,0.12); }
    }
    .hub-card.visible:hover { transform: translateY(-4px); box-shadow: 0 12px 40px var(--shadow-lg); border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.28); }
    .hub-card.visible:active { transform: translateY(-1px); }
    .hub-card .info { flex: 1; min-width: 0; }
    .hub-card .info h2 { font-size: 20px; color: var(--text); margin-bottom: 6px; }
    .hub-card .info p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
    .hub-card .arrow { flex-shrink: 0; transition: transform 0.2s; color: var(--text-light); }
    .hub-card .arrow svg { width: 28px; height: 28px; }
    .hub-card:hover .arrow { transform: translateX(4px); color: var(--accent); }
    .hub-card .badge-new { position: absolute; top: 16px; right: 16px; background: var(--danger); color: white; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }

    /* 名言区域 */
    .quote-section { margin-top: 32px; }
    .quote-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 24px 28px 20px;
      border: 1px solid var(--navbar-border);
      text-align: center;
      animation: quoteFade 5s ease-in-out infinite;
    }
    .quote-text { font-size: 16px; color: var(--text); font-weight: 500; line-height: 1.8; font-style: italic; letter-spacing: 0.5px; }
    .quote-author { font-size: 13px; color: var(--text-light); margin-top: 10px; }
    .quote-actions { margin-top: 14px; display: flex; justify-content: center; gap: 6px; align-items: center; }
    .quote-ai-label { font-size: 11px; color: var(--text-light); display: inline-flex; align-items: center; gap: 3px; }
    .quote-btn { background: none; border: 1px solid var(--accent-light); color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 5px 14px; border-radius: 14px; transition: all 0.2s; font-family: inherit; white-space: nowrap; }
    .quote-btn:hover { border-color: var(--accent-light); color: var(--text); background: var(--accent-light2); }
    .quote-loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 0; color: var(--text-light); font-size: 14px; }
    @keyframes quoteFade {
      0%, 100% { box-shadow: 0 2px 16px rgba(61,35,20,0.03); }
      50% { box-shadow: 0 4px 24px rgba(198,123,92,0.06); }
    }
    /* 名言详情弹窗 */
    .quote-detail-content { max-width: 600px; max-height: 80vh; overflow-y: auto; text-align: left; }
    .quote-detail-content h3 { font-size: 20px; color: var(--text); margin-bottom: 16px; }
    .quote-detail-content h4 { font-size: 15px; color: var(--accent); margin: 18px 0 8px; }
    .quote-detail-content p { font-size: 15px; color: var(--text); line-height: 1.8; margin-bottom: 10px; }
    .quote-detail-content .detail-label { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
    .quote-detail-content .loading-spinner { text-align: center; padding: 40px 0; color: var(--accent); }

    /* 通知 */
    .notification-bell { position: relative; cursor: pointer; padding: 4px; border-radius: 12px; transition: background 0.2s; }
    .notification-bell svg { width: 26px; height: 26px; color: var(--text-muted); }
    .notification-bell:hover { background: var(--accent-light2); }
    .notification-dot { position: absolute; top: 0px; right: -2px; width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
    .notification-dropdown {
      position: absolute; top: 55px; right: 20px;
      background: var(--modal-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      width: 340px; max-height: 420px; overflow-y: auto;
      box-shadow: 0 16px 40px var(--shadow-lg);
      border-radius: 20px; padding: 12px; display: none; z-index: 100;
      border: 1px solid var(--card-border);
    }
    .notification-item { padding: 10px 14px; border-bottom: 1px solid var(--divider); font-size: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 4px; transition: background 0.15s; color: var(--text); }
    .notification-item:hover { background: rgba(198,123,92,0.05); }
    .notification-item.unread { background: var(--accent-light2); font-weight: 500; }
    .notification-item.read { color: var(--text-muted); }
    .notif-footer { text-align: center; padding: 10px 0 2px; border-top: 1px solid var(--divider); margin-top: 8px; }
    .notif-footer button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 16px; transition: background 0.2s; }
    .notif-footer button:hover { background: var(--accent-light2); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .schedule-reminder { position: absolute; top: 16px; right: 54px; background: #E8913A; color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; animation: blink 1.2s infinite; z-index: 5; display: flex; align-items: center; gap: 3px; }
    .schedule-reminder svg { width: 12px; height: 12px; }

    /* 模态框 */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: var(--modal-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); width: 92%; max-width: 420px; border-radius: 24px; padding: 24px; box-shadow: 0 20px 50px var(--shadow-lg); border: 1px solid var(--card-border); }
    .close-icon { float: right; cursor: pointer; color: var(--text-muted); line-height: 1; transition: color 0.2s; }
    .close-icon:hover { color: var(--text); }
    .close-icon svg { width: 24px; height: 24px; }
    .input-field { width: 100%; padding: 12px 16px; border: 1.5px solid var(--input-border); border-radius: 16px; margin-bottom: 14px; font-size: 15px; outline: none; transition: all 0.2s; background: var(--input-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: var(--text); }
    .input-field:focus { border-color: var(--input-border-focus); box-shadow: 0 0 0 3px var(--accent-light); background: rgba(255,255,255,0.75); }
    .input-field::placeholder { color: var(--text-light); }

    .spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid var(--accent-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 16px; color: white; font-weight: 500; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .toast.success { background: var(--toast-success); }
    .toast.error { background: var(--toast-error); }
    .toast.warn { background: var(--toast-warn); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Footer */
    .site-footer { text-align: center; padding: 24px 20px; margin-top: 48px; color: var(--text-light); font-size: 13px; position: relative; z-index: 1; }
    .site-footer .footer-divider { width: 40px; height: 2px; background: rgba(198,123,92,0.2); margin: 0 auto 14px; border-radius: 1px; }
    .site-footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; display: inline-flex; align-items: center; gap: 4px; }
    .site-footer a:hover { color: var(--accent); }
    .site-footer a svg { width: 14px; height: 14px; }
    .site-footer .footer-links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 4px; }

    @media (max-width: 640px) {
      .navbar { padding: 10px 16px; }
      .logo { font-size: 18px; }
      .hub-grid { grid-template-columns: 1fr; }
      .hub-card { padding: 20px 16px; gap: 14px; }
      .hub-card .info h2 { font-size: 17px; }
    }
  </style>
</head>
<body>
<script>(function(){var t=localStorage.getItem('classroom_theme');if(t&&t!=='brown')document.body.setAttribute('data-theme',t);})();</script>
<!-- 背景装饰 -->
<div class="bg-decorations" id="bgDecorations"></div>

<div class="toast-container" id="toastContainer"></div>

<div class="navbar">
  <div class="logo"><span id="logoIcon"></span>班级办事通</div>
  <div class="user-info">
    <div class="notification-bell" id="notificationBell">
      <span id="bellIcon"></span><span class="notification-dot" id="notificationDot" style="display:none;"></span>
    </div>
    <button class="btn-outline btn" id="logoutBtn">退出</button>
  </div>
  <div class="notification-dropdown" id="notificationDropdown"></div>
</div>

<div class="container">
  <div class="welcome">
    <h1 id="welcomeTitle"><span id="welcomeIcon"></span></h1>
    <p>选择一个板块开始使用</p>
  </div>

  <div class="hub-grid">
    <a class="hub-card" href="opinions.html">
      <div class="info">
        <h2>意见箱</h2>
        <p>意见反馈 · 班委协同处理 · 进度追踪 · 满意度评分</p>
      </div>
      <span class="arrow"><span id="arrow1Icon"></span></span>
    </a>

    <a class="hub-card" href="treehole.html">
      <div class="info">
        <h2>树洞</h2>
        <p>匿名分享 · 便利贴留言墙 · 自由回复 · 表情互动</p>
      </div>
      <span class="badge-new">NEW</span>
      <span class="arrow"><span id="arrow2Icon"></span></span>
    </a>

    <a class="hub-card" href="schedule.html">
      <div class="info">
        <h2>限时功能</h2>
        <p>课表统计 · 全年级课表查看 · 空闲时段查询</p>
      </div>
      <span class="schedule-reminder" id="scheduleReminder" style="display:none;"><span id="alertIcon"></span> 你还未完成课表统计</span>
      <span class="arrow"><span id="arrow3Icon"></span></span>
    </a>

    <a class="hub-card" href="settings.html">
      <div class="info">
        <h2>个人设置</h2>

  // 初始化背景装饰
  function initBgDecorations() {
    var icons = ['book','calendar','star','heart','message-circle','edit','tree-pine','pin','lightbulb'];
    var types = ['type-a','type-b','type-c'];
    var container = document.getElementById('bgDecorations');
    var html = '';
    icons.forEach(function(name, i) {
      var size = 40 + Math.floor(Math.random() * 50);
      var top = 5 + Math.floor(Math.random() * 85);
      var left = 3 + Math.floor(Math.random() * 90);

      var type = types[i % types.length];
      html += '<div class="bg-icon ' + type + '" style="top:' + top + '%;left:' + left + '%;--dur:' + dur + 's;--delay:' + delay + 's;">'
        + getIcon(name, size) + '</div>';
    });
    // 添加光点粒子
    for (var j = 0; j < 12; j++) {
      var sx = 5 + Math.floor(Math.random() * 90);
      var sy = 10 + Math.floor(Math.random() * 85);
      var sdur = 8 + Math.floor(Math.random() * 12);
      var sdelay = Math.floor(Math.random() * 10);
      var dx = (Math.random() - 0.5) * 60;
      var dy = -(20 + Math.random() * 50);
      html += '<div class="sparkle" style="left:' + sx + '%;top:' + sy + '%;--dur:' + sdur + 's;--delay:' + sdelay + 's;--dx:' + dx.toFixed(0) + 'px;--dy:' + dy.toFixed(0) + 'px;"></div>';

  function toast(msg, type) {
    type = type || 'success';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    el.addEventListener('click', function() { el.remove(); });

  // 通知
  var STORAGE_NOTIF = 'classroom_notifications';
  function getNotifs() { return JSON.parse(localStorage.getItem(STORAGE_NOTIF) || '[]'); }
  function saveNotifs(arr) { localStorage.setItem(STORAGE_NOTIF, JSON.stringify(arr)); }

  async function init() {
    var userStr = sessionStorage.getItem('currentUser');
    if (!userStr) { window.location.href = 'index.html'; return; }
    currentUser = JSON.parse(userStr);
    var welcomeHtml = getIcon('heart', 28) + ' ';
    document.getElementById('welcomeIcon').innerHTML = welcomeHtml;
    document.getElementById('welcomeTitle').innerHTML = welcomeHtml + currentUser.real_name + '，欢迎回来';
    updateNotifDot();
    checkScheduleStatus();
  }

  function updateNotifDot() {
    var notifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id && !n.read; });
    document.getElementById('notificationDot').style.display = notifs.length ? 'block' : 'none';
  }

  async function checkScheduleStatus() {
    var res = await supabaseClient
      .from('student_schedule')
      .select('id')
      .eq('user_id', currentUser.id)
      .limit(1);
    if (!res.error && (!res.data || res.data.length === 0)) {
      document.getElementById('scheduleReminder').style.display = 'inline-flex';
    }
  }

  function renderNotifDropdown(showAll) {
    var dropdown = document.getElementById('notificationDropdown');
    var allNotifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id; }).sort(function(a,b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });
    var unreadNotifs = allNotifs.filter(function(n) { return !n.read; });
    var readNotifs = allNotifs.filter(function(n) { return n.read; });
    var displayNotifs = showAll ? allNotifs : unreadNotifs;

    var html = '';
    if (displayNotifs.length === 0) {
      html = '<div style="padding:16px;text-align:center;color:var(--text-muted);">' + (showAll ? '暂无任何通知' : '暂无新通知') + '</div>';
    } else {
      html = displayNotifs.map(function(n) {
        var icon = getIcon('bell', 16), label = '', detail = '', opinionId = n.opinion_id || '', postId = n.post_id || '';
        if (n.type === 'reply') { icon = getIcon('message-circle', 16); label = '有新回复'; detail = n.opinion_title; }
        else if (n.type === 'closed') { icon = getIcon('check-circle', 16); label = '已完结'; detail = n.opinion_title; }
        else if (n.type === 'reassign') { icon = getIcon('refresh-cw', 16); label = '已重分配'; detail = n.opinion_title; }
        else if (n.type === 'in_progress') { icon = getIcon('clock', 16); label = '问题开始处理'; detail = n.opinion_title; }
        else if (n.type === 'opinion_delete') { icon = getIcon('trash', 16); label = '已被管理员删除'; detail = n.opinion_title; }
        else if (n.type === 'treehole_delete') { icon = getIcon('trash', 16); label = '便利贴被删除'; detail = (n.content || '').substring(0, 40); }
        else if (n.type === 'treehole_reply') { icon = getIcon('message-circle', 16); label = '便利贴有新回复'; detail = (n.content || '').substring(0, 40); }
        var reasonHtml = n.reason ? '<br><span style="font-size:12px;color:var(--danger);">原因：' + escapeHtml(n.reason) + '</span>' : '';
        var timeHtml = '<br><span style="font-size:11px;color:var(--text-light);">' + new Date(n.created_at).toLocaleString() + '</span>';
        return '<div class="notification-item ' + (n.read ? 'read' : 'unread') + '" data-id="' + n.id + '" data-type="' + n.type + '" data-opinion="' + opinionId + '" data-post-id="' + postId + '">' +
          icon + ' ' + (detail ? escapeHtml(detail) + ' - ' : '') + label + reasonHtml + timeHtml +
        '</div>';
      }).join('');
    }

    if (displayNotifs.length > 0) {
      html += '<div style="text-align:center;font-size:11px;color:var(--text-light);padding:6px 0 2px;">' + getIcon('lightbulb', 12) + ' 点击消息即可标为已读</div>';
    }
    if (!showAll) {
      if (unreadNotifs.length === 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 14) + ' 查看历史通知 →</button></div>';
      } else if (readNotifs.length > 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 14) + ' 查看全部消息 →</button></div>';
      }
    } else {
      html += '<div class="notif-footer"><button id="showUnreadBtn">← 仅看未读</button></div>';
    }

    dropdown.innerHTML = html;

    dropdown.querySelectorAll('.notification-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var notifs = getNotifs();
        var idx = notifs.findIndex(function(n) { return n.id === item.dataset.id; });
        if (idx !== -1) { notifs[idx].read = true; saveNotifs(notifs); }
        updateNotifDot();
        if (item.dataset.type === 'treehole_delete' || item.dataset.type === 'treehole_reply') {
          window.location.href = 'treehole.html';
        } else {
          window.location.href = 'opinions.html';
        }
        dropdown.style.display = 'none';
      });
    });

    var showAllBtn = document.getElementById('showAllNotifsBtn');
    if (showAllBtn) {
      showAllBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(true);
      });
    }
    var showUnreadBtn = document.getElementById('showUnreadBtn');
    if (showUnreadBtn) {
      showUnreadBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(false);
      });
    }
  }

  document.getElementById('notificationBell').addEventListener('click', function(e) {
    e.stopPropagation();
    var dropdown = document.getElementById('notificationDropdown');
    if (dropdown.style.display === 'block') {
      dropdown.style.display = 'none';
    } else {
      renderNotifDropdown(false);
      dropdown.style.display = 'block';
    }
  });
  document.addEventListener('click', function() {
    document.getElementById('notificationDropdown').style.display = 'none';
  });

  document.getElementById('logoutBtn').addEventListener('click', async function() {
    await supabaseClient.auth.signOut();
    sessionStorage.clear();
    window.location.href = 'index.html';
  });

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ===== 智谱AI 名言语录 =====
  var ZHIPU_API_KEY = '454590f5a48742b49534678fdd5f7484.tD433AZMcCRMRmyn';
  var currentQuote = null;
  var currentQuoteDetail = null;
  var QUOTE_KEY = 'cached_quote';
  var DETAIL_KEY = 'cached_quote_detail';

  (function() {
    var cached = sessionStorage.getItem(QUOTE_KEY);
    if (cached) { try { currentQuote = JSON.parse(cached); } catch(e) {} }
    var cachedDetail = sessionStorage.getItem(DETAIL_KEY);
    if (cachedDetail) { try { currentQuoteDetail = JSON.parse(cachedDetail); } catch(e) {} }
  })();

  var quoteTopics = ['励志进取','勤奋学习','人生哲理','珍惜时间','品德修养','家国情怀','自然风光','友情送别','坚持毅力','谦虚谨慎'];

  function saveQuote(q) {
    currentQuote = q;
    sessionStorage.setItem(QUOTE_KEY, JSON.stringify(q));
  }

  function showQuoteLoading(msg) {
    document.getElementById('quoteSection').innerHTML =
      '<div class="quote-card"><div class="quote-loading"><div class="spinner"></div>' + (msg || 'AI生成中') + '</div></div>';
  }

  async function fetchQuote() {
    var topic = quoteTopics[Math.floor(Math.random() * quoteTopics.length)];
    var seed = Date.now() + '_' + Math.floor(Math.random() * 100000);
    var resp = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ZHIPU_API_KEY },
      body: JSON.stringify({
        model: 'glm-4-flash',
        messages: [{
          role: 'user',
          content: '请推荐一句关于' + topic + '的中国经典名言或古诗词。不要推荐过于常见的句子，优先推荐相对小众但有深度的。只返回纯JSON（不要markdown代码块），格式：{"text":"名句内容","author":"作者/出处","type":"classic|poem|motto"}。随机种子：' + seed
        }],
        temperature: 0.99,
        max_tokens: 300
      })
    });
    var data = await resp.json();
    if (!data.choices) {
      console.error('Zhipu API error:', JSON.stringify(data));
      throw new Error('API error: ' + (data.error?.message || JSON.stringify(data)));
    }
    try {
      var content = data.choices[0].message.content;
      // 尝试多种方式提取 JSON
      var jsonStr = content.replace(/```json\s*|\s*```/g, '').replace(/```/g, '').trim();
      return JSON.parse(jsonStr);
    } catch(e) {
      console.error('Zhipu parse error, raw:', data.choices[0].message.content);
      // 尝试直接匹配 text/author
      var textMatch = data.choices[0].message.content.match(/"text"\s*:\s*"([^"]+)"/);
      var authorMatch = data.choices[0].message.content.match(/"author"\s*:\s*"([^"]+)"/);
      var typeMatch = data.choices[0].message.content.match(/"type"\s*:\s*"([^"]+)"/);
      if (textMatch && authorMatch) {
        return { text: textMatch[1], author: authorMatch[1], type: (typeMatch ? typeMatch[1] : 'classic') };
      }
      return { text: '博学之，审问之，慎思之，明辨之，笃行之。', author: '《中庸》', type: 'classic' };
    }
  }

  async function fetchQuoteDetail() {
    var typeHint = currentQuote.type === 'poem' ? '这是一首古诗，请提供：白话翻译、名句解读、作者简介。' : '这是一句名言，请提供：名句解读、作者简介、现实意义。';
    var resp = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ZHIPU_API_KEY },
      body: JSON.stringify({
        model: 'glm-4-flash',
        messages: [{
          role: 'user',
          content: '关于"' + currentQuote.text + '"（' + currentQuote.author + '），' + typeHint + '返回JSON：{"translation":"白话翻译（仅古诗需要，否则为空）","interpretation":"名句解读","authorBio":"作者简介","significance":"现实意义"}。不要markdown。'
        }],
        temperature: 0.7,
        max_tokens: 1000
      })
    });
    var data = await resp.json();
    if (!data.choices) {
      console.error('Zhipu API error:', JSON.stringify(data));
      throw new Error('API error: ' + (data.error?.message || 'Unknown'));
    }
    try {
      var content = data.choices[0].message.content;
      content = content.replace(/```json\s*|\s*```/g, '').trim();
      return JSON.parse(content);
    } catch(e) {
      return { interpretation: '暂无法获取解读', authorBio: '', significance: '', translation: '' };
    }
  }

  function renderQuote() {
    var q = currentQuote;
    var html = '<div class="quote-card">';
    html += '<div class="quote-text">' + escapeHtml(q.text) + '</div>';
    html += '<div class="quote-author">—— ' + escapeHtml(q.author) + '</div>';
    html += '<div class="quote-actions">';
    html += '<span class="quote-ai-label">AI生成，仅供参考</span>';
    html += '<button class="quote-btn" id="learnMoreBtn">了解更多</button>';
    html += '<button class="quote-btn" id="refreshQuoteBtn">换一个</button>';
    html += '</div></div>';
    document.getElementById('quoteSection').innerHTML = html;
    document.getElementById('learnMoreBtn').addEventListener('click', openQuoteDetail);
    document.getElementById('refreshQuoteBtn').addEventListener('click', refreshQuote);
  }

  async function initQuote() {
    if (!currentQuote) {
      showQuoteLoading('AI生成中');
      try { saveQuote(await fetchQuote()); } catch(e) { saveQuote({ text:'学而不思则罔，思而不学则殆。', author:'《论语》', type:'classic' }); }
    }
    renderQuote();
  }

  async function refreshQuote() {
    currentQuoteDetail = null;
    sessionStorage.removeItem(DETAIL_KEY);
    showQuoteLoading('寻觅佳句中');
    try { saveQuote(await fetchQuote()); } catch(e) { saveQuote({ text:'千里之行，始于足下。', author:'老子', type:'classic' }); }
    renderQuote();
  }

  async function openQuoteDetail() {
    var modal = document.getElementById('quoteDetailModal');
    var body = document.getElementById('quoteDetailBody');
    modal.classList.add('active');
    body.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p style="margin-top:12px;">AI 正在解读…</p></div>';

    if (!currentQuoteDetail) {
      currentQuoteDetail = await fetchQuoteDetail();
      sessionStorage.setItem(DETAIL_KEY, JSON.stringify(currentQuoteDetail));
    }

    var d = currentQuoteDetail;
    var html = '<h3>' + escapeHtml(currentQuote.text) + '</h3>';
    html += '<p style="color:var(--text-light);">—— ' + escapeHtml(currentQuote.author) + '</p>';

    if (d.translation) {
      html += '<h4>白话翻译</h4><p>' + escapeHtml(d.translation) + '</p>';
    }
    if (d.interpretation) {
      html += '<h4>名句解读</h4><p>' + escapeHtml(d.interpretation) + '</p>';
    }
    if (d.authorBio) {
      html += '<h4>作者简介</h4><p>' + escapeHtml(d.authorBio) + '</p>';
    }
    if (d.significance) {
      html += '<h4>现实意义</h4><p>' + escapeHtml(d.significance) + '</p>';
    }

    html += '<p style="margin-top:20px;font-size:11px;color:var(--text-light);">AI生成，仅供参考</p>';
    body.innerHTML = html;
  }

  window.closeQuoteDetail = function() {
    document.getElementById('quoteDetailModal').classList.remove('active');
  };
  document.getElementById('quoteDetailModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeQuoteDetail();
  });

  initIcons();
  initBgDecorations();
  initCardEntrance();
  initQuote();
  init();
</script>
</body>
</html>
