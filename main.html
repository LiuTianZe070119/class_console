<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级办事通 · 控制台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'PingFang SC', sans-serif; }
    body { background: linear-gradient(160deg, #e8eef5, #dce4f0); min-height: 100vh; }

    .navbar { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 14px 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; }
    .logo { font-size: 22px; font-weight: 650; color: #1e3a5f; white-space: nowrap; }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .badge { background: #eef3fa; padding: 6px 16px; border-radius: 30px; font-size: 14px; color: #1e3a5f; font-weight: 500; }
    .btn { background: #1e3a5f; color: white; border: none; padding: 10px 22px; border-radius: 30px; cursor: pointer; font-weight: 550; font-size: 15px; transition: all 0.2s; white-space: nowrap; }
    .btn:hover { background: #2a4d7a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,58,95,0.25); }
    .btn-outline { background: transparent; border: 1.5px solid #1e3a5f; color: #1e3a5f; }
    .btn-outline:hover { background: #eef3fa; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    .welcome { text-align: center; margin-bottom: 36px; }
    .welcome h1 { font-size: 28px; color: #1e3a5f; margin-bottom: 8px; }
    .welcome p { color: #6b85a0; font-size: 15px; }

    .hub-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }

    .hub-card { background: white; border-radius: 24px; padding: 28px 24px; box-shadow: 0 8px 28px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; border: 1px solid #eef2f7; position: relative; overflow: hidden; }
    .hub-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); border-color: #cfdde9; }
    .hub-card:active { transform: translateY(-1px); }
    .hub-card .icon { font-size: 52px; flex-shrink: 0; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
    .hub-card .icon.opinions { background: #e3f0ff; }
    .hub-card .icon.treehole { background: #f0ebe0; }
    .hub-card .icon.timed { background: #fce4ec; }
    .hub-card .info { flex: 1; min-width: 0; }
    .hub-card .info h2 { font-size: 20px; color: #1e3a5f; margin-bottom: 6px; }
    .hub-card .info p { font-size: 14px; color: #6b85a0; line-height: 1.5; }
    .hub-card .arrow { font-size: 28px; color: #b0bec5; flex-shrink: 0; transition: transform 0.2s; }
    .hub-card:hover .arrow { transform: translateX(4px); color: #1e3a5f; }
    .hub-card .badge-new { position: absolute; top: 16px; right: 16px; background: #e03a3a; color: white; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }

    /* 通知铃铛 */
    .notification-bell { position: relative; cursor: pointer; font-size: 24px; padding: 4px; border-radius: 12px; transition: background 0.2s; }
    .notification-bell:hover { background: #f0f3f8; }
    .notification-dot { position: absolute; top: 0px; right: -2px; width: 10px; height: 10px; background: #e03a3a; border-radius: 50%; animation: blink 1s infinite; }
    .notification-dropdown { position: absolute; top: 55px; right: 20px; background: white; width: 340px; max-height: 420px; overflow-y: auto; box-shadow: 0 16px 36px rgba(0,0,0,0.15); border-radius: 20px; padding: 12px; display: none; z-index: 100; }
    .notification-item { padding: 10px 14px; border-bottom: 1px solid #f0f3f8; font-size: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 4px; transition: background 0.15s; }
    .notification-item:hover { background: #f5f9ff; }
    .notification-item.unread { background: #eef3ff; font-weight: 500; }
    .notification-item.read { color: #8899aa; }
    .notif-footer { text-align: center; padding: 10px 0 2px; border-top: 1px solid #f0f3f8; margin-top: 8px; }
    .notif-footer button { background: none; border: none; color: #1e3a5f; cursor: pointer; font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 16px; transition: background 0.2s; }
    .notif-footer button:hover { background: #eef3fa; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .schedule-reminder { position: absolute; top: 16px; right: 54px; background: #ff9800; color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; animation: blink 1.2s infinite; z-index: 5; }

    /* 改密弹窗 */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: white; width: 92%; max-width: 420px; border-radius: 24px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    .close-icon { float: right; font-size: 26px; cursor: pointer; color: #7a8fa0; line-height: 1; transition: color 0.2s; }
    .close-icon:hover { color: #1e3a5f; }
    .input-field { width: 100%; padding: 12px 16px; border: 1.5px solid #dde5ed; border-radius: 16px; margin-bottom: 14px; font-size: 15px; outline: none; transition: border-color 0.2s; background: #fafbfc; }
    .input-field:focus { border-color: #2e5a9c; box-shadow: 0 0 0 3px rgba(46,90,156,0.1); background: white; }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 14px; color: white; font-weight: 500; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.18); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }
    .toast.warn { background: #e65100; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 640px) {
      .navbar { padding: 10px 16px; }
      .logo { font-size: 18px; }
      .hub-card { padding: 20px 16px; gap: 14px; }
      .hub-card .icon { font-size: 40px; width: 60px; height: 60px; border-radius: 16px; }
      .hub-card .info h2 { font-size: 17px; }
    }
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="navbar">
  <div class="logo">📋 班级办事通</div>
  <div class="user-info">
    <div class="notification-bell" id="notificationBell">🔔<span class="notification-dot" id="notificationDot" style="display:none;"></span></div>
    <span class="badge" id="userDisplay"></span>
    <button class="btn-outline btn" id="changePwdBtn">🔑 改密</button>
    <button class="btn-outline btn" id="logoutBtn">退出</button>
  </div>
  <div class="notification-dropdown" id="notificationDropdown"></div>
</div>

<div class="container">
  <div class="welcome">
    <h1 id="welcomeTitle">👋 欢迎回来</h1>
    <p>选择一个板块开始使用</p>
  </div>

  <div class="hub-grid">
    <a class="hub-card" href="opinions.html">
      <div class="icon opinions">📋</div>
      <div class="info">
        <h2>意见箱</h2>
        <p>意见反馈 · 班委协同处理 · 进度追踪 · 满意度评分</p>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="hub-card" href="treehole.html">
      <div class="icon treehole">🌲</div>
      <div class="info">
        <h2>树洞</h2>
        <p>匿名分享 · 便利贴留言墙 · 自由回复 · 表情互动</p>
      </div>
      <span class="badge-new">NEW</span>
      <span class="arrow">→</span>
    </a>

    <a class="hub-card" href="schedule.html">
      <div class="icon timed">📅</div>
      <div class="info">
        <h2>限时功能</h2>
        <p>课表统计 · 全年级课表查看 · 空闲时段查询</p>
      </div>
      <span class="schedule-reminder" id="scheduleReminder" style="display:none;">⚠ 你还未完成课表统计</span>
      <span class="arrow">→</span>
    </a>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal" id="pwdModal">
  <div class="modal-content">
    <span class="close-icon" onclick="closePwdModal()">&times;</span>
    <h3 style="color:#1e3a5f; margin-bottom:16px;">修改密码</h3>
    <input type="password" id="newPwd" placeholder="新密码（至少6位）" class="input-field">
    <input type="password" id="newPwdConfirm" placeholder="确认密码" class="input-field">
    <button class="btn" id="submitPwdChange" style="width:100%;">确认修改</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
<script>
  const SUPABASE_URL = 'https://zmujidvqkihthhdbwuvw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptdWppZHZxa2lodGhoZGJ3dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjIxMDAsImV4cCI6MjA5MzAzODEwMH0.iWKqqpebMc3l3wjEBsP4X0QH1WwjtIovcJAEsDPr3kE';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;

  function toast(msg, type) {
    type = type || 'success';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    el.addEventListener('click', function() { el.remove(); });
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 3500);
  }

  // 通知
  var STORAGE_NOTIF = 'classroom_notifications';
  function getNotifs() { return JSON.parse(localStorage.getItem(STORAGE_NOTIF) || '[]'); }
  function saveNotifs(arr) { localStorage.setItem(STORAGE_NOTIF, JSON.stringify(arr)); }

  async function init() {
    var userStr = sessionStorage.getItem('currentUser');
    if (!userStr) { window.location.href = 'index.html'; return; }
    currentUser = JSON.parse(userStr);
    document.getElementById('userDisplay').innerText =
      currentUser.real_name + ' (' + currentUser.student_id + ') ' + (currentUser.role === 'admin' ? '管理员' : '同学');
    document.getElementById('welcomeTitle').innerText = '👋 ' + currentUser.real_name + '，欢迎回来';
    updateNotifDot();
    checkScheduleStatus();
  }

  function updateNotifDot() {
    var notifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id && !n.read; });
    document.getElementById('notificationDot').style.display = notifs.length ? 'block' : 'none';
  }

  async function checkScheduleStatus() {
    var res = await supabaseClient
      .from('student_schedule')
      .select('id')
      .eq('user_id', currentUser.id)
      .limit(1);
    if (!res.error && (!res.data || res.data.length === 0)) {
      document.getElementById('scheduleReminder').style.display = 'inline';
    }
  }

  function renderNotifDropdown(showAll) {
    var dropdown = document.getElementById('notificationDropdown');
    var allNotifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id; }).sort(function(a,b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });
    var unreadNotifs = allNotifs.filter(function(n) { return !n.read; });
    var readNotifs = allNotifs.filter(function(n) { return n.read; });
    var displayNotifs = showAll ? allNotifs : unreadNotifs;

    var html = '';
    if (displayNotifs.length === 0) {
      html = '<div style="padding:16px;text-align:center;color:#9e9e9e;">' + (showAll ? '暂无任何通知' : '暂无新通知') + '</div>';
    } else {
      html = displayNotifs.map(function(n) {
        var icon = '🔔', label = '', detail = '', opinionId = n.opinion_id || '', postId = n.post_id || '';
        if (n.type === 'reply') { icon = '💬'; label = '有新回复'; detail = n.opinion_title; }
        else if (n.type === 'closed') { icon = '✅'; label = '已完结'; detail = n.opinion_title; }
        else if (n.type === 'reassign') { icon = '🔄'; label = '已重分配'; detail = n.opinion_title; }
        else if (n.type === 'in_progress') { icon = '⏳'; label = '问题开始处理'; detail = n.opinion_title; }
        else if (n.type === 'treehole_delete') { icon = '🗑️'; label = '便利贴被删除'; detail = (n.content || '').substring(0, 40); }
        else if (n.type === 'treehole_reply') { icon = '💬'; label = '便利贴有新回复'; detail = (n.content || '').substring(0, 40); }
        var reasonHtml = n.reason ? '<br><span style="font-size:12px;color:#c62828;">原因：' + escapeHtml(n.reason) + '</span>' : '';
        var timeHtml = '<br><span style="font-size:11px;color:#aaa;">' + new Date(n.created_at).toLocaleString() + '</span>';
        return '<div class="notification-item ' + (n.read ? 'read' : 'unread') + '" data-id="' + n.id + '" data-type="' + n.type + '" data-opinion="' + opinionId + '" data-post-id="' + postId + '">' +
          icon + ' ' + escapeHtml(detail) + ' - ' + label + reasonHtml + timeHtml +
        '</div>';
      }).join('');
    }

    // 底部按钮
    if (displayNotifs.length > 0) {
      html += '<div style="text-align:center;font-size:11px;color:#aaa;padding:6px 0 2px;">💡 点击消息即可标为已读</div>';
    }
    if (!showAll && readNotifs.length > 0) {
      html += '<div class="notif-footer"><button id="showAllNotifsBtn">📋 查看全部消息 →</button></div>';
    } else if (showAll) {
      html += '<div class="notif-footer"><button id="showUnreadBtn">← 仅看未读</button></div>';
    }

    dropdown.innerHTML = html;

    // 绑定通知项点击
    dropdown.querySelectorAll('.notification-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var notifs = getNotifs();
        var idx = notifs.findIndex(function(n) { return n.id === item.dataset.id; });
        if (idx !== -1) { notifs[idx].read = true; saveNotifs(notifs); }
        updateNotifDot();
        if (item.dataset.type === 'treehole_delete' || item.dataset.type === 'treehole_reply') {
          window.location.href = 'treehole.html';
        } else {
          window.location.href = 'opinions.html';
        }
        dropdown.style.display = 'none';
      });
    });

    // 绑定底部按钮
    var showAllBtn = document.getElementById('showAllNotifsBtn');
    if (showAllBtn) {
      showAllBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(true);
      });
    }
    var showUnreadBtn = document.getElementById('showUnreadBtn');
    if (showUnreadBtn) {
      showUnreadBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(false);
      });
    }
  }

  document.getElementById('notificationBell').addEventListener('click', function(e) {
    e.stopPropagation();
    var dropdown = document.getElementById('notificationDropdown');
    if (dropdown.style.display === 'block') {
      dropdown.style.display = 'none';
    } else {
      renderNotifDropdown(false);
      dropdown.style.display = 'block';
    }
  });
  document.addEventListener('click', function() {
    document.getElementById('notificationDropdown').style.display = 'none';
  });

  // 修改密码
  document.getElementById('changePwdBtn').addEventListener('click', function() {
    document.getElementById('pwdModal').classList.add('active');
  });
  window.closePwdModal = function() { document.getElementById('pwdModal').classList.remove('active'); };
  document.getElementById('pwdModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closePwdModal();
  });
  document.getElementById('submitPwdChange').addEventListener('click', async function() {
    var newPwd = document.getElementById('newPwd').value;
    var newPwdConfirm = document.getElementById('newPwdConfirm').value;
    if (!newPwd || newPwd.length < 6) { toast('新密码至少6位', 'warn'); return; }
    if (newPwd !== newPwdConfirm) { toast('两次输入的密码不一致', 'warn'); return; }
    var res = await supabaseClient.auth.updateUser({ password: newPwd });
    if (res.error) { toast(res.error.message, 'error'); }
    else {
      toast('密码修改成功，即将跳转登录页');
      setTimeout(function() {
        sessionStorage.clear();
        window.location.href = 'index.html';
      }, 1500);
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async function() {
    await supabaseClient.auth.signOut();
    sessionStorage.clear();
    window.location.href = 'index.html';
  });

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  init();
</script>
</body>
</html>
