<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级办事通 · 树洞</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'PingFang SC', sans-serif; }
    body { background: #f5f0e8; min-height: 100vh; }

    .navbar { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 12px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
    .logo { font-size: 22px; font-weight: 650; color: #4a3728; white-space: nowrap; }
    .user-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .badge { background: #f0ebe0; padding: 6px 16px; border-radius: 30px; font-size: 14px; color: #4a3728; font-weight: 500; }

    .btn { background: #4a3728; color: white; border: none; padding: 10px 22px; border-radius: 30px; cursor: pointer; font-weight: 550; font-size: 15px; transition: all 0.2s; white-space: nowrap; }
    .btn:hover { background: #6b5340; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,55,40,0.3); }
    .btn:active { transform: translateY(0); }
    .btn-outline { background: transparent; border: 1.5px solid #4a3728; color: #4a3728; }
    .btn-outline:hover { background: #f0ebe0; transform: translateY(-1px); }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }

    /* 发布便利贴 */
    .post-box { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
    .post-box h3 { color: #4a3728; margin-bottom: 16px; }
    textarea { width: 100%; padding: 14px 18px; border: 1.5px solid #e0d5c5; border-radius: 18px; margin-bottom: 14px; font-size: 15px; outline: none; transition: border-color 0.2s; background: #fefcf8; resize: vertical; min-height: 80px; }
    textarea:focus { border-color: #8b7355; box-shadow: 0 0 0 3px rgba(139,115,85,0.1); background: white; }

    /* 便利贴墙 */
    .sticky-wall { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 10px 0; }
    .sticky-note { width: 220px; min-height: 180px; padding: 20px 18px 14px; border-radius: 4px 20px 8px 24px; box-shadow: 3px 4px 12px rgba(0,0,0,0.1), 1px 1px 0 rgba(0,0,0,0.05); cursor: pointer; transition: all 0.25s; position: relative; display: flex; flex-direction: column; }
    .sticky-note:hover { transform: scale(1.06) rotate(0deg) !important; box-shadow: 6px 8px 20px rgba(0,0,0,0.18); z-index: 10; }
    .sticky-note::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 50px; height: 14px; background: rgba(255,255,255,0.7); border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .sticky-note .note-content { flex: 1; font-size: 15px; line-height: 1.6; color: #3d3226; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; word-break: break-word; }
    .sticky-note .note-footer { margin-top: 10px; display: flex; justify-content: space-between; align-items: flex-end; font-size: 12px; color: #8b7355; }
    .sticky-note .note-reactions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .sticky-note .reaction-badge { background: rgba(255,255,255,0.6); padding: 2px 7px; border-radius: 12px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
    .sticky-note .reaction-badge:hover { background: rgba(255,255,255,0.9); }

    /* 便利贴颜色 */
    .note-yellow { background: linear-gradient(170deg, #fff9c4, #fff176); }
    .note-pink { background: linear-gradient(170deg, #fce4ec, #f8bbd0); }
    .note-blue { background: linear-gradient(170deg, #e3f2fd, #90caf9); }
    .note-green { background: linear-gradient(170deg, #e8f5e9, #a5d6a7); }
    .note-orange { background: linear-gradient(170deg, #fff3e0, #ffcc80); }
    .note-purple { background: linear-gradient(170deg, #f3e5f5, #ce93d8); }
    .note-teal { background: linear-gradient(170deg, #e0f2f1, #80cbc4); }
    .note-peach { background: linear-gradient(170deg, #fdf2f0, #f4bfb5); }

    /* 模态框 */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: white; width: 92%; max-width: 560px; max-height: 85vh; border-radius: 24px; padding: 24px; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    .close-icon { float: right; font-size: 26px; cursor: pointer; color: #7a8fa0; line-height: 1; transition: color 0.2s; }
    .close-icon:hover { color: #4a3728; }

    /* 回复气泡 */
    .reply-bubble { padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; position: relative; }
    .reply-bubble.odd { background: #f5f0e8; margin-right: 40px; border-bottom-left-radius: 6px; }
    .reply-bubble.even { background: #e8edf5; margin-left: 40px; text-align: right; border-bottom-right-radius: 6px; }
    .reply-bubble .reply-author { font-weight: 600; font-size: 13px; color: #6b5340; margin-bottom: 4px; }
    .reply-bubble .reply-text { font-size: 15px; color: #333; line-height: 1.5; }
    .reply-bubble .reply-time { font-size: 11px; color: #999; margin-top: 4px; }

    .reply-input-row { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
    .reply-input-row input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1.5px solid #e0d5c5; outline: none; font-size: 15px; background: #fefcf8; }
    .reply-input-row input:focus { border-color: #8b7355; }

    /* 表情回应 */
    .emoji-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; padding-top: 12px; border-top: 1px solid #eee; }
    .emoji-btn { font-size: 22px; cursor: pointer; padding: 6px 10px; border-radius: 16px; transition: all 0.15s; position: relative; user-select: none; background: transparent; border: none; }
    .emoji-btn:hover { background: #f0ebe0; transform: scale(1.2); }
    .emoji-btn.active { background: #e8dcc8; }
    .emoji-btn .emoji-count { font-size: 11px; position: absolute; top: -4px; right: -2px; background: #4a3728; color: white; border-radius: 10px; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

    /* 空状态 */
    .empty-state { text-align: center; padding: 60px 20px; color: #8b7355; }
    .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }

    /* Toast */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 14px; color: white; font-weight: 500; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.18); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }
    .toast.warn { background: #e65100; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #e0d5c5; border-top-color: #4a3728; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.5); z-index: 999; align-items: center; justify-content: center; }
    .loading-overlay.active { display: flex; }

    @media (max-width: 640px) {
      .navbar { padding: 10px 16px; }
      .logo { font-size: 18px; }
      .sticky-note { width: 160px; min-height: 140px; padding: 14px 12px 10px; }
      .sticky-note .note-content { font-size: 14px; -webkit-line-clamp: 4; }
      .modal-content { width: 96%; padding: 16px; border-radius: 20px; }
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner" style="width:44px;height:44px;border-width:4px;"></div></div>
<div class="toast-container" id="toastContainer"></div>

<div class="navbar">
  <div class="logo">🌲 树洞</div>
  <div class="user-info">
    <span class="badge" id="userDisplay"></span>
    <button class="btn-outline btn" onclick="window.location.href='main.html'">← 返回控制台</button>
  </div>
</div>

<div class="container">
  <div class="post-box">
    <h3>📝 写一张便利贴</h3>
    <textarea id="postContent" placeholder="分享你的想法… 发布后将以匿名形式展示，但内容请保持友善~" maxlength="500"></textarea>
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
      <span style="font-size:13px;color:#8b7355;">🖐️ 所有人看到的内容都是匿名的</span>
      <span style="display:flex; gap:8px; align-items:center;">
        <span style="font-size:13px;color:#aaa;" id="charCount">0/500</span>
        <button class="btn" id="submitPostBtn">📌 贴上去</button>
      </span>
    </div>
  </div>

  <div class="sticky-wall" id="stickyWall"></div>
</div>

<!-- 便利贴详情弹窗 -->
<div class="modal" id="detailModal">
  <div class="modal-content" id="detailModalContent">
    <span class="close-icon" onclick="closeDetailModal()">&times;</span>
    <div id="detailNote" style="padding:24px 20px; border-radius:20px; margin-bottom:16px;"></div>
    <div id="detailReplies" style="max-height:280px; overflow-y:auto; margin-bottom:8px;"></div>
    <div class="emoji-bar" id="detailEmojiBar"></div>
    <div class="reply-input-row">
      <input type="text" id="detailReplyInput" placeholder="写回复..." maxlength="300">
      <button class="btn" id="sendDetailReplyBtn">发送</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
<script>
  const SUPABASE_URL = 'https://zmujidvqkihthhdbwuvw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptdWppZHZxa2lodGhoZGJ3dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjIxMDAsImV4cCI6MjA5MzAzODEwMH0.iWKqqpebMc3l3wjEBsP4X0QH1WwjtIovcJAEsDPr3kE';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const NOTE_COLORS = ['note-yellow', 'note-pink', 'note-blue', 'note-green', 'note-orange', 'note-purple', 'note-teal', 'note-peach'];
  const REACTION_EMOJIS = ['👍', '💪', '😊', '❤️', '🎉', '🌟', '🔥', '👏'];

  let currentUser = null;
  let postsData = [];
  let currentPostId = null;
  let detailReactions = {};

  function toast(msg, type) {
    type = type || 'success';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    el.addEventListener('click', function() { el.remove(); });
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 3500);
  }

  function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

  // 根据 post id 生成确定性的旋转角度 (-3 ~ 3 度)
  function getRotation(id) {
    var hash = 0;
    for (var i = 0; i < id.length; i++) {
      hash = ((hash << 5) - hash) + id.charCodeAt(i);
      hash |= 0;
    }
    return (hash % 70) / 10 - 3.5;
  }

  // 根据 post id 选择颜色
  function getColorClass(id) {
    var hash = 0;
    for (var i = 0; i < id.length; i++) {
      hash = ((hash << 5) - hash) + id.charCodeAt(i);
      hash |= 0;
    }
    return NOTE_COLORS[Math.abs(hash) % NOTE_COLORS.length];
  }

  async function init() {
    var userStr = sessionStorage.getItem('currentUser');
    if (!userStr) { window.location.href = 'index.html'; return; }
    currentUser = JSON.parse(userStr);
    document.getElementById('userDisplay').innerText =
      currentUser.real_name + ' (' + currentUser.student_id + ')';

    // 字数统计
    document.getElementById('postContent').addEventListener('input', function() {
      document.getElementById('charCount').textContent = this.value.length + '/500';
    });

    await loadPosts();
  }

  async function loadPosts() {
    showLoading();
    var res = await supabaseClient
      .from('treehole_posts')
      .select('*')
      .order('created_at', { ascending: false });
    if (res.error) { hideLoading(); toast('加载失败：' + res.error.message, 'error'); return; }
    postsData = res.data || [];

    // 加载所有表情统计数据
    var reactionsRes = await supabaseClient.from('treehole_reactions').select('*');
    var reactionsData = reactionsRes.data || [];

    // 加载回复计数
    var repliesRes = await supabaseClient.from('treehole_replies').select('post_id');

    hideLoading();

    // 构建表情映射: postId -> { emoji: count }
    var reactionMap = {};
    reactionsData.forEach(function(r) {
      if (!reactionMap[r.post_id]) reactionMap[r.post_id] = {};
      if (!reactionMap[r.post_id][r.emoji]) reactionMap[r.post_id][r.emoji] = { count: 0, byMe: false };
      reactionMap[r.post_id][r.emoji].count++;
      if (r.user_id === currentUser.id) reactionMap[r.post_id][r.emoji].byMe = true;
    });

    // 构建回复计数
    var replyCountMap = {};
    (repliesRes.data || []).forEach(function(r) {
      replyCountMap[r.post_id] = (replyCountMap[r.post_id] || 0) + 1;
    });

    renderWall(reactionMap, replyCountMap);
  }

  function renderWall(reactionMap, replyCountMap) {
    var wall = document.getElementById('stickyWall');
    if (postsData.length === 0) {
      wall.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p style="font-size:18px;font-weight:500;">墙上还没有便利贴</p><p style="margin-top:8px;color:#a09080;">来贴第一张吧！</p></div>';
      return;
    }
    wall.innerHTML = postsData.map(function(post) {
      var colorClass = getColorClass(post.id);
      var rotation = getRotation(post.id);
      var reactions = reactionMap[post.id] || {};
      var replyCount = replyCountMap[post.id] || 0;

      var reactionBadges = REACTION_EMOJIS.map(function(emoji) {
        var data = reactions[emoji];
        var count = data ? data.count : 0;
        if (count === 0) return '';
        return '<span class="reaction-badge">' + emoji + ' ' + count + '</span>';
      }).filter(Boolean).join('');

      return '<div class="sticky-note ' + colorClass + '" style="transform:rotate(' + rotation + 'deg);" data-post-id="' + post.id + '">' +
        '<div class="note-content">' + escapeHtml(post.content) + '</div>' +
        '<div class="note-reactions">' + (reactionBadges || '') + '</div>' +
        '<div class="note-footer">' +
          '<span>' + formatTime(post.created_at) + '</span>' +
          '<span>' + (replyCount ? '💬' + replyCount : '') + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    // 绑定点击事件
    wall.querySelectorAll('.sticky-note').forEach(function(note) {
      note.addEventListener('click', function() {
        openDetail(note.dataset.postId);
      });
    });
  }

  function formatTime(dateStr) {
    var d = new Date(dateStr);
    var now = new Date();
    var diff = now - d;
    if (diff < 60 * 1000) return '刚刚';
    if (diff < 60 * 60 * 1000) return Math.floor(diff / (60 * 1000)) + '分钟前';
    if (diff < 24 * 60 * 60 * 1000) return Math.floor(diff / (60 * 60 * 1000)) + '小时前';
    if (diff < 7 * 24 * 60 * 60 * 1000) return Math.floor(diff / (24 * 60 * 60 * 1000)) + '天前';
    return d.toLocaleDateString();
  }

  // 发布便利贴
  document.getElementById('submitPostBtn').addEventListener('click', async function() {
    var content = document.getElementById('postContent').value.trim();
    if (!content) { toast('请写点内容再贴上去~', 'warn'); return; }
    showLoading();
    var id = crypto.randomUUID();
    var colorIdx = Math.floor(Math.random() * NOTE_COLORS.length);
    var res = await supabaseClient.from('treehole_posts').insert({
      id: id,
      content: content,
      author_id: currentUser.id,
      author_name: currentUser.real_name,
      color: NOTE_COLORS[colorIdx]
    });
    hideLoading();
    if (res.error) { toast('发布失败：' + res.error.message, 'error'); return; }
    document.getElementById('postContent').value = '';
    document.getElementById('charCount').textContent = '0/500';
    toast('便利贴已贴上墙！');
    loadPosts();
  });

  // 回车发布
  document.getElementById('postContent').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('submitPostBtn').click();
    }
  });

  // 打开详情弹窗
  async function openDetail(postId) {
    currentPostId = postId;
    var post = postsData.find(function(p) { return p.id === postId; });
    if (!post) return;

    // 渲染便利贴内容
    var colorClass = getColorClass(post.id);
    var rotation = getRotation(post.id);
    document.getElementById('detailNote').innerHTML =
      '<div class="sticky-note ' + colorClass + '" style="transform:rotate(' + rotation + 'deg);width:100%;min-height:auto;cursor:default;margin:0 auto;max-width:400px;">' +
        '<div class="note-content" style="-webkit-line-clamp:unset;">' + escapeHtml(post.content) + '</div>' +
        '<div class="note-footer"><span>' + formatTime(post.created_at) + '</span></div>' +
      '</div>';

    // 加载回复
    showLoading();
    var repliesRes = await supabaseClient
      .from('treehole_replies')
      .select('*')
      .eq('post_id', postId)
      .order('created_at', { ascending: true });
    hideLoading();

    var replies = repliesRes.data || [];
    document.getElementById('detailReplies').innerHTML = replies.length === 0
      ? '<div style="text-align:center;color:#aaa;padding:20px;">还没有回复，来写第一条吧~</div>'
      : replies.map(function(r, i) {
          return '<div class="reply-bubble ' + (i % 2 === 0 ? 'odd' : 'even') + '">' +
            '<div class="reply-author">' + escapeHtml(r.user_name) + '</div>' +
            '<div class="reply-text">' + escapeHtml(r.content) + '</div>' +
            '<div class="reply-time">' + formatTime(r.created_at) + '</div>' +
          '</div>';
        }).join('');

    // 加载当前用户的表情及计数
    var reactionsRes = await supabaseClient
      .from('treehole_reactions')
      .select('*')
      .eq('post_id', postId);
    var allReactions = reactionsRes.data || [];
    detailReactions = {};
    REACTION_EMOJIS.forEach(function(emoji) {
      detailReactions[emoji] = { count: 0, byMe: false };
    });
    allReactions.forEach(function(r) {
      if (detailReactions[r.emoji]) {
        detailReactions[r.emoji].count++;
        if (r.user_id === currentUser.id) detailReactions[r.emoji].byMe = true;
      }
    });

    renderEmojiBar();
    document.getElementById('detailReplyInput').value = '';
    document.getElementById('detailModal').classList.add('active');
  }

  function renderEmojiBar() {
    var bar = document.getElementById('detailEmojiBar');
    bar.innerHTML = REACTION_EMOJIS.map(function(emoji) {
      var data = detailReactions[emoji];
      var activeClass = data.byMe ? ' active' : '';
      var countHtml = data.count > 0 ? '<span class="emoji-count">' + data.count + '</span>' : '';
      return '<button class="emoji-btn' + activeClass + '" data-emoji="' + emoji + '">' + emoji + countHtml + '</button>';
    }).join('');

    bar.querySelectorAll('.emoji-btn').forEach(function(btn) {
      btn.addEventListener('click', async function() {
        var emoji = btn.dataset.emoji;
        if (detailReactions[emoji].byMe) {
          // 移除表情
          var delRes = await supabaseClient
            .from('treehole_reactions')
            .delete()
            .eq('post_id', currentPostId)
            .eq('user_id', currentUser.id)
            .eq('emoji', emoji);
          if (delRes.error) { toast('操作失败', 'error'); return; }
          detailReactions[emoji].count--;
          detailReactions[emoji].byMe = false;
        } else {
          // 添加表情
          var insRes = await supabaseClient
            .from('treehole_reactions')
            .insert({ post_id: currentPostId, user_id: currentUser.id, emoji: emoji });
          if (insRes.error) { toast('操作失败', 'error'); return; }
          detailReactions[emoji].count++;
          detailReactions[emoji].byMe = true;
        }
        renderEmojiBar();
        loadPosts(); // 刷新墙上的表情计数
      });
    });
  }

  // 发送回复
  document.getElementById('sendDetailReplyBtn').addEventListener('click', async function() {
    var content = document.getElementById('detailReplyInput').value.trim();
    if (!content) { toast('请输入回复内容', 'warn'); return; }
    var id = crypto.randomUUID();
    var res = await supabaseClient.from('treehole_replies').insert({
      id: id,
      post_id: currentPostId,
      user_id: currentUser.id,
      user_name: currentUser.real_name,
      content: content
    });
    if (res.error) { toast('回复失败：' + res.error.message, 'error'); return; }
    openDetail(currentPostId);
    loadPosts();
  });

  document.getElementById('detailReplyInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('sendDetailReplyBtn').click();
    }
  });

  window.closeDetailModal = function() {
    document.getElementById('detailModal').classList.remove('active');
  };
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeDetailModal();
  });

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  init();
