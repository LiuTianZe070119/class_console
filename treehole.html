<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级办事通 · 树洞</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

    /* ====== 主题变量 ====== */
    :root {
      --bg-start: #FDF6F0; --bg-mid: #F8EDE3; --bg-end: #F2E0D0;
      --text: #3D2314; --text-muted: #8B7355; --text-light: #A09080;
      --accent: #C67B5C; --accent-hover: #D4946A; --accent-dark: #B5651D;
      --accent-light: rgba(198,123,92,0.10); --accent-light2: rgba(198,123,92,0.06);
      --card-bg: rgba(255,255,255,0.45); --card-border: rgba(255,255,255,0.4);
      --navbar-bg: rgba(255,255,255,0.18); --navbar-border: rgba(255,255,255,0.4);
      --input-bg: rgba(255,255,255,0.5); --input-border: #E0D0C0; --input-border-focus: #C67B5C;
      --danger: #C7564A; --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --btn-shadow: rgba(181,101,29,0.18); --btn-shadow-hover: rgba(181,101,29,0.28);
      --shadow: rgba(61,35,20,0.05); --shadow-lg: rgba(61,35,20,0.12);
      --modal-bg: rgba(255,255,255,0.7); --modal-overlay: rgba(61,35,20,0.25);
      --badge-bg: rgba(198,123,92,0.10);
      --divider: rgba(139,115,85,0.08);
      --notif-dropdown-bg: rgba(255,255,255,0.7);
      --notif-hover: rgba(198,123,92,0.05);
      --notif-unread: rgba(198,123,92,0.06);
      --footer-text: #B09080;
      --footer-link: #8B7355;
      --footer-link-hover: #C67B5C;
      --toast-success: rgba(93,155,111,0.92); --toast-error: rgba(199,86,74,0.92); --toast-warn: rgba(232,145,58,0.92);

      /* treehole-specific non-color variables */
      --blur-card: 16px;
      --blur-modal: 8px;
      --radius-card: 24px;
      --radius-btn: 28px;
      --radius-sm: 16px;
    }

    /* 绿色主题 */
    body[data-theme="green"] {
      --bg-start: #F2F7F4;
      --bg-mid: #E8F0EA;
      --bg-end: #D8E8DC;
      --text: #1A3D2A;
      --text-muted: #5B7B6A;
      --text-light: #8B9B8A;
      --accent: #5B8C6B;
      --accent-hover: #7BAA8B;
      --accent-dark: #3D6B4D;
      --accent-light: rgba(91,140,107,0.10);
      --accent-light2: rgba(91,140,107,0.06);
      --card-bg: rgba(255,255,255,0.45);
      --card-border: rgba(255,255,255,0.4);
      --navbar-bg: rgba(255,255,255,0.18);
      --navbar-border: rgba(255,255,255,0.4);
      --input-bg: rgba(255,255,255,0.5);
      --input-border: #C8D8C8;
      --input-border-focus: #5B8C6B;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(26,61,42,0.05);
      --shadow-lg: rgba(26,61,42,0.12);
      --modal-bg: rgba(255,255,255,0.7);
      --modal-overlay: rgba(26,61,42,0.25);
      --btn-shadow: rgba(61,107,77,0.18);
      --btn-shadow-hover: rgba(61,107,77,0.28);
      --badge-bg: rgba(91,140,107,0.10);
      --divider: rgba(91,123,106,0.08);
      --notif-dropdown-bg: rgba(255,255,255,0.7);
      --notif-hover: rgba(91,140,107,0.05);
      --notif-unread: rgba(91,140,107,0.06);
      --footer-text: #8B9B8A;
      --footer-link: #5B7B6A;
      --footer-link-hover: #5B8C6B;
    }

    /* 白色主题 */
    body[data-theme="white"] {
      --bg-start: #FAFAFA;
      --bg-mid: #F5F5F5;
      --bg-end: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666;
      --text-light: #999;
      --accent: #555;
      --accent-hover: #777;
      --accent-dark: #333;
      --accent-light: rgba(85,85,85,0.08);
      --accent-light2: rgba(85,85,85,0.04);
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(0,0,0,0.06);
      --navbar-bg: rgba(255,255,255,0.65);
      --navbar-border: rgba(0,0,0,0.06);
      --input-bg: rgba(255,255,255,0.85);
      --input-border: #DDD;
      --input-border-focus: #555;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(0,0,0,0.04);
      --shadow-lg: rgba(0,0,0,0.1);
      --modal-bg: rgba(255,255,255,0.9);
      --modal-overlay: rgba(0,0,0,0.15);
      --btn-shadow: rgba(0,0,0,0.1);
      --btn-shadow-hover: rgba(0,0,0,0.18);
      --badge-bg: rgba(85,85,85,0.08);
      --divider: rgba(0,0,0,0.06);
      --notif-dropdown-bg: rgba(255,255,255,0.9);
      --notif-hover: rgba(85,85,85,0.04);
      --notif-unread: rgba(85,85,85,0.06);
      --footer-text: #999;
      --footer-link: #666;
      --footer-link-hover: #555;
    }

    /* 黑色主题 */
    body[data-theme="black"] {
      --bg-start: #1A1A1A;
      --bg-mid: #161616;
      --bg-end: #111;
      --text: #E0D8D0;
      --text-muted: #999;
      --text-light: #777;
      --accent: #C67B5C;
      --accent-hover: #D4946A;
      --accent-dark: #B5651D;
      --accent-light: rgba(198,123,92,0.12);
      --accent-light2: rgba(198,123,92,0.06);
      --card-bg: rgba(40,40,40,0.6);
      --card-border: rgba(255,255,255,0.06);
      --navbar-bg: rgba(30,30,30,0.6);
      --navbar-border: rgba(255,255,255,0.06);
      --input-bg: rgba(50,50,50,0.5);
      --input-border: #444;
      --input-border-focus: #C67B5C;
      --danger: #D9665A;
      --danger-hover: #E8766A;
      --danger-bg: linear-gradient(135deg, #C7564A, #8B3020);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #A8403A);
      --shadow: rgba(0,0,0,0.3);
      --shadow-lg: rgba(0,0,0,0.5);
      --modal-bg: rgba(40,40,40,0.9);
      --modal-overlay: rgba(0,0,0,0.5);
      --btn-shadow: rgba(181,101,29,0.25);
      --btn-shadow-hover: rgba(181,101,29,0.4);
      --badge-bg: rgba(198,123,92,0.12);
      --divider: rgba(255,255,255,0.06);
      --notif-dropdown-bg: rgba(40,40,40,0.85);
      --notif-hover: rgba(198,123,92,0.06);
      --notif-unread: rgba(198,123,92,0.08);
      --footer-text: #777;
      --footer-link: #999;
      --footer-link-hover: #C67B5C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', 'PingFang SC', serif; }
    h1, h2, h3, .btn, .btn-outline, .logo { font-family: 'Noto Serif SC', serif; }
    body { background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%); min-height: 100vh; background-attachment: fixed; color: var(--text); transition: background 0.4s, color 0.4s; }

    .navbar { background: var(--navbar-bg); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); padding: 14px 28px; box-shadow: 0 4px 24px var(--shadow); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid var(--navbar-border); }
    .logo { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 600; color: var(--text); white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .logo svg { color: var(--accent); }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .badge { background: var(--accent-light); padding: 6px 16px; border-radius: 30px; font-size: 14px; color: var(--text-muted); font-weight: 500; }

    .btn { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border: none; padding: 10px 22px; border-radius: 24px; cursor: pointer; font-weight: 550; font-size: 15px; transition: all 0.25s; white-space: nowrap; box-shadow: 0 4px 14px var(--btn-shadow); display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); transform: translateY(-2px); box-shadow: 0 6px 20px var(--btn-shadow-hover); }
    .btn:active { transform: translateY(0); }
    .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); box-shadow: none; }
    .btn-outline:hover { background: var(--accent-light2); }
    .logo span, .btn span { display: inline-flex; align-items: center; }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }

    .post-box { background: var(--card-bg); backdrop-filter: blur(var(--blur-card)); -webkit-backdrop-filter: blur(var(--blur-card)); border-radius: var(--radius-card); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); border: 1px solid var(--card-border); transition: all 0.25s ease; }
    .post-box h3 { color: var(--text); margin-bottom: 16px; font-family: 'Noto Serif SC', serif; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .post-box h3 svg { color: var(--accent); }
    textarea { width: 100%; padding: 14px 18px; border: 1.5px solid var(--input-border); border-radius: var(--radius-sm); margin-bottom: 14px; font-size: 15px; outline: none; transition: all 0.2s ease; background: var(--input-bg); resize: vertical; min-height: 80px; color: var(--text); }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); background: rgba(255,255,255,0.8); }

    .sticky-wall { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 10px 0; }
    .sticky-note { width: 220px; min-height: 180px; padding: 20px 18px 14px; border-radius: 4px 20px 8px 24px; box-shadow: 3px 4px 14px rgba(139, 90, 60, 0.1), 0 1px 3px rgba(139, 90, 60, 0.06); cursor: pointer; transition: all 0.25s ease; position: relative; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.5); }
    .sticky-note:hover { transform: scale(1.06) rotate(0deg) !important; box-shadow: 6px 8px 24px rgba(139, 90, 60, 0.2); z-index: 10; }
    .sticky-note::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 50px; height: 14px; background: rgba(255,255,255,0.6); border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .sticky-note .note-content { flex: 1; font-size: 15px; line-height: 1.6; color: #3D2314; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; word-break: break-word; }
    .sticky-note .note-footer { margin-top: 10px; display: flex; justify-content: space-between; align-items: flex-end; font-size: 12px; color: rgba(61, 35, 20, 0.6); }
    .sticky-note .note-reactions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .sticky-note .reaction-badge { background: rgba(255,255,255,0.55); padding: 2px 7px; border-radius: 12px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
    .sticky-note .reaction-badge:hover { background: rgba(255,255,255,0.85); }

    .note-yellow { background: linear-gradient(170deg, rgba(255,249,220,0.92), rgba(255,224,130,0.88)); }
    .note-rose { background: linear-gradient(170deg, rgba(252,228,236,0.92), rgba(244,191,181,0.88)); }
    .note-sky { background: linear-gradient(170deg, rgba(232,240,254,0.92), rgba(168,200,250,0.88)); }
    .note-mint { background: linear-gradient(170deg, rgba(232,245,233,0.92), rgba(181,216,176,0.88)); }
    .note-amber { background: linear-gradient(170deg, rgba(255,243,224,0.92), rgba(255,204,128,0.88)); }
    .note-lavender { background: linear-gradient(170deg, rgba(243,229,245,0.92), rgba(212,181,216,0.88)); }
    .note-sage { background: linear-gradient(170deg, rgba(232,240,232,0.92), rgba(181,200,181,0.88)); }
    .note-peach { background: linear-gradient(170deg, rgba(254,240,232,0.92), rgba(244,191,168,0.88)); }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(var(--blur-modal)); -webkit-backdrop-filter: blur(var(--blur-modal)); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: var(--modal-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); width: 92%; max-width: 560px; max-height: 85vh; border-radius: var(--radius-card); padding: 24px; overflow-y: auto; box-shadow: 0 20px 60px var(--shadow-lg); border: 1px solid var(--card-border); }
    .close-icon { float: right; font-size: 26px; cursor: pointer; color: var(--text-muted); line-height: 1; transition: color 0.2s; display: flex; align-items: center; }
    .close-icon:hover { color: var(--text); }
    .close-icon svg { width: 24px; height: 24px; }

    .wall-delete-btn { position: absolute; top: 6px; right: 8px; width: 24px; height: 24px; border-radius: 50%; border: none; background: rgba(0,0,0,0.12); color: white; font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 5; }
    .sticky-note:hover .wall-delete-btn { opacity: 1; }
    .wall-delete-btn:hover { background: rgba(199, 86, 74, 0.7); }
    .wall-delete-btn svg { width: 14px; height: 14px; }
    .owner-badge { position: absolute; top: -4px; left: 12px; background: rgba(198, 123, 92, 0.8); backdrop-filter: blur(4px); color: white; font-size: 10px; padding: 2px 9px; border-radius: 10px; font-weight: 600; z-index: 5; }
    .detail-delete-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid rgba(199, 86, 74, 0.3); color: var(--danger); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; margin-top: 12px; transition: all 0.2s; font-weight: 500; }
    .detail-delete-btn:hover { background: rgba(199, 86, 74, 0.08); border-color: var(--danger); }
    .detail-delete-btn svg { width: 16px; height: 16px; }

    .notification-bell { position: relative; cursor: pointer; padding: 6px 8px; border-radius: 12px; transition: background 0.2s; display: flex; align-items: center; }
    .notification-bell:hover { background: rgba(255,255,255,0.5); }
    .notification-bell svg { width: 24px; height: 24px; color: var(--text); }
    .notification-dot { position: absolute; top: 2px; right: 2px; width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; border: 2px solid rgba(255,255,255,0.8); }
    .notification-dropdown { position: fixed; top: 60px; right: 20px; width: 340px; max-height: 420px; overflow-y: auto; background: var(--notif-dropdown-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 16px 48px var(--shadow-lg); border-radius: var(--radius-card); padding: 12px; display: none; z-index: 200; border: 1px solid var(--card-border); }
    .notification-item { padding: 10px 14px; border-bottom: 1px solid var(--divider); font-size: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 4px; transition: background 0.15s; display: flex; align-items: flex-start; gap: 10px; }
    .notification-item:hover { background: rgba(255,255,255,0.6); }
    .notification-item.unread { background: var(--notif-unread); font-weight: 600; }
    .notification-item.read { color: var(--text-muted); }
    .notification-item .notif-icon { flex-shrink: 0; margin-top: 1px; }
    .notification-item .notif-icon svg { width: 18px; height: 18px; }
    .notification-item .notif-body { flex: 1; min-width: 0; }
    .notif-footer { text-align: center; padding: 10px 0 2px; border-top: 1px solid var(--divider); margin-top: 8px; }
    .notif-footer button { background: none; border: none; color: var(--accent-dark); cursor: pointer; font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 16px; transition: background 0.2s; display: inline-flex; align-items: center; gap: 4px; }
    .notif-footer button:hover { background: rgba(255,255,255,0.5); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .delete-reason-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(var(--blur-modal)); -webkit-backdrop-filter: blur(var(--blur-modal)); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .delete-reason-modal.active { display: flex; }
    .delete-reason-content { background: var(--modal-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); width: 90%; max-width: 420px; border-radius: var(--radius-card); padding: 28px 24px; box-shadow: 0 20px 60px var(--shadow-lg); border: 1px solid var(--card-border); }
    .delete-reason-content h3 { color: var(--text); margin-bottom: 16px; font-family: 'Noto Serif SC', serif; display: flex; align-items: center; gap: 8px; }
    .delete-reason-content h3 svg { color: var(--danger); width: 22px; height: 22px; }
    .delete-reason-content textarea { width: 100%; padding: 14px; border: 1.5px solid var(--input-border); border-radius: var(--radius-sm); font-size: 15px; outline: none; resize: vertical; min-height: 80px; background: var(--input-bg); color: var(--text); }
    .delete-reason-content textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .delete-reason-content .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    .delete-reply-btn { font-size: 14px; cursor: pointer; opacity: 0; transition: opacity 0.2s; background: none; border: none; color: var(--danger); padding: 2px 6px; border-radius: 6px; margin-left: 6px; display: inline-flex; align-items: center; }
    .reply-bubble:hover .delete-reply-btn { opacity: 0.6; }
    .delete-reply-btn:hover { opacity: 1 !important; background: rgba(199, 86, 74, 0.1); }
    .delete-reply-btn svg { width: 14px; height: 14px; }

    .reply-bubble { padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; position: relative; }
    .reply-bubble.odd { background: rgba(255,255,255,0.5); margin-right: 40px; border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.3); }
    .reply-bubble.even { background: var(--accent-light); margin-left: 40px; text-align: right; border-bottom-right-radius: 6px; border: 1px solid var(--accent-light); }
    .reply-bubble .reply-author { font-weight: 600; font-size: 13px; color: var(--accent-dark); margin-bottom: 4px; }
    .reply-bubble .reply-text { font-size: 15px; color: var(--text); line-height: 1.5; }
    .reply-bubble .reply-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 6px; justify-content: inherit; }

    .reply-input-row { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--divider); }
    .reply-input-row input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1.5px solid var(--input-border); outline: none; font-size: 15px; background: var(--input-bg); color: var(--text); transition: all 0.2s ease; }
    .reply-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); background: rgba(255,255,255,0.8); }

    .emoji-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--divider); }
    .emoji-btn { font-size: 22px; cursor: pointer; padding: 6px 10px; border-radius: 16px; transition: all 0.15s ease; position: relative; user-select: none; background: transparent; border: none; }
    .emoji-btn:hover { background: rgba(255,255,255,0.6); transform: scale(1.2); }
    .emoji-btn.active { background: var(--accent-light); }
    .emoji-btn .emoji-count { font-size: 11px; position: absolute; top: -4px; right: -2px; background: var(--accent); color: white; border-radius: 10px; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 4px; font-weight: 600; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .empty-icon { margin-bottom: 16px; }
    .empty-state .empty-icon svg { width: 64px; height: 64px; color: rgba(198, 123, 92, 0.25); }

    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 14px; color: white; font-weight: 600; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.18); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; backdrop-filter: blur(8px); }
    .toast.success { background: var(--toast-success); }
    .toast.error { background: var(--toast-error); }
    .toast.warn { background: var(--toast-warn); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid rgba(198, 123, 92, 0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(253, 246, 240, 0.5); backdrop-filter: blur(2px); z-index: 999; align-items: center; justify-content: center; }

<script>
  // ========== SVG Icon System ==========
  function getIcon(name, size) {

    var w = size, h = size;
    var icons = {
      'tree-pine': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L8 8h3v2l-4 5h10l-4-5v-2h3L12 2z"/><path d="M12 16v6"/></svg>',

      'edit': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
      'eye': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
      'pin': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="3.5" r="1.8"/><path d="M15 5.5v5l3 1.5V13H6v-1.5l3-1.5v-5h6z"/></svg>',
      'trash': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>',
      'message-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
      'inbox': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
      'x': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>',
      'clipboard': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>',
      'lightbulb': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 2.4 1.2 4.5 3 5.7V17h8v-2.3c1.8-1.3 3-3.4 3-5.7a7 7 0 0 0-7-7z"/></svg>',
      'heart': '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
    };
    return icons[name] || '';
  }

  function initIcons() {
    document.getElementById('logoIcon').innerHTML = getIcon('tree-pine', 26);
    document.getElementById('bellIcon').innerHTML = getIcon('bell', 24);
    document.getElementById('backIcon').innerHTML = getIcon('arrow-left', 16);
    document.getElementById('editIcon').innerHTML = getIcon('edit', 22);
    document.getElementById('anonymousTip').innerHTML = getIcon('eye', 16);
    document.getElementById('deleteReasonIcon').innerHTML = getIcon('trash', 22);
    document.querySelector('#detailModalContent .close-icon').innerHTML = getIcon('x', 24);
  }

  // ========== App Logic ==========
  const SUPABASE_URL = 'https://zmujidvqkihthhdbwuvw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptdWppZHZxa2lodGhoZGJ3dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjIxMDAsImV4cCI6MjA5MzAzODEwMH0.iWKqqpebMc3l3wjEBsP4X0QH1WwjtIovcJAEsDPr3kE';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const NOTE_COLORS = ['note-yellow', 'note-rose', 'note-sky', 'note-mint', 'note-amber', 'note-lavender', 'note-sage', 'note-peach'];
  const REACTION_EMOJIS = ['👍', '💪', '😊', '❤️', '🎉', '🌟', '🔥', '👏'];
  const ANON_NAMES = ['小熊', '小鹿', '小兔', '小猫', '小狗', '小鱼', '小鸟', '小星', '小月', '小云', '小溪', '小树', '小花', '小草', '小雨', '小雪'];

  function getAnonName(userId) {
    var hash = 0;
    for (var i = 0; i < userId.length; i++) {
      hash = ((hash << 5) - hash) + userId.charCodeAt(i);
      hash |= 0;
    }
    return '匿名' + ANON_NAMES[Math.abs(hash) % ANON_NAMES.length];
  }

  let currentUser = null;
  let postsData = [];
  let currentPostId = null;
  let detailReactions = {};
  let pendingDelete = { postId: null, authorId: null, content: '', isAdminDelete: false };

  var STORAGE_NOTIF = 'classroom_notifications';
  function getNotifs() { return JSON.parse(localStorage.getItem(STORAGE_NOTIF) || '[]'); }
  function saveNotifs(arr) { localStorage.setItem(STORAGE_NOTIF, JSON.stringify(arr)); }
  function addNotification(userId, type, content, reason, postId) {
    if (!userId || userId === currentUser.id) return;
    var notifs = getNotifs();
    notifs.push({
      id: crypto.randomUUID(),
      user_id: userId,
      type: type,
      content: content,
      reason: reason || '',
      post_id: postId || '',
      read: false,
      created_at: new Date().toISOString()
    });
    saveNotifs(notifs);
    updateNotifDot();
  }
  function updateNotifDot() {
    var notifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id && !n.read; });
    document.getElementById('notificationDot').style.display = notifs.length ? 'block' : 'none';
  }

  function toast(msg, type) {
    type = type || 'success';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    el.addEventListener('click', function() { el.remove(); });
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 3500);
  }

  function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

  function showConfirm(title, msg, onConfirm, danger) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    var okBtn = document.getElementById('confirmOkBtn');
    okBtn.className = danger ? 'btn' : 'btn';
    if (danger) okBtn.style.background = 'var(--danger)';
    else okBtn.style.background = '';
    document.getElementById('confirmModal').classList.add('active');
    okBtn.onclick = function() { document.getElementById('confirmModal').classList.remove('active'); onConfirm(); };
    document.getElementById('confirmCancelBtn').onclick = function() { document.getElementById('confirmModal').classList.remove('active'); };
    document.getElementById('confirmModal').onclick = function(e) { if (e.target === e.currentTarget) document.getElementById('confirmModal').classList.remove('active'); };
  }

  function getRotation(id) {
    var hash = 0;
    for (var i = 0; i < id.length; i++) {
      hash = ((hash << 5) - hash) + id.charCodeAt(i);
      hash |= 0;
    }
    return (hash % 70) / 10 - 3.5;
  }

  function getColorClass(id) {
    var hash = 0;
    for (var i = 0; i < id.length; i++) {
      hash = ((hash << 5) - hash) + id.charCodeAt(i);
      hash |= 0;
    }
    return NOTE_COLORS[Math.abs(hash) % NOTE_COLORS.length];
  }

  async function init() {
    var userStr = sessionStorage.getItem('currentUser');
    if (!userStr) { window.location.href = 'index.html'; return; }
    currentUser = JSON.parse(userStr);

    initIcons();
    updateNotifDot();

    document.getElementById('postContent').addEventListener('input', function() {
      document.getElementById('charCount').textContent = this.value.length + '/500';
    });

    await loadPosts();
  }

  async function loadPosts() {
    showLoading();
    var res = await supabaseClient
      .from('treehole_posts')
      .select('*')
      .order('created_at', { ascending: false });
    if (res.error) { hideLoading(); toast('加载失败：' + res.error.message, 'error'); return; }
    postsData = res.data || [];

    var reactionsRes = await supabaseClient.from('treehole_reactions').select('*');
    var reactionsData = reactionsRes.data || [];

    var repliesRes = await supabaseClient.from('treehole_replies').select('post_id');

    hideLoading();

    var reactionMap = {};
    reactionsData.forEach(function(r) {
      if (!reactionMap[r.post_id]) reactionMap[r.post_id] = {};
      if (!reactionMap[r.post_id][r.emoji]) reactionMap[r.post_id][r.emoji] = { count: 0, byMe: false };
      reactionMap[r.post_id][r.emoji].count++;
      if (r.user_id === currentUser.id) reactionMap[r.post_id][r.emoji].byMe = true;
    });

    var replyCountMap = {};
    (repliesRes.data || []).forEach(function(r) {
      replyCountMap[r.post_id] = (replyCountMap[r.post_id] || 0) + 1;
    });

    renderWall(reactionMap, replyCountMap);
  }

  function renderWall(reactionMap, replyCountMap) {
    var wall = document.getElementById('stickyWall');
    if (postsData.length === 0) {
      wall.innerHTML = '<div class="empty-state"><div class="empty-icon">' + getIcon('inbox', 64) + '</div><p style="font-size:18px;font-weight:600;color:var(--text);">墙上还没有便利贴</p><p style="margin-top:8px;color:var(--text-muted);">来贴第一张吧！</p></div>';
      return;
    }
    wall.innerHTML = postsData.map(function(post) {
      var colorClass = getColorClass(post.id);
      var rotation = getRotation(post.id);
      var reactions = reactionMap[post.id] || {};
      var replyCount = replyCountMap[post.id] || 0;
      var isOwner = currentUser.id === post.author_id;
      var canDelete = isOwner || currentUser.role === 'admin';

      var reactionBadges = REACTION_EMOJIS.map(function(emoji) {
        var data = reactions[emoji];
        var count = data ? data.count : 0;
        if (count === 0) return '';
        return '<span class="reaction-badge">' + emoji + ' ' + count + '</span>';
      }).filter(Boolean).join('');

      var replyIcon = replyCount ? '<span style="display:inline-flex;align-items:center;gap:2px;">' + getIcon('message-circle', 14) + replyCount + '</span>' : '';

      return '<div class="sticky-note ' + colorClass + '" style="transform:rotate(' + rotation + 'deg);" data-post-id="' + post.id + '">' +
        (isOwner ? '<span class="owner-badge">你的便利贴</span>' : '') +
        (canDelete ? '<button class="wall-delete-btn" data-delete-id="' + post.id + '" data-author-id="' + post.author_id + '" data-content="' + escapeAttr(post.content) + '">' + getIcon('x', 14) + '</button>' : '') +
        '<div class="note-content">' + escapeHtml(post.content) + '</div>' +
        '<div class="note-reactions">' + (reactionBadges || '') + '</div>' +
        '<div class="note-footer">' +
          '<span>' + formatTime(post.created_at) + '</span>' +
          '<span>' + replyIcon + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    wall.querySelectorAll('.sticky-note').forEach(function(note) {
      note.addEventListener('click', function(e) {
        if (e.target.closest('.wall-delete-btn')) return;
        openDetail(note.dataset.postId);
      });
    });

    wall.querySelectorAll('.wall-delete-btn').forEach(function(btn) {
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        var postId = btn.dataset.deleteId;
        var authorId = btn.dataset.authorId;
        var content = btn.dataset.content;
        startDelete(postId, authorId, content);
      });
    });
  }

  function formatTime(dateStr) {
    var d = new Date(dateStr);
    var now = new Date();
    var diff = now - d;
    if (diff < 60 * 1000) return '刚刚';
    if (diff < 60 * 60 * 1000) return Math.floor(diff / (60 * 1000)) + '分钟前';
    if (diff < 24 * 60 * 60 * 1000) return Math.floor(diff / (60 * 60 * 1000)) + '小时前';
    if (diff < 7 * 24 * 60 * 60 * 1000) return Math.floor(diff / (24 * 60 * 60 * 1000)) + '天前';
    return d.toLocaleDateString();
  }

  document.getElementById('submitPostBtn').addEventListener('click', async function() {
    var content = document.getElementById('postContent').value.trim();
    if (!content) { toast('请写点内容再贴上去~', 'warn'); return; }
    showLoading();
    var id = crypto.randomUUID();
    var colorIdx = Math.floor(Math.random() * NOTE_COLORS.length);
    var res = await supabaseClient.from('treehole_posts').insert({
      id: id,
      content: content,
      author_id: currentUser.id,
      author_name: currentUser.real_name,
      color: NOTE_COLORS[colorIdx]
    });
    hideLoading();
    if (res.error) { toast('发布失败：' + res.error.message, 'error'); return; }
    document.getElementById('postContent').value = '';
    document.getElementById('charCount').textContent = '0/500';
    toast('便利贴已贴上墙！');
    loadPosts();
  });

  document.getElementById('postContent').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('submitPostBtn').click();
    }
  });

  async function openDetail(postId) {
    currentPostId = postId;
    var post = postsData.find(function(p) { return p.id === postId; });
    if (!post) return;

    var colorClass = getColorClass(post.id);
    var rotation = getRotation(post.id);
    var canDelete = currentUser.id === post.author_id || currentUser.role === 'admin';
    var isOwner = currentUser.id === post.author_id;
    document.getElementById('detailNote').innerHTML =
      '<div class="sticky-note ' + colorClass + '" style="transform:rotate(' + rotation + 'deg);width:100%;min-height:auto;cursor:default;margin:0 auto;max-width:400px;">' +
        (isOwner ? '<span class="owner-badge">你的便利贴</span>' : '') +
        '<div class="note-content" style="-webkit-line-clamp:unset;">' + escapeHtml(post.content) + '</div>' +
        '<div class="note-footer"><span>' + formatTime(post.created_at) + '</span></div>' +
      '</div>' +
      (canDelete ? '<div style="text-align:right;"><button class="detail-delete-btn" id="deletePostBtn">' + getIcon('trash', 16) + ' 删除这张便利贴</button></div>' : '');

    if (canDelete) {
      document.getElementById('deletePostBtn').addEventListener('click', function() {
        startDelete(postId, post.author_id, post.content);
      });
    }

    showLoading();
    var repliesRes = await supabaseClient
      .from('treehole_replies')
      .select('*')
      .eq('post_id', postId)
      .order('created_at', { ascending: true });
    hideLoading();

    var replies = repliesRes.data || [];
    document.getElementById('detailReplies').innerHTML = replies.length === 0
      ? '<div style="text-align:center;color:var(--text-muted);padding:20px;">还没有回复，来写第一条吧~</div>'
      : replies.map(function(r, i) {
          var canDeleteReply = currentUser.id === r.user_id || currentUser.role === 'admin';
          return '<div class="reply-bubble ' + (i % 2 === 0 ? 'odd' : 'even') + '">' +
            '<div class="reply-text">' + escapeHtml(r.content) + '</div>' +
            '<div class="reply-time">' + formatTime(r.created_at) +
              (canDeleteReply ? ' <button class="delete-reply-btn" data-reply-id="' + r.id + '" title="删除回复">' + getIcon('x', 14) + '</button>' : '') +
            '</div>' +
          '</div>';
        }).join('');

    document.querySelectorAll('.delete-reply-btn').forEach(function(btn) {
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        showConfirm('删除回复', '确定删除这条回复吗？', async function() {
        var res = await supabaseClient.from('treehole_replies').delete().eq('id', btn.dataset.replyId);
        if (res.error) { toast('删除失败：' + res.error.message, 'error'); return; }
        toast('回复已删除');
        openDetail(currentPostId);
        loadPosts();
        });
      });
    });

    var reactionsRes = await supabaseClient
      .from('treehole_reactions')
      .select('*')
      .eq('post_id', postId);
    var allReactions = reactionsRes.data || [];
    detailReactions = {};
    REACTION_EMOJIS.forEach(function(emoji) {
      detailReactions[emoji] = { count: 0, byMe: false };
    });
    allReactions.forEach(function(r) {
      if (detailReactions[r.emoji]) {
        detailReactions[r.emoji].count++;
        if (r.user_id === currentUser.id) detailReactions[r.emoji].byMe = true;
      }
    });

    renderEmojiBar();
    document.getElementById('detailReplyInput').value = '';
    document.getElementById('detailModal').classList.add('active');
  }

  function renderEmojiBar() {
    var bar = document.getElementById('detailEmojiBar');
    bar.innerHTML = REACTION_EMOJIS.map(function(emoji) {
      var data = detailReactions[emoji];
      var activeClass = data.byMe ? ' active' : '';
      var countHtml = data.count > 0 ? '<span class="emoji-count">' + data.count + '</span>' : '';
      return '<button class="emoji-btn' + activeClass + '" data-emoji="' + emoji + '">' + emoji + countHtml + '</button>';
    }).join('');

    bar.querySelectorAll('.emoji-btn').forEach(function(btn) {
      btn.addEventListener('click', async function() {
        var emoji = btn.dataset.emoji;
        if (detailReactions[emoji].byMe) {
          var delRes = await supabaseClient
            .from('treehole_reactions')
            .delete()
            .eq('post_id', currentPostId)
            .eq('user_id', currentUser.id)
            .eq('emoji', emoji);
          if (delRes.error) { toast('操作失败', 'error'); return; }
          detailReactions[emoji].count--;
          detailReactions[emoji].byMe = false;
        } else {
          var insRes = await supabaseClient
            .from('treehole_reactions')
            .insert({ post_id: currentPostId, user_id: currentUser.id, emoji: emoji });
          if (insRes.error) { toast('操作失败', 'error'); return; }
          detailReactions[emoji].count++;
          detailReactions[emoji].byMe = true;
        }
        renderEmojiBar();
        loadPosts();
      });
    });
  }

  document.getElementById('sendDetailReplyBtn').addEventListener('click', async function() {
    var content = document.getElementById('detailReplyInput').value.trim();
    if (!content) { toast('请输入回复内容', 'warn'); return; }
    var id = crypto.randomUUID();
    var res = await supabaseClient.from('treehole_replies').insert({
      id: id,
      post_id: currentPostId,
      user_id: currentUser.id,
      user_name: currentUser.real_name,
      content: content
    });
    if (res.error) { toast('回复失败：' + res.error.message, 'error'); return; }
    var post = postsData.find(function(p) { return p.id === currentPostId; });
    if (post && post.author_id !== currentUser.id) {
      addNotification(post.author_id, 'treehole_reply', post.content, '', post.id);
    }
    openDetail(currentPostId);
    loadPosts();
  });

  document.getElementById('detailReplyInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('sendDetailReplyBtn').click();
    }
  });

  window.closeDetailModal = function() {
    document.getElementById('detailModal').classList.remove('active');
  };
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeDetailModal();
  });

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  function escapeAttr(text) {
    return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderNotifDropdown(showAll) {
    var dropdown = document.getElementById('notificationDropdown');
    var allNotifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id; }).sort(function(a,b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });
    var unreadNotifs = allNotifs.filter(function(n) { return !n.read; });
    var readNotifs = allNotifs.filter(function(n) { return n.read; });
    var displayNotifs = showAll ? allNotifs : unreadNotifs;

    var html = '';
    if (displayNotifs.length === 0) {
      html = '<div style="padding:16px;text-align:center;color:var(--text-muted);">' + (showAll ? '暂无任何通知' : '暂无新通知') + '</div>';
    } else {
      html = displayNotifs.map(function(n) {
        var icon = getIcon('bell', 18);
        var label = '';
        if (n.type === 'treehole_delete') { icon = getIcon('trash', 18); label = '便利贴被管理员删除'; }
        else if (n.type === 'treehole_reply') { icon = getIcon('message-circle', 18); label = '便利贴有新回复'; }
        var timeHtml = '<br><span style="font-size:11px;color:var(--text-muted);">' + formatTime(n.created_at) + '</span>';
        return '<div class="notification-item ' + (n.read ? 'read' : 'unread') + '" data-id="' + n.id + '" data-post-id="' + (n.post_id || '') + '">' +
          '<span class="notif-icon">' + icon + '</span>' +
          '<span class="notif-body">' + label + (n.content ? '<br><span style="font-size:12px;color:var(--text-muted);">内容：' + escapeHtml(n.content.substring(0, 40) + (n.content.length > 40 ? '...' : '')) + '</span>' : '') +
          (n.reason ? '<br><span style="font-size:12px;color:var(--danger);">原因：' + escapeHtml(n.reason) + '</span>' : '') +
          timeHtml + '</span>' +
        '</div>';
      }).join('');
    }

    if (displayNotifs.length > 0) {
      html += '<div style="text-align:center;font-size:11px;color:var(--text-muted);padding:6px 0 2px;">' + getIcon('lightbulb', 14) + ' 点击消息即可标为已读</div>';
    }
    if (!showAll) {
      if (unreadNotifs.length === 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 16) + ' 查看历史通知</button></div>';
      } else if (readNotifs.length > 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 16) + ' 查看全部消息</button></div>';
      }
    } else {
      html += '<div class="notif-footer"><button id="showUnreadBtn">' + getIcon('arrow-left', 16) + ' 仅看未读</button></div>';
    }

    dropdown.innerHTML = html;

    dropdown.querySelectorAll('.notification-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var notifs = getNotifs();
        var idx = notifs.findIndex(function(n) { return n.id === item.dataset.id; });
        if (idx !== -1) { notifs[idx].read = true; saveNotifs(notifs); }
        updateNotifDot();
        dropdown.style.display = 'none';
        var postId = item.dataset.postId;
        if (postId) { openDetail(postId); }
      });
    });

    var showAllBtn = document.getElementById('showAllNotifsBtn');
    if (showAllBtn) {
      showAllBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(true);
      });
    }
    var showUnreadBtn = document.getElementById('showUnreadBtn');
    if (showUnreadBtn) {
      showUnreadBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(false);
      });
    }
  }

  document.getElementById('notificationBell').addEventListener('click', function(e) {
    e.stopPropagation();
    var dropdown = document.getElementById('notificationDropdown');
    if (dropdown.style.display === 'block') {
      dropdown.style.display = 'none';
    } else {
      renderNotifDropdown(false);
      dropdown.style.display = 'block';
    }
  });
  document.addEventListener('click', function() {
    document.getElementById('notificationDropdown').style.display = 'none';
  });

  function startDelete(postId, authorId, content) {
    var isAdminDeletingOther = currentUser.role === 'admin' && currentUser.id !== authorId;
    if (isAdminDeletingOther) {
      pendingDelete = { postId: postId, authorId: authorId, content: content, isAdminDelete: true };
      document.getElementById('deleteReasonInput').value = '';
      document.getElementById('deleteReasonModal').classList.add('active');
    } else {
      showConfirm('删除便利贴', '确定删除这张便利贴吗？\n此操作不可撤销。', function() {
        pendingDelete = { postId: postId, authorId: authorId, content: content, isAdminDelete: false };
        executeDelete();
      }, true);
    }
  }

  async function executeDelete() {
    showLoading();
    var res = await supabaseClient.from('treehole_posts').delete().eq('id', pendingDelete.postId);
    hideLoading();
    if (res.error) { toast('删除失败：' + res.error.message, 'error'); return; }
    toast('便利贴已取下');
    closeDetailModal();
    if (pendingDelete.isAdminDelete) {
      var reason = document.getElementById('deleteReasonInput').value.trim() || '未填写原因';
      addNotification(pendingDelete.authorId, 'treehole_delete', pendingDelete.content, reason);
    }
    postsData = postsData.filter(function(p) { return p.id !== pendingDelete.postId; });
    var wallNote = document.querySelector('.sticky-note[data-post-id="' + pendingDelete.postId + '"]');
    if (wallNote) { wallNote.style.opacity = '0'; wallNote.style.transform = 'scale(0.8)'; wallNote.style.transition = 'all 0.25s'; }
    setTimeout(function() { if (wallNote) wallNote.remove(); }, 250);
    pendingDelete = { postId: null, authorId: null, content: '', isAdminDelete: false };
  }

  document.getElementById('cancelDeleteBtn').addEventListener('click', function() {
    document.getElementById('deleteReasonModal').classList.remove('active');
    pendingDelete = { postId: null, authorId: null, content: '', isAdminDelete: false };
  });
  document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
    if (!document.getElementById('deleteReasonInput').value.trim()) {
      toast('请输入删除原因', 'warn');
      return;
    }
    document.getElementById('deleteReasonModal').classList.remove('active');
    executeDelete();
  });
  document.getElementById('deleteReasonModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) {
      document.getElementById('deleteReasonModal').classList.remove('active');
      pendingDelete = { postId: null, authorId: null, content: '', isAdminDelete: false };
    }
  });

  init();
</script>
</body>
</html>
