<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人设置 · 班级办事通</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

    /* ====== 主题变量 ====== */
    :root {
      --bg-start: #FDF6F0;
      --bg-mid: #F8EDE3;
      --bg-end: #F2E0D0;
      --text: #3D2314;
      --text-muted: #8B7355;
      --text-light: #B09080;
      --accent: #C67B5C;
      --accent-hover: #D4946A;
      --accent-dark: #B5651D;
      --accent-light: rgba(198,123,92,0.10);
      --accent-light2: rgba(198,123,92,0.06);
      --card-bg: rgba(255,255,255,0.45);
      --card-border: rgba(255,255,255,0.4);
      --navbar-bg: rgba(255,255,255,0.18);
      --navbar-border: rgba(255,255,255,0.4);
      --input-bg: rgba(255,255,255,0.5);
      --input-border: #E0D0C0;
      --input-border-focus: #C67B5C;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(61,35,20,0.05);
      --shadow-lg: rgba(61,35,20,0.12);
      --modal-bg: rgba(255,255,255,0.7);
      --modal-overlay: rgba(61,35,20,0.25);
      --btn-shadow: rgba(181,101,29,0.18);
      --btn-shadow-hover: rgba(181,101,29,0.28);
      --badge-bg: rgba(198,123,92,0.10);
      --avatar-bg: linear-gradient(135deg, #C67B5C, #B5651D);
      --divider: rgba(139,115,85,0.08);
      --dot-bg: #C7564A;
      --bell-hover: rgba(198,123,92,0.08);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(255,255,255,0.7);
      --notif-hover: rgba(198,123,92,0.05);
      --notif-unread: rgba(198,123,92,0.06);
      --footer-text: #B09080;
      --footer-link: #8B7355;
      --footer-link-hover: #C67B5C;
    }

    /* 绿色主题 */
    body[data-theme="green"] {
      --bg-start: #F2F7F4;
      --bg-mid: #E8F0EA;
      --bg-end: #D8E8DC;
      --text: #1A3D2A;
      --text-muted: #5B7B6A;
      --text-light: #8B9B8A;
      --accent: #5B8C6B;
      --accent-hover: #7BAA8B;
      --accent-dark: #3D6B4D;
      --accent-light: rgba(91,140,107,0.10);
      --accent-light2: rgba(91,140,107,0.06);
      --card-bg: rgba(255,255,255,0.45);
      --card-border: rgba(255,255,255,0.4);
      --navbar-bg: rgba(255,255,255,0.18);
      --navbar-border: rgba(255,255,255,0.4);
      --input-bg: rgba(255,255,255,0.5);
      --input-border: #C8D8C8;
      --input-border-focus: #5B8C6B;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(26,61,42,0.05);
      --shadow-lg: rgba(26,61,42,0.12);
      --modal-bg: rgba(255,255,255,0.7);
      --modal-overlay: rgba(26,61,42,0.25);
      --btn-shadow: rgba(61,107,77,0.18);
      --btn-shadow-hover: rgba(61,107,77,0.28);
      --badge-bg: rgba(91,140,107,0.10);
      --avatar-bg: linear-gradient(135deg, #5B8C6B, #3D6B4D);
      --divider: rgba(91,123,106,0.08);
      --dot-bg: #C7564A;
      --bell-hover: rgba(91,140,107,0.08);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(255,255,255,0.7);
      --notif-hover: rgba(91,140,107,0.05);
      --notif-unread: rgba(91,140,107,0.06);
      --footer-text: #8B9B8A;
      --footer-link: #5B7B6A;
      --footer-link-hover: #5B8C6B;
    }

    /* 白色主题 */
    body[data-theme="white"] {
      --bg-start: #FAFAFA;
      --bg-mid: #F5F5F5;
      --bg-end: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666;
      --text-light: #999;
      --accent: #555;
      --accent-hover: #777;
      --accent-dark: #333;
      --accent-light: rgba(85,85,85,0.08);
      --accent-light2: rgba(85,85,85,0.04);
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(0,0,0,0.06);
      --navbar-bg: rgba(255,255,255,0.65);
      --navbar-border: rgba(0,0,0,0.06);
      --input-bg: rgba(255,255,255,0.85);
      --input-border: #DDD;
      --input-border-focus: #555;
      --danger: #C7564A;
      --danger-hover: #D9665A;
      --danger-bg: linear-gradient(135deg, #C7564A, #A8403A);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #C7564A);
      --shadow: rgba(0,0,0,0.04);
      --shadow-lg: rgba(0,0,0,0.1);
      --modal-bg: rgba(255,255,255,0.9);
      --modal-overlay: rgba(0,0,0,0.15);
      --btn-shadow: rgba(0,0,0,0.1);
      --btn-shadow-hover: rgba(0,0,0,0.18);
      --badge-bg: rgba(85,85,85,0.08);
      --avatar-bg: linear-gradient(135deg, #555, #333);
      --divider: rgba(0,0,0,0.06);
      --dot-bg: #C7564A;
      --bell-hover: rgba(85,85,85,0.06);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(255,255,255,0.9);
      --notif-hover: rgba(85,85,85,0.04);
      --notif-unread: rgba(85,85,85,0.06);
      --footer-text: #999;
      --footer-link: #666;
      --footer-link-hover: #555;
    }

    /* 黑色主题 */
    body[data-theme="black"] {
      --bg-start: #1A1A1A;
      --bg-mid: #161616;
      --bg-end: #111;
      --text: #E0D8D0;
      --text-muted: #999;
      --text-light: #777;
      --accent: #C67B5C;
      --accent-hover: #D4946A;
      --accent-dark: #B5651D;
      --accent-light: rgba(198,123,92,0.12);
      --accent-light2: rgba(198,123,92,0.06);
      --card-bg: rgba(40,40,40,0.6);
      --card-border: rgba(255,255,255,0.06);
      --navbar-bg: rgba(30,30,30,0.6);
      --navbar-border: rgba(255,255,255,0.06);
      --input-bg: rgba(50,50,50,0.5);
      --input-border: #444;
      --input-border-focus: #C67B5C;
      --danger: #D9665A;
      --danger-hover: #E8766A;
      --danger-bg: linear-gradient(135deg, #C7564A, #8B3020);
      --danger-bg-hover: linear-gradient(135deg, #D9665A, #A8403A);
      --shadow: rgba(0,0,0,0.3);
      --shadow-lg: rgba(0,0,0,0.5);
      --modal-bg: rgba(40,40,40,0.9);
      --modal-overlay: rgba(0,0,0,0.5);
      --btn-shadow: rgba(181,101,29,0.25);
      --btn-shadow-hover: rgba(181,101,29,0.4);
      --badge-bg: rgba(198,123,92,0.12);
      --avatar-bg: linear-gradient(135deg, #C67B5C, #B5651D);
      --divider: rgba(255,255,255,0.06);
      --dot-bg: #D9665A;
      --bell-hover: rgba(198,123,92,0.1);
      --toast-success: rgba(93,155,111,0.92);
      --toast-error: rgba(199,86,74,0.92);
      --toast-warn: rgba(232,145,58,0.92);
      --notif-dropdown-bg: rgba(40,40,40,0.85);
      --notif-hover: rgba(198,123,92,0.06);
      --notif-unread: rgba(198,123,92,0.08);
      --footer-text: #777;
      --footer-link: #999;
      --footer-link-hover: #C67B5C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif SC', 'PingFang SC', serif; }
    body { background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%); min-height: 100vh; background-attachment: fixed; color: var(--text); transition: background 0.4s; }

    h1, h2, h3, .btn, .btn-outline, .logo { font-family: 'Noto Serif SC', serif; }

    .navbar { background: var(--navbar-bg); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); padding: 14px 28px; box-shadow: 0 4px 24px var(--shadow); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid var(--navbar-border); transition: background 0.4s, box-shadow 0.4s, border-color 0.4s; }
    .logo { font-size: 22px; font-weight: 600; color: var(--text); white-space: nowrap; display: flex; align-items: center; gap: 8px; transition: color 0.4s; }
    .logo svg { color: var(--accent); transition: color 0.4s; }
    .btn { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border: none; padding: 10px 24px; border-radius: 24px; cursor: pointer; font-weight: 550; font-size: 15px; transition: all 0.25s; box-shadow: 0 4px 14px var(--btn-shadow); display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); transform: translateY(-2px); box-shadow: 0 6px 20px var(--btn-shadow-hover); }
    .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); box-shadow: none; }
    .btn-outline:hover { background: var(--accent-light2); transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-danger { background: var(--danger-bg); color: white; box-shadow: 0 4px 14px rgba(199,86,74,0.18); }
    .btn-danger:hover { background: var(--danger-bg-hover); box-shadow: 0 6px 20px rgba(199,86,74,0.28); }
    .notification-bell { position: relative; cursor: pointer; padding: 4px; border-radius: 12px; transition: background 0.2s; display: flex; align-items: center; }
    .notification-bell svg { width: 26px; height: 26px; color: var(--text-muted); transition: color 0.4s; }
    .notification-bell:hover { background: var(--bell-hover); }
    .logo span, .btn span { display: inline-flex; align-items: center; }

    .container { max-width: 640px; margin: 0 auto; padding: 32px 20px; }

    .card {
      background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 24px; padding: 24px;
      box-shadow: 0 4px 24px var(--shadow);
      margin-bottom: 20px; border: 1px solid var(--card-border);
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .card-header h3 { color: var(--text); display: flex; align-items: center; gap: 8px; transition: color 0.4s; }
    .card-header h3 svg { color: var(--accent); transition: color 0.4s; }

    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--divider); gap: 16px; flex-wrap: wrap; transition: border-color 0.4s; }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 15px; color: var(--text); font-weight: 500; transition: color 0.4s; }
    .setting-desc { font-size: 12px; color: var(--text-light); margin-top: 2px; transition: color 0.4s; }
    .setting-value { font-size: 14px; color: var(--text-muted); transition: color 0.4s; }
    .setting-action { cursor: pointer; color: var(--accent); font-size: 13px; font-weight: 500; background: none; border: 1.5px solid var(--accent); opacity: 0.5; padding: 6px 16px; border-radius: 16px; transition: all 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; line-height: 1; }
    .setting-action span { display: inline-flex; align-items: center; }
    .setting-action:hover { opacity: 1; background: var(--accent-light2); }

    .input-field { width: 100%; padding: 12px 16px; border: 1.5px solid var(--input-border); border-radius: 16px; font-size: 15px; outline: none; transition: all 0.2s; background: var(--input-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: var(--text); margin-bottom: 14px; }
    .input-field:focus { border-color: var(--input-border-focus); box-shadow: 0 0 0 3px var(--accent-light); background: var(--card-bg); }
    .input-field::placeholder { color: var(--text-light); }
    .input-row { display: flex; gap: 10px; align-items: center; }
    .input-row .input-field { flex: 1; }

    .profile-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: 600; flex-shrink: 0; transition: background 0.4s; }
    .profile-info { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
    .profile-text h4 { font-size: 18px; color: var(--text); margin-bottom: 4px; transition: color 0.4s; }
    .profile-text span { font-size: 13px; color: var(--text-muted); transition: color 0.4s; }
    .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .profile-badge { font-size: 12px; padding: 3px 12px; border-radius: 20px; font-weight: 500; background: var(--badge-bg); color: var(--accent); transition: all 0.4s; }

    /* 主题色块选择器 */
    .theme-swatches { display: flex; gap: 10px; }
    .theme-swatch {
      padding: 9px 20px; border-radius: 20px;
      cursor: pointer; border: none; outline: none;
      transition: transform 0.2s, box-shadow 0.2s; font-size: 13px; font-weight: 600;
      letter-spacing: 2px; user-select: none;
    }
    .theme-swatch:hover { transform: translateY(-2px); }
    .theme-swatch.active { box-shadow: inset 0 0 0 2.5px var(--accent), 0 0 0 3px var(--accent-light); }
    .swatch-brown { background: linear-gradient(135deg, #E8C8B8, #D4A48C); color: #5D2E1A; }
    .swatch-green { background: linear-gradient(135deg, #C8DCC8, #A0C0A0); color: #1A3D2A; }
    .swatch-white { background: linear-gradient(135deg, #E8E8E8, #D0D0D0); color: #555; }
    .swatch-black { background: linear-gradient(135deg, #3A3A3A, #222); color: #D0C8C0; }

    /* 开关 */
    .toggle-switch { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #CCC; border-radius: 26px; transition: 0.3s; }
    .toggle-slider::before { content: ''; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(22px); }

    /* 通知 */
    .notification-dot { position: absolute; top: -2px; right: -4px; width: 10px; height: 10px; background: var(--dot-bg); border-radius: 50%; transition: background 0.4s; }
    .notification-dropdown {
      position: absolute; top: 55px; right: 20px;
      background: var(--notif-dropdown-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      width: 340px; max-height: 420px; overflow-y: auto;
      box-shadow: 0 16px 40px var(--shadow-lg);
      border-radius: 20px; padding: 12px; display: none; z-index: 100;
      border: 1px solid var(--card-border);
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }
    .notification-item { padding: 10px 14px; border-bottom: 1px solid var(--divider); font-size: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 4px; transition: background 0.15s, color 0.4s; color: var(--text); }
    .notification-item:hover { background: var(--notif-hover); }
    .notification-item.unread { background: var(--notif-unread); font-weight: 500; }
    .notification-item.read { color: var(--text-muted); }
    .notif-footer { text-align: center; padding: 10px 0 2px; border-top: 1px solid var(--divider); margin-top: 8px; transition: border-color 0.4s; }
    .notif-footer button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 16px; transition: background 0.2s, color 0.4s; }
    .notif-footer button:hover { background: var(--accent-light2); }

    /* 模态框 */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 1000; transition: background 0.4s; }
    .modal.active { display: flex; }
    .modal-content { background: var(--modal-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); width: 90%; max-width: 420px; border-radius: 24px; padding: 24px; box-shadow: 0 20px 50px var(--shadow-lg); border: 1px solid var(--card-border); transition: background 0.4s, border-color 0.4s, box-shadow 0.4s; }
    .close-icon { float: right; cursor: pointer; color: var(--text-muted); line-height: 1; transition: color 0.2s; }
    .close-icon:hover { color: var(--text); }
    .close-icon svg { width: 24px; height: 24px; }
    .modal h3 { color: var(--text); transition: color 0.4s; }

    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 14px 22px; border-radius: 16px; color: white; font-weight: 500; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; max-width: 380px; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .toast.success { background: var(--toast-success); }
    .toast.error { background: var(--toast-error); }
    .toast.warn { background: var(--toast-warn); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .site-footer { text-align: center; padding: 24px 20px; color: var(--footer-text); font-size: 13px; }
    .site-footer .footer-divider { width: 40px; height: 2px; background: rgba(198,123,92,0.2); margin: 0 auto 14px; border-radius: 1px; }
    .site-footer a { color: var(--footer-link); text-decoration: none; transition: color 0.2s; display: inline-flex; align-items: center; gap: 4px; }
    .site-footer a:hover { color: var(--footer-link-hover); }
    .site-footer a svg { width: 14px; height: 14px; }
    .site-footer .footer-links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 4px; }

    .tutorial-overlay { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 2000; }
    .tutorial-highlight { position: fixed; z-index: 2001; border-radius: 12px; box-shadow: 0 0 0 4px var(--accent), 0 0 40px rgba(198,123,92,0.25); pointer-events: none; transition: all 0.35s ease; }
    .tutorial-bubble { position: fixed; z-index: 2002; background: var(--modal-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 20px; padding: 20px 24px; max-width: 380px; box-shadow: 0 12px 40px var(--shadow-lg); border: 1px solid var(--card-border); transition: all 0.35s ease; font-size: 14px; color: var(--text); line-height: 1.7; }
    .tutorial-bubble .tutorial-text { margin-bottom: 16px; }
    .tutorial-bubble .tutorial-text b { color: var(--accent); }
    .tutorial-btn { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; transition: all 0.2s; }
    .tutorial-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px var(--btn-shadow); }
    .tutorial-skip { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 8px 12px; font-family: inherit; }
    .tutorial-help { position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px; border-radius: 50%; background: var(--modal-bg); backdrop-filter: blur(12px); border: 1.5px solid var(--card-border); color: var(--accent); font-size: 20px; cursor: pointer; z-index: 500; display: flex; align-items: center; justify-content: center; font-weight: 700; box-shadow: 0 4px 16px var(--shadow); font-family: inherit; }

    @media (max-width: 640px) {
      .navbar { padding: 10px 16px; }
      .logo { font-size: 18px; }
      .card { padding: 18px 14px; }
      .setting-row { flex-direction: column; align-items: flex-start; gap: 8px; }
      .theme-swatch { padding: 8px 16px; font-size: 12px; letter-spacing: 1px; }
    }
    /* 加载遮罩 */
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(2px); z-index: 999; align-items: center; justify-content: center; }
    .loading-overlay.active { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--accent-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<script>(function(){var t=localStorage.getItem('classroom_theme');if(t&&t!=='brown')document.body.setAttribute('data-theme',t);})();</script>

<div class="toast-container" id="toastContainer"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="navbar">
  <div class="logo"><span id="logoIcon"></span>个人设置</div>
  <div id="navLoggedIn" style="display:flex; gap:10px; align-items:center;">
    <div class="notification-bell" id="notificationBell"><span id="bellIcon"></span><span class="notification-dot" id="notificationDot" style="display:none;"></span></div>
    <button class="btn-outline btn" onclick="showLoading();setTimeout(function(){window.location.href='main.html'},100)"><span id="backIcon"></span>返回办事通</button>
  </div>
  <div id="navGuest" style="display:none; gap:10px; align-items:center;">
    <button class="btn-outline btn" onclick="showLoading();setTimeout(function(){window.location.href='main.html'},100)"><span id="backIcon2"></span>返回办事通</button>
    <button class="btn" onclick="sessionStorage.setItem('login_redirect',location.href);window.location.href='index.html'">登录</button>
  </div>
  <div class="notification-dropdown" id="notificationDropdown"></div>
</div>

<div class="container">
  <!-- 个人信息卡片 -->
  <div class="card">
    <div class="card-header"><h3><span id="userIcon"></span>个人信息</h3></div>
    <div class="profile-info">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-text">
        <h4 id="profileName">—</h4>
        <div class="profile-badges">
          <span class="profile-badge" id="profileRole">—</span>
          <span class="profile-badge" id="profilePosition" style="display:none;"></span>
        </div>
      </div>
    </div>
    <div id="loginPromptRow" style="display:none; margin-top:12px; text-align:center;">
      <button class="btn" onclick="sessionStorage.setItem('login_redirect',location.href);window.location.href='index.html'" style="width:100%;justify-content:center;">立即登录</button>
    </div>
  </div>

  <!-- 账号设置 -->
  <div class="card">
    <div class="card-header"><h3><span id="settingsIcon"></span>账号设置</h3></div>
    <div class="setting-row">
      <div>
        <div class="setting-label">登录密码</div>
        <div class="setting-desc">定期更换密码以保障账号安全</div>
      </div>
      <button class="setting-action" id="changePwdBtn"><span id="keyIcon"></span>修改密码</button>
    </div>
  </div>

  <!-- 个性设置 -->
  <div class="card">
    <div class="card-header"><h3><span id="paletteIcon"></span>个性设置</h3></div>

    <div class="setting-row">
      <div>
        <div class="setting-label">主题颜色</div>
        <div class="setting-desc" id="currentThemeLabel">暖棕 · 默认</div>
      </div>
      <div class="theme-swatches">
        <div class="theme-swatch swatch-brown" data-theme-val="brown">赭石</div>
        <div class="theme-swatch swatch-green" data-theme-val="green">青岚</div>
        <div class="theme-swatch swatch-white" data-theme-val="white">月白</div>
        <div class="theme-swatch swatch-black" data-theme-val="black">墨韵</div>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">意见箱默认匿名</div>
        <div class="setting-desc">开启后发布新意见时将默认勾选匿名</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="defaultAnonToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">通知历史</div>
        <div class="setting-desc" id="notifCount">—</div>
      </div>
      <button class="setting-action" id="clearNotifsBtn"><span id="trashIcon"></span>清空通知</button>
    </div>
  </div>

  <!-- 退出登录 -->
  <div class="card" style="text-align:center;">
    <button class="btn btn-danger" id="logoutBtn" style="width:100%;justify-content:center;"><span id="logoutIcon"></span>退出登录</button>
  </div>
</div>

<!-- 确认弹窗 -->
<div class="modal" id="confirmModal">
  <div class="modal-content" style="text-align:center; max-width:360px;">
    <h3 id="confirmTitle" style="font-size:18px;">确认操作</h3>
    <p id="confirmMsg" style="color:var(--text-muted); margin:14px 0 22px; font-size:15px; line-height:1.6;"></p>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button class="btn-outline btn" id="confirmCancelBtn">取消</button>
      <button class="btn" id="confirmOkBtn" style="min-width:80px;">确认</button>
    </div>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal" id="pwdModal">
  <div class="modal-content">
    <span class="close-icon" id="closePwdModalBtn"><span id="closePwdIcon"></span></span>
    <h3>修改密码</h3>
    <input type="password" id="newPwd" placeholder="新密码（至少6位）" class="input-field" style="margin-top:16px;">
    <input type="password" id="newPwdConfirm" placeholder="确认密码" class="input-field">
    <button class="btn" id="submitPwdChange" style="width:100%;justify-content:center;">确认修改</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
<script>
  // -- SVG Icon System --
  function getIcon(name) {
    var icons = {
      'arrow-left': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
      bell: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>',
      clipboard: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 4 5 13 10.5 13 7.5 21 17 11 12 11"/></svg>',
      edit: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 3 22l1.5-4.5Z"/></svg>',
      key: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3"/></svg>',
      'log-out': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
      'message-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg>',
      'check-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      'refresh-cw': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
      settings: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>',
      trash: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4c0-1 .6-2 2-2h4c1.4 0 2 1 2 2v2"/><path d="M19 6l-.87 12.14A2 2 0 0 1 16.14 20H7.86a2 2 0 0 1-2-1.86L5 6"/><path d="M10 10v6"/><path d="M14 10v6"/></svg>',
      user: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
      clock: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      palette: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/><circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/><path d="M12 1C6 1 1.5 5.5 1.5 11c0 5 4 9.5 9.5 9.5.8 0 1.5-.3 1.5-1 0-.3-.1-.7-.3-1-.3-.4-.6-.8-.3-1.3.3-.4 1-.7 1.7-.7h1.4c3.3 0 6-2.7 6-6 0-5-4-9.5-9-9.5z"/></svg>',
      x: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
      lightbulb: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.59-.5 1.12-1.05 1.56-1.66A5 5 0 1 0 6.5 8.77c.4.65.9 1.24 1.48 1.73L9 11v5l3 3 3-3v-5Z"/><path d="M9 21h6"/><path d="M12 2v1"/></svg>'
    };
    return (icons[name] || '').replace(/width="24"/g,'width="'+ (arguments[1]||24) +'"').replace(/height="24"/g,'height="'+ (arguments[1]||24) +'"');
  }

  function initIcons() {
    document.getElementById('logoIcon').innerHTML = getIcon('settings', 26);
    document.getElementById('bellIcon').innerHTML = getIcon('bell', 26);
    document.getElementById('backIcon').innerHTML = getIcon('arrow-left', 18);
    var backIcon2 = document.getElementById('backIcon2');
    if (backIcon2) backIcon2.innerHTML = getIcon('arrow-left', 18);
    document.getElementById('userIcon').innerHTML = getIcon('user', 20);
    document.getElementById('settingsIcon').innerHTML = getIcon('settings', 20);
    document.getElementById('paletteIcon').innerHTML = getIcon('palette', 20);
    document.getElementById('keyIcon').innerHTML = getIcon('key', 14);
    document.getElementById('trashIcon').innerHTML = getIcon('trash', 14);
    document.getElementById('logoutIcon').innerHTML = getIcon('log-out', 16);
    document.getElementById('closePwdIcon').innerHTML = getIcon('x', 24);
  }

  const SUPABASE_URL = 'https://zmujidvqkihthhdbwuvw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptdWppZHZxa2lodGhoZGJ3dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjIxMDAsImV4cCI6MjA5MzAzODEwMH0.iWKqqpebMc3l3wjEBsP4X0QH1WwjtIovcJAEsDPr3kE';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var currentUser = null;
  var SETTINGS_KEY = 'classroom_user_settings';
  var THEME_KEY = 'classroom_theme';

  // Toast
  function toast(msg, type) { type = type || 'success'; var t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg; t.onclick = function() { t.remove(); }; document.getElementById('toastContainer').appendChild(t); setTimeout(function() { if (t.parentNode) t.remove(); }, 4000); }

  function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
  function getNotifs() { var raw = localStorage.getItem('classroom_notifications'); return raw ? JSON.parse(raw) : []; }
  function saveNotifs(notifs) { localStorage.setItem('classroom_notifications', JSON.stringify(notifs)); }
  function updateNotifDot() {
    if (!currentUser || !currentUser.id) return;
    var notifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id && !n.read; });
    document.getElementById('notificationDot').style.display = notifs.length ? 'block' : 'none';
  }

  // -- 自定义确认弹窗 --
  function showConfirm(title, msg, onConfirm, danger) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    var okBtn = document.getElementById('confirmOkBtn');
    okBtn.className = danger ? 'btn btn-danger' : 'btn';
    okBtn.style.minWidth = '80px';
    document.getElementById('confirmModal').classList.add('active');
    okBtn.onclick = function() { document.getElementById('confirmModal').classList.remove('active'); onConfirm(); };
    document.getElementById('confirmCancelBtn').onclick = function() { document.getElementById('confirmModal').classList.remove('active'); };
    document.getElementById('confirmModal').onclick = function(e) { if (e.target === e.currentTarget) document.getElementById('confirmModal').classList.remove('active'); };
  }

  // -- 主题系统 --
  function getTheme() { return localStorage.getItem(THEME_KEY) || 'brown'; }
  async function setTheme(theme) {
    localStorage.setItem(THEME_KEY, theme);
    if (theme === 'brown') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', theme);
    updateThemeUI(theme);
    // 同步到数据库
    if (currentUser && currentUser.id && currentUser.role !== 'guest') {
      var res = await supabaseClient.from('profiles').update({ theme: theme }).eq('id', currentUser.id);
      if (res.error) console.warn('主题同步失败:', res.error.message);
    }
  }
  function updateThemeUI(theme) {
    var labels = { brown: '赭石 · 默认', green: '青岚', white: '月白', black: '墨韵' };
    document.getElementById('currentThemeLabel').textContent = labels[theme] || '暖棕 · 默认';
    document.querySelectorAll('.theme-swatch').forEach(function(s) {
      s.classList.toggle('active', s.dataset.themeVal === theme);
    });
  }

  // -- 用户设置存储（localStorage 作为缓存，数据库为主）--
  function getSettings() { var raw = localStorage.getItem(SETTINGS_KEY); return raw ? JSON.parse(raw) : {}; }
  function saveSettings(settings) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
  async function syncSettingsToDB(key, value) {
    if (!currentUser || !currentUser.id || currentUser.role === 'guest') return;
    var update = {}; update[key] = value;
    var res = await supabaseClient.from('profiles').update(update).eq('id', currentUser.id);
    if (res.error) console.warn('设置同步失败:', res.error.message);
  }

  function renderNotifDropdown(showAll) {
    if (!currentUser || !currentUser.id) return;
    var dropdown = document.getElementById('notificationDropdown');
    var allNotifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id; }).sort(function(a,b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });
    var unreadNotifs = allNotifs.filter(function(n) { return !n.read; });
    var readNotifs = allNotifs.filter(function(n) { return n.read; });
    var displayNotifs = showAll ? allNotifs : unreadNotifs;

    var html = '';
    if (displayNotifs.length === 0) {
      html = '<div style="padding:16px;text-align:center;color:var(--text-muted);">' + (showAll ? '暂无任何通知' : '暂无新通知') + '</div>';
    } else {
      html = displayNotifs.map(function(n) {
        var icon = getIcon('bell', 16), label = '', detail = '', opinionId = n.opinion_id || '', postId = n.post_id || '';
        if (n.type === 'reply') { icon = getIcon('message-circle', 16); label = '有新回复'; detail = n.opinion_title; }
        else if (n.type === 'closed') { icon = getIcon('check-circle', 16); label = '已完结'; detail = n.opinion_title; }
        else if (n.type === 'reassign') { icon = getIcon('refresh-cw', 16); label = '已重分配'; detail = n.opinion_title; }
        else if (n.type === 'in_progress') { icon = getIcon('clock', 16); label = '问题开始处理'; detail = n.opinion_title; }
        else if (n.type === 'opinion_delete') { icon = getIcon('trash', 16); label = '已被管理员删除'; detail = n.opinion_title; }
        else if (n.type === 'treehole_delete') { icon = getIcon('trash', 16); label = '便利贴被删除'; detail = (n.content || '').substring(0, 40); }
        else if (n.type === 'treehole_reply') { icon = getIcon('message-circle', 16); label = '便利贴有新回复'; detail = (n.content || '').substring(0, 40); }
        var timeHtml = '<br><span style="font-size:11px;color:var(--text-light);">' + new Date(n.created_at).toLocaleString() + '</span>';
        return '<div class="notification-item ' + (n.read ? 'read' : 'unread') + '" data-id="' + n.id + '" data-type="' + n.type + '" data-opinion="' + opinionId + '" data-post-id="' + postId + '">' +
          icon + ' ' + (detail ? escapeHtml(detail) + ' - ' : '') + label + timeHtml +
        '</div>';
      }).join('');
    }

    if (displayNotifs.length > 0) {
      html += '<div style="text-align:center;font-size:11px;color:var(--text-light);padding:6px 0 2px;">' + ' 点击消息即可标为已读</div>';
    }
    if (!showAll) {
      if (unreadNotifs.length === 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 14) + ' 查看历史通知 →</button></div>';
      } else if (readNotifs.length > 0) {
        html += '<div class="notif-footer"><button id="showAllNotifsBtn">' + getIcon('clipboard', 14) + ' 查看全部消息 →</button></div>';
      }
    } else {
      html += '<div class="notif-footer"><button id="showUnreadBtn">← 仅看未读</button></div>';
    }

    dropdown.innerHTML = html;

    dropdown.querySelectorAll('.notification-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var notifs = getNotifs();
        var idx = notifs.findIndex(function(n) { return n.id === item.dataset.id; });
        if (idx !== -1) { notifs[idx].read = true; saveNotifs(notifs); }
        updateNotifDot();
        if (item.dataset.type === 'treehole_delete' || item.dataset.type === 'treehole_reply') {
          window.location.href = 'treehole.html';
        } else {
          window.location.href = 'opinions.html';
        }
        dropdown.style.display = 'none';
      });
    });

    var showAllBtn = document.getElementById('showAllNotifsBtn');
    if (showAllBtn) {
      showAllBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(true);
      });
    }
    var showUnreadBtn = document.getElementById('showUnreadBtn');
    if (showUnreadBtn) {
      showUnreadBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        renderNotifDropdown(false);
      });
    }
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function init() {
    var userStr = sessionStorage.getItem('currentUser');
    if (!userStr) {
      // Guest mode
      currentUser = { id: null, real_name: '访客', role: 'guest' };
      document.getElementById('navLoggedIn').style.display = 'none';
      document.getElementById('navGuest').style.display = 'flex';
      document.getElementById('loginPromptRow').style.display = 'block';
      // Profile card: guest info
      document.getElementById('profileName').textContent = '未登录';
      document.getElementById('profileRole').textContent = '访客';
      document.getElementById('profileRole').style.background = 'rgba(139,115,85,0.1)';
      document.getElementById('profileRole').style.color = 'var(--text-muted)';
      document.getElementById('profileAvatar').textContent = '?';
      // Hide logout
      var logoutSection = document.getElementById('logoutBtn').parentElement;
      if (logoutSection) logoutSection.style.display = 'none';
      // Disable settings actions
      document.getElementById('changePwdBtn').style.opacity = '0.5';
      document.getElementById('changePwdBtn').style.pointerEvents = 'none';
      document.getElementById('defaultAnonToggle').disabled = true;
      document.getElementById('clearNotifsBtn').style.opacity = '0.5';
      document.getElementById('clearNotifsBtn').style.pointerEvents = 'none';
      document.getElementById('notifCount').textContent = '登录后可查看';
      // Theme still works
      initIcons();
      var theme = getTheme();
      if (theme !== 'brown') document.body.setAttribute('data-theme', theme);
      else document.body.removeAttribute('data-theme');
      updateThemeUI(theme);
      return;
    }
    currentUser = JSON.parse(userStr);
    document.getElementById('navLoggedIn').style.display = 'flex';
    document.getElementById('navGuest').style.display = 'none';
    document.getElementById('loginPromptRow').style.display = 'none';

    initIcons();

    updateNotifDot();

    // 加载个人信息（同时获取主题和设置）
    var res = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
    var profile = res.data;
    if (profile) {
      document.getElementById('profileName').textContent = profile.real_name || currentUser.email;
      document.getElementById('profileRole').textContent = profile.role === 'admin' ? '管理员' : '学生';
      document.getElementById('profileRole').style.background = profile.role === 'admin'
        ? 'rgba(199,86,74,0.12)' : '';
      document.getElementById('profileRole').style.color = profile.role === 'admin'
        ? '#C7564A' : '';
      if (profile.position) {
        document.getElementById('profilePosition').textContent = profile.position;
        document.getElementById('profilePosition').style.display = 'inline-block';
      }
      document.getElementById('profileAvatar').textContent = (profile.real_name || currentUser.email).charAt(0).toUpperCase();
      // 同步更新 sessionStorage
      currentUser.real_name = profile.real_name;
      currentUser.role = profile.role;
      currentUser.position = profile.position;
      sessionStorage.setItem('currentUser', JSON.stringify(currentUser));

      // 主题和匿名设置已在登录时从 DB 同步到 localStorage，直接读本地
      var theme = getTheme();
      if (theme !== 'brown') document.body.setAttribute('data-theme', theme);
      else document.body.removeAttribute('data-theme');
      updateThemeUI(theme);

      var localSettings = getSettings();
      document.getElementById('defaultAnonToggle').checked = localSettings.defaultAnonymous || false;
    } else {
      // 数据库无记录时回退 localStorage
      var theme2 = getTheme();
      if (theme2 !== 'brown') document.body.setAttribute('data-theme', theme2);
      else document.body.removeAttribute('data-theme');
      updateThemeUI(theme2);
      var settings2 = getSettings();
      document.getElementById('defaultAnonToggle').checked = settings2.defaultAnonymous || false;
    }

    var allNotifs = getNotifs().filter(function(n) { return n.user_id === currentUser.id; });
    document.getElementById('notifCount').textContent = '共 ' + allNotifs.length + ' 条通知记录';
  }

  // -- 主题色块点击 --
  document.querySelectorAll('.theme-swatch').forEach(function(swatch) {
    swatch.addEventListener('click', function() {
      setTheme(this.dataset.themeVal);
    });
  });

  // -- 默认匿名开关 --
  document.getElementById('defaultAnonToggle').addEventListener('change', function() {
    if (!currentUser || currentUser.role === 'guest') { toast('请先登录', 'warn'); this.checked = !this.checked; return; }
    var settings = getSettings();
    settings.defaultAnonymous = this.checked;
    saveSettings(settings);
    syncSettingsToDB('default_anonymous', this.checked);
    toast(this.checked ? '意见箱已设为默认匿名' : '意见箱已取消默认匿名', 'success');
  });

  // 修改密码
  document.getElementById('changePwdBtn').addEventListener('click', function() {
    if (!currentUser || currentUser.role === 'guest') { toast('请先登录', 'warn'); return; }
    document.getElementById('pwdModal').classList.add('active');
  });
  document.getElementById('closePwdModalBtn').addEventListener('click', function() {
    document.getElementById('pwdModal').classList.remove('active');
  });
  document.getElementById('pwdModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) document.getElementById('pwdModal').classList.remove('active');
  });
  document.getElementById('submitPwdChange').addEventListener('click', async function() {
    var newPwd = document.getElementById('newPwd').value;
    var newPwdConfirm = document.getElementById('newPwdConfirm').value;
    if (!newPwd || newPwd.length < 6) { toast('新密码至少6位', 'warn'); return; }
    if (newPwd !== newPwdConfirm) { toast('两次输入的密码不一致', 'warn'); return; }
    var res = await supabaseClient.auth.updateUser({ password: newPwd });
    if (res.error) { toast(res.error.message, 'error'); }
    else {
      toast('密码修改成功，即将跳转登录页');
      sessionStorage.clear();
      setTimeout(function() { window.location.href = 'main.html'; }, 1500);
    }
  });

  // 清空通知
  document.getElementById('clearNotifsBtn').addEventListener('click', function() {
    if (!currentUser || currentUser.role === 'guest') { toast('请先登录', 'warn'); return; }
    showConfirm('清空通知', '确定要清空所有通知记录吗？\n此操作不可恢复。', function() {
      var notifs = getNotifs().filter(function(n) { return n.user_id !== currentUser.id; });
      saveNotifs(notifs);
      updateNotifDot();
      document.getElementById('notifCount').textContent = '共 0 条通知记录';
      toast('通知记录已清空', 'success');
    });
  });

  // 退出登录
  document.getElementById('logoutBtn').addEventListener('click', function() {
    if (!currentUser || currentUser.role === 'guest') { toast('请先登录', 'warn'); return; }
    showConfirm('退出登录', '确定要退出登录吗？', async function() {
      await supabaseClient.auth.signOut();
      sessionStorage.removeItem('currentUser');
      localStorage.removeItem('classroom_notifications');
      window.location.href = 'main.html';
    });
  });

  // 通知铃铛
  document.getElementById('notificationBell').addEventListener('click', function(e) {
    e.stopPropagation();
    var dropdown = document.getElementById('notificationDropdown');
    if (dropdown.style.display === 'block') {
      dropdown.style.display = 'none';
    } else {
      renderNotifDropdown(false);
      dropdown.style.display = 'block';
    }
  });
  document.addEventListener('click', function() {
    document.getElementById('notificationDropdown').style.display = 'none';
  });

  var tutorialSteps = [
    { sel: '.theme-swatches', text: '⚙️ 在<b>个人设置</b>中，你可以开启意见箱默认匿名，修改登录密码……当然，你还可以切换喜欢的主题颜色！', pos: 'top' }
  ];
  var tutorialStep = 0;
  function showTutorialStep(n) {
    var step = tutorialSteps[n]; var el = document.querySelector(step.sel);
    if (!el) { nextTutorialStep(); return; }
    var hidden = false; var p = el; while (p) { if (window.getComputedStyle(p).display === 'none') { hidden = true; break; } p = p.parentElement; }
    var rect = el.getBoundingClientRect();
    var hl = document.getElementById('tutorialHighlight');
    if (hidden || (rect.width === 0 && rect.height === 0)) {
      hl.style.display = 'none';
    } else {
      hl.style.display = 'block'; hl.style.top = (rect.top-6)+'px'; hl.style.left = (rect.left-6)+'px'; hl.style.width = (rect.width+12)+'px'; hl.style.height = (rect.height+12)+'px';
    }
    var bubble = document.getElementById('tutorialBubble'); bubble.style.display = 'block';
    document.getElementById('tutorialText').innerHTML = step.text;
    document.getElementById('tutorialNext').textContent = '下一步 →';
    var bw=380, bh=160, bx, by;
    if (hidden || (rect.width === 0 && rect.height === 0) || step.pos==='center') {
      bx=window.innerWidth/2-bw/2;by=window.innerHeight/2-bh/2;
    } else {
      bx=rect.left+rect.width/2-bw/2;by=rect.top-bh-12;
    }
    bx=Math.max(10,Math.min(bx,window.innerWidth-bw-10));by=Math.max(10,Math.min(by,window.innerHeight-bh-10));
    bubble.style.top=by+'px';bubble.style.left=bx+'px';
    document.getElementById('tutorialOverlay').style.display = 'block';
    tutorialStep=n;sessionStorage.setItem('tutorial_step',n+10);sessionStorage.setItem('tutorial_page','settings');
  }
  function nextTutorialStep() {
    tutorialStep++;
    if(tutorialStep<tutorialSteps.length){showTutorialStep(tutorialStep);}
    else{sessionStorage.setItem('tutorial_step','done');sessionStorage.setItem('tutorial_page','main');window.location.href='main.html';}
  }
  function endTutorial() {
    document.getElementById('tutorialOverlay').style.display='none';document.getElementById('tutorialHighlight').style.display='none';document.getElementById('tutorialBubble').style.display='none';
    localStorage.setItem('tutorial_done','1');sessionStorage.removeItem('tutorial_step');
    if(currentUser && currentUser.id && currentUser.role !== 'guest'){supabaseClient.from('profiles').update({tutorial_done:true}).eq('id',currentUser.id)}
  }
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('tutorialNext').addEventListener('click',nextTutorialStep);
  document.getElementById('tutorialSkip').addEventListener('click',endTutorial);
  window.addEventListener('scroll',function(){if(document.getElementById('tutorialOverlay').style.display==='block')showTutorialStep(tutorialStep);});
  if(!localStorage.getItem('tutorial_done')&&sessionStorage.getItem('tutorial_page')==='settings'){tutorialStep=parseInt(sessionStorage.getItem('tutorial_step')||'0')-11;setTimeout(function(){showTutorialStep(Math.max(0,tutorialStep));},600);}
  });

  init();
</script>

<div class="tutorial-overlay" id="tutorialOverlay" style="display:none;"></div>
<div class="tutorial-highlight" id="tutorialHighlight" style="display:none;"></div>
<div class="tutorial-bubble" id="tutorialBubble" style="display:none;">
  <div class="tutorial-text" id="tutorialText"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <button class="tutorial-skip" id="tutorialSkip">跳过教程</button>
    <button class="tutorial-btn" id="tutorialNext">完成！</button>
  </div>
</div>
